<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
  <title>记账 (手机版)</title>
  <style>
:root {
  --primary: #6366F1;
  --primary-light: #818CF8;
  --primary-dark: #4F46E5;
  --success: #10B981;
  --danger: #EF4444;
  --warning: #F59E0B;
  --bg: #F8FAFC;
  --card-bg: #FFFFFF;
  --text-primary: #1E293B;
  --text-secondary: #64748B;
  --text-muted: #94A3B8;
  --border: #E2E8F0;
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.07), 0 2px 4px -1px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --tab-height: 48px;
  --topbar-height: 52px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text-primary); line-height: 1.5;
  -webkit-font-smoothing: antialiased; overflow-x: hidden;
}
button { cursor: pointer; font-family: inherit; font-size: inherit; border: none; background: none; }
input, textarea, select { font-family: inherit; font-size: inherit; outline: none; }
a { color: var(--primary); text-decoration: none; }

/* ===== Top Bar ===== */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--topbar-height);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px;
  background: var(--card-bg); border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.top-bar-title { font-size: 1.05rem; font-weight: 700; color: var(--text-primary); }
.top-bar-actions { display: flex; gap: 6px; }
.top-bar-btn {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border-radius: 8px; font-size: 1.15rem;
  transition: background 0.15s; cursor: pointer; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.top-bar-btn:active { background: var(--bg); transform: scale(0.92); }

/* ===== Tab Bar ===== */
.tab-bar {
  position: fixed; top: var(--topbar-height); left: 0; right: 0; z-index: 99;
  height: var(--tab-height);
  display: flex; background: var(--card-bg); border-bottom: 1px solid var(--border);
}
.tab-item {
  flex: 1; display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; font-weight: 600; color: var(--text-muted);
  cursor: pointer; user-select: none; position: relative;
  transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
  min-height: 44px;
}
.tab-item:active { opacity: 0.7; }
.tab-item.active { color: var(--primary); }
.tab-item::after {
  content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%) scaleX(0);
  width: 32px; height: 3px; border-radius: 2px;
  background: var(--primary); transition: transform 0.2s;
}
.tab-item.active::after { transform: translateX(-50%) scaleX(1); }

/* ===== Main Content ===== */
.main-content {
  padding-top: calc(var(--topbar-height) + var(--tab-height));
  padding-bottom: 80px;
  min-height: 100vh;
}
.page { display: none; padding: 12px; max-width: 480px; margin: 0 auto; }
.page.active { display: block; }

/* ===== Cards ===== */
.card {
  background: var(--card-bg); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 14px; margin-bottom: 10px;
  border: 1px solid transparent;
}

/* ===== Form ===== */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block; font-size: 0.8rem; font-weight: 600;
  color: var(--text-secondary); margin-bottom: 5px;
}
.form-input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  background: var(--card-bg); color: var(--text-primary);
  font-size: 1rem; transition: border-color 0.15s;
  -webkit-appearance: none; appearance: none;
}
.form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12); }
.form-input::placeholder { color: var(--text-muted); }
.form-input.error { border-color: var(--danger); }
.amount-wrapper { position: relative; }
.amount-prefix {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 1rem; font-weight: 700; color: var(--text-muted); pointer-events: none;
}
.amount-wrapper .form-input { padding-left: 44px; font-size: 1.25rem; font-weight: 700; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px 20px; border-radius: var(--radius-sm);
  font-weight: 600; font-size: 0.9rem; min-height: 44px;
  transition: transform 0.1s; cursor: pointer; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.97); }
.btn-block { width: 100%; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:active { background: var(--primary-dark); }
.btn-success { background: var(--success); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-primary); }
.btn-sm { padding: 8px 14px; font-size: 0.82rem; min-height: 36px; }
.btn-xs { padding: 4px 10px; font-size: 0.75rem; min-height: 32px; }

/* ===== Category Picker ===== */
.cat-picker-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  background: var(--card-bg); font-size: 0.95rem; min-height: 44px;
  transition: border-color 0.15s; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.cat-picker-btn:active { border-color: var(--primary); }
.cat-picker-btn .cat-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; display: inline-block;
}
.cat-picker-btn .cat-icon { font-size: 1.1rem; flex-shrink: 0; }
.cat-picker-btn .cat-name { flex: 1; text-align: left; color: var(--text-primary); font-weight: 500; }
.cat-picker-btn .cat-placeholder { flex: 1; text-align: left; color: var(--text-muted); }
.cat-picker-btn .cat-arrow { font-size: 0.7rem; color: var(--text-muted); }

/* ===== Record Card ===== */
.record-card {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; background: var(--card-bg); border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 8px;
  cursor: pointer; transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.record-card:active { transform: scale(0.99); }
.record-card .rc-icon {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; flex-shrink: 0;
}
.record-card .rc-info { flex: 1; min-width: 0; }
.record-card .rc-cat { font-size: 0.82rem; font-weight: 600; color: var(--text-primary); }
.record-card .rc-date { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
.record-card .rc-note {
  font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.record-card .rc-amount {
  font-size: 1rem; font-weight: 700; color: var(--text-primary); white-space: nowrap; flex-shrink: 0;
}

/* ===== Category Tree ===== */
.cat-tree-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.1s; min-height: 44px;
  -webkit-tap-highlight-color: transparent;
}
.cat-tree-item:active { background: var(--bg); }
.cat-tree-item .ct-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.cat-tree-item .ct-icon { font-size: 1.05rem; flex-shrink: 0; }
.cat-tree-item .ct-name { flex: 1; font-weight: 500; font-size: 0.88rem; color: var(--text-primary); }
.cat-tree-item.is-child { padding-left: 36px; }
.cat-tree-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; margin-bottom: 6px;
}
.cat-tree-header .btn { padding: 8px 14px; min-height: 38px; }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0, 0, 0, 0.4); display: none;
  align-items: flex-end; justify-content: center;
  animation: fadeIn 0.2s;
}
.modal-overlay.open { display: flex; }
.modal-overlay.center { align-items: center; }
.modal-content {
  background: var(--card-bg); border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto;
  padding: 20px 16px calc(20px + var(--safe-bottom));
  animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.modal-overlay.center .modal-content { border-radius: var(--radius-lg); animation: modalScale 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
.modal-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 14px; color: var(--text-primary); }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.modal-actions .btn { flex: 1; }

/* ===== Toast ===== */
.toast-container {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 2000;
  pointer-events: none;
}
.toast {
  background: var(--card-bg); border-radius: var(--radius-sm);
  padding: 10px 20px; box-shadow: var(--shadow-lg);
  font-size: 0.9rem; font-weight: 500; white-space: nowrap;
  animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: auto;
  border-left: 4px solid var(--success);
}
.toast.error { border-left-color: var(--danger); }

/* ===== Category Picker Modal ===== */
.picker-cat-item {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.1s; min-height: 44px;
  -webkit-tap-highlight-color: transparent;
}
.picker-cat-item:active { background: var(--bg); }
.picker-cat-item.selected { background: rgba(99, 102, 241, 0.08); }
.picker-cat-item .pci-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.picker-cat-item .pci-icon { font-size: 1.05rem; flex-shrink: 0; }
.picker-cat-item .pci-name { flex: 1; font-weight: 500; font-size: 0.88rem; color: var(--text-primary); }
.picker-cat-item.is-child { padding-left: 40px; }

/* ===== Import Modal ===== */
.import-actions { display: flex; gap: 10px; margin-top: 16px; }
.import-actions .btn { flex: 1; }

/* ===== Empty ===== */
.empty-state { text-align: center; padding: 48px 16px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }
.empty-state .empty-text { font-size: 0.95rem; font-weight: 500; margin-bottom: 4px; }

/* ===== Delete bottom button ===== */
.bottom-clear {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 50;
}
.bottom-clear .btn { font-size: 0.78rem; padding: 8px 18px; min-height: 36px; opacity: 0.7; }

/* ===== Confirm Dialog ===== */
.confirm-actions { display: flex; gap: 10px; margin-top: 16px; }
.confirm-actions .btn { flex: 1; }

/* ===== Animations ===== */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes modalScale { from { opacity: 0; transform: scale(0.92) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes toastIn { from { opacity: 0; transform: translateY(10px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

/* ===== Misc ===== */
.text-muted { color: var(--text-muted); }
.text-sm { font-size: 0.82rem; }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mb-8 { margin-bottom: 8px; }
.flex { display: flex; }
.gap-8 { gap: 8px; }
.items-center { align-items: center; }
.w-full { width: 100%; }

/* Scroll bar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Modal -->
  <div class="modal-overlay center" id="modalOverlay">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-bar-title">💰 记账 (手机版)</div>
    <div class="top-bar-actions">
      <button class="top-bar-btn" onclick="handleExport()" title="导出数据">📥</button>
      <button class="top-bar-btn" onclick="handleImport()" title="导入数据">📤</button>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item active" data-tab="add" onclick="switchTab('add')">记账</div>
    <div class="tab-item" data-tab="records" onclick="switchTab('records')">记录</div>
    <div class="tab-item" data-tab="categories" onclick="switchTab('categories')">分类</div>
  </div>

  <!-- Main Content -->
  <div class="main-content">

    <!-- Tab 1: 记账 -->
    <div class="page active" id="page-add">
      <div class="card">
        <div class="form-group">
          <label class="form-label">金额</label>
          <div class="amount-wrapper">
            <span class="amount-prefix">RM</span>
            <input class="form-input" id="inputAmount" type="text" inputmode="decimal" placeholder="0.00" autocomplete="off">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">分类</label>
          <button class="cat-picker-btn" id="catPickerBtn" onclick="openCatPicker()">
            <span class="cat-placeholder" id="catPickerPlaceholder">选择分类</span>
            <span class="cat-arrow">›</span>
          </button>
        </div>
        <div class="form-group">
          <label class="form-label">日期/时间</label>
          <input class="form-input" id="inputDate" type="datetime-local">
        </div>
        <div class="form-group">
          <label class="form-label">备注 (选填)</label>
          <input class="form-input" id="inputNote" type="text" placeholder="例如：Nasi Lemak" maxlength="200" autocomplete="off">
        </div>
        <button class="btn btn-primary btn-block" onclick="handleSaveRecord()">✅ 保存记录</button>
      </div>
    </div>

    <!-- Tab 2: 记录 -->
    <div class="page" id="page-records">
      <div id="recordsList"></div>
    </div>

    <!-- Tab 3: 分类 -->
    <div class="page" id="page-categories">
      <div id="categoriesList"></div>
    </div>

  </div>

  <!-- Bottom Clear Button -->
  <div class="bottom-clear">
    <button class="btn btn-danger btn-sm" onclick="handleClearAll()">清空数据</button>
  </div>

  <script>
/* ============================================================
   UTILITY FUNCTIONS
   ============================================================ */
function uuid() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
}

function formatMoney(n) {
  return Number(n).toFixed(2);
}

function escHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg, type) {
  type = type || 'success';
  var container = document.getElementById('toastContainer');
  var el = document.createElement('div');
  el.className = 'toast' + (type === 'error' ? ' error' : '');
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(function() {
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.3s';
    setTimeout(function() { el.remove(); }, 300);
  }, 2000);
}

function showModal(html, center) {
  var overlay = document.getElementById('modalOverlay');
  var content = document.getElementById('modalContent');
  content.innerHTML = html;
  if (center) {
    overlay.classList.add('center');
  } else {
    overlay.classList.remove('center');
  }
  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

/* ============================================================
   DEFAULT CATEGORIES (matches main app exactly)
   ============================================================ */
var DEFAULT_CATEGORIES = [
  { id: 'cat-root-1', name: '餐饮', icon: '🍜', color: '#6366F1', parentId: null, sortOrder: 0 },

    { id: 'cat-child-1-4', name: '饮料/咖啡', icon: '☕', color: '#6366F1', parentId: 'cat-root-1', sortOrder: 3 },
  { id: 'cat-root-2', name: '交通', icon: '🚗', color: '#10B981', parentId: null, sortOrder: 1 },

    { id: 'cat-child-2-2', name: '停车', icon: '🅿️', color: '#10B981', parentId: 'cat-root-2', sortOrder: 1 },
    { id: 'cat-child-2-3', name: '公交/地铁', icon: '🚇', color: '#10B981', parentId: 'cat-root-2', sortOrder: 2 },
    { id: 'cat-child-2-4', name: '打车', icon: '🚕', color: '#10B981', parentId: 'cat-root-2', sortOrder: 3 },
  { id: 'cat-root-3', name: '购物', icon: '🛒', color: '#F59E0B', parentId: null, sortOrder: 2 },
    { id: 'cat-child-3-1', name: '日用品', icon: '🧴', color: '#F59E0B', parentId: 'cat-root-3', sortOrder: 0 },
    { id: 'cat-child-3-2', name: '服饰', icon: '👕', color: '#F59E0B', parentId: 'cat-root-3', sortOrder: 1 },
    { id: 'cat-child-3-3', name: '电子产品', icon: '📱', color: '#F59E0B', parentId: 'cat-root-3', sortOrder: 2 },
  { id: 'cat-root-4', name: '娱乐', icon: '🎮', color: '#EF4444', parentId: null, sortOrder: 3 },
    { id: 'cat-child-4-1', name: '电影', icon: '🎬', color: '#EF4444', parentId: 'cat-root-4', sortOrder: 0 },

    { id: 'cat-child-5-1', name: '房租', icon: '🏢', color: '#8B5CF6', parentId: 'cat-root-5', sortOrder: 0 },
    { id: 'cat-child-5-2', name: '水电', icon: '💡', color: '#8B5CF6', parentId: 'cat-root-5', sortOrder: 1 },

  { id: 'cat-root-6', name: '医疗', icon: '💊', color: '#EC4899', parentId: null, sortOrder: 5 },
    { id: 'cat-child-6-1', name: '看病', icon: '🏥', color: '#EC4899', parentId: 'cat-root-6', sortOrder: 0 },
    { id: 'cat-child-6-2', name: '药品', icon: '💊', color: '#EC4899', parentId: 'cat-root-6', sortOrder: 1 },
  { id: 'cat-root-7', name: '教育', icon: '📚', color: '#14B8A6', parentId: null, sortOrder: 6 },
    { id: 'cat-child-7-1', name: '书籍', icon: '📖', color: '#14B8A6', parentId: 'cat-root-7', sortOrder: 0 },
    { id: 'cat-child-7-2', name: '课程', icon: '🎓', color: '#14B8A6', parentId: 'cat-root-7', sortOrder: 1 },

/* ============================================================
   DATASTORE — in-memory + localStorage
   ============================================================ */
var COLORS = [
  '#6366F1', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899', '#14B8A6',
  '#F97316', '#06B6D4', '#84CC16', '#A855F7', '#E11D48', '#0EA5E9', '#D97706'
];

var DataStore = {
  _data: null,

  _defaults: function() {
    return {
      records: [],
      categories: JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)),
      budgets: {},
      categoryBudgets: {},
      savingsTarget: { type: 'both', fixedAmount: 0, percent: 0 },
      colorIndex: DEFAULT_CATEGORIES.length
    };
  },

  init: function() {
    var raw = localStorage.getItem('budgetAppData');
    if (raw) {
      try {
        this._data = JSON.parse(raw);
        if (!this._data.categories || !this._data.categories.length) {
          this._data.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
        }
        if (!this._data.savingsTarget) {
          this._data.savingsTarget = { type: 'both', fixedAmount: 0, percent: 0 };
        }
        if (!this._data.categoryBudgets) {
          this._data.categoryBudgets = {};
        }
      } catch (e) {
        this._data = this._defaults();
      }
    } else {
      this._data = this._defaults();
    }
    this.save();
  },

  save: function() {
    localStorage.setItem('budgetAppData', JSON.stringify(this._data));
  },

  // Records
  getRecords: function() { return this._data.records; },
  getRecord: function(id) { return this._data.records.find(function(r) { return r.id === id; }); },

  addRecord: function(record) {
    record.id = uuid();
    record.createdAt = record.createdAt || new Date().toISOString();
    this._data.records.unshift(record);
    this.save();
    return record;
  },

  updateRecord: function(id, updates) {
    var idx = -1;
    for (var i = 0; i < this._data.records.length; i++) {
      if (this._data.records[i].id === id) { idx = i; break; }
    }
    if (idx === -1) return null;
    updates.updatedAt = new Date().toISOString();
    for (var key in updates) {
      if (updates.hasOwnProperty(key)) {
        this._data.records[idx][key] = updates[key];
      }
    }
    this.save();
    return this._data.records[idx];
  },

  deleteRecord: function(id) {
    this._data.records = this._data.records.filter(function(r) { return r.id !== id; });
    this.save();
  },

  // Categories
  getCategories: function() { return this._data.categories; },
  getCategory: function(id) {
    if (!id) return null;
    var cats = this._data.categories;
    for (var i = 0; i < cats.length; i++) {
      if (cats[i].id === id) return cats[i];
    }
    return null;
  },

  getRootCategories: function() {
    return this._data.categories.filter(function(c) { return !c.parentId; })
      .sort(function(a, b) { return a.sortOrder - b.sortOrder; });
  },

  getChildren: function(parentId) {
    return this._data.categories.filter(function(c) { return c.parentId === parentId; })
      .sort(function(a, b) { return a.sortOrder - b.sortOrder; });
  },

  getDescendantIds: function(id) {
    var ids = [id];
    var children = this.getChildren(id);
    for (var i = 0; i < children.length; i++) {
      ids = ids.concat(this.getDescendantIds(children[i].id));
    }
    return ids;
  },

  getRootAncestorId: function(id) {
    var cat = this.getCategory(id);
    if (!cat) return null;
    while (cat && cat.parentId) {
      cat = this.getCategory(cat.parentId);
    }
    return cat ? cat.id : null;
  },

  addCategory: function(cat) {
    cat.id = uuid();
    if (!cat.color) {
      var idx = this._data.colorIndex || 0;
      cat.color = COLORS[idx % COLORS.length];
      this._data.colorIndex = (this._data.colorIndex || 0) + 1;
    }
    if (typeof cat.sortOrder !== 'number') cat.sortOrder = 0;
    this._data.categories.push(cat);
    this.save();
    return cat;
  },

  updateCategory: function(id, updates) {
    var cat = null;
    for (var i = 0; i < this._data.categories.length; i++) {
      if (this._data.categories[i].id === id) { cat = this._data.categories[i]; break; }
    }
    if (!cat) return null;
    for (var key in updates) {
      if (updates.hasOwnProperty(key)) {
        cat[key] = updates[key];
      }
    }
    this.save();
    return cat;
  },

  deleteCategory: function(id) {
    var children = this.getChildren(id);
    for (var i = 0; i < children.length; i++) {
      this.deleteCategory(children[i].id);
    }
    this._data.categories = this._data.categories.filter(function(c) { return c.id !== id; });
    this.save();
  },

  // Export / Import
  exportJSON: function() {
    return JSON.stringify(this._data, null, 2);
  },

  importJSON: function(jsonStr, mode) {
    try {
      var data = JSON.parse(jsonStr);
      if (!data.records || !data.categories) return false;
      if (mode === 'replace') {
        this._data = data;
      } else {
        this._data.records = data.records.concat(this._data.records);
        var existIds = {};
        for (var i = 0; i < this._data.categories.length; i++) {
          existIds[this._data.categories[i].id] = true;
        }
        for (var j = 0; j < data.categories.length; j++) {
          if (!existIds[data.categories[j].id]) {
            this._data.categories.push(data.categories[j]);
            existIds[data.categories[j].id] = true;
          }
        }
        for (var key in (data.budgets || {})) {
          if (data.budgets.hasOwnProperty(key)) {
            this._data.budgets[key] = data.budgets[key];
          }
        }
        if (data.savingsTarget) this._data.savingsTarget = data.savingsTarget;
      }
      this.save();
      return true;
    } catch (e) {
      return false;
    }
  },

  clearAll: function() {
    this._data = this._defaults();
    this.save();
  }
};

/* Amount input: filter non-numeric, max 2 decimal places */
function setupAmountFilter() {
  var input = document.getElementById('inputAmount');
  input.addEventListener('input', function() {
    var val = this.value;
    // Remove non-numeric chars except decimal point
    val = val.replace(/[^0-9.]/g, '');
    // Allow only one decimal point
    var parts = val.split('.');
    if (parts.length > 2) {
      val = parts[0] + '.' + parts.slice(1).join('');
    }
    // Max 2 decimal places
    if (parts.length === 2 && parts[1].length > 2) {
      val = parts[0] + '.' + parts[1].substr(0, 2);
    }
    this.value = val;
  });
}

function handleSaveRecord() {

    return;

  if (!_selectedCategoryId) {

  var dateVal = document.getElementById('inputDate').value;
  if (!dateVal) {
    showToast('请选择日期/时间', 'error');
    return;
  }
  var note = document.getElementById('inputNote').value.trim().substr(0, 200);

  var record = {
    amount: amount,
    categoryId: _selectedCategoryId,
    date: dateVal,
    note: note
  };

  DataStore.addRecord(record);
  showToast('✅ 已保存');

  // Reset form
  resetAddForm();
}

function formatDateDisplay(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  if (isNaN(d.getTime())) return dateStr;
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var day = String(d.getDate()).padStart(2, '0');
  var h = String(d.getHours()).padStart(2, '0');
  var min = String(d.getMinutes()).padStart(2, '0');
  return y + '-' + m + '-' + day + ' ' + h + ':' + min;
}

    html += '    <option value="' + rootCats[i].id + '">' + rootCats[i].icon + ' ' + escHtml(rootCats[i].name) + '</option>';
  }
  html += '  </select>';
  html += '</div>';

  html += '<div class="modal-actions">';
  html += '  <button class="btn btn-outline" onclick="closeModal()">取消</button>';
  html += '  <button class="btn btn-primary" onclick="saveAddCategory()">✅ 保存</button>';
  html += '</div>';

  showModal(html, true);
}

function saveAddCategory() {
  var name = document.getElementById('catName').value.trim();
  if (!name) {
    showToast('请输入分类名称', 'error');
    document.getElementById('catName').focus();
    return;
  }
  var icon = document.getElementById('catIcon').value.trim() || '📦';
  var color = document.getElementById('catColor').value.trim() || '#6366F1';
  var parentId = document.getElementById('catParent').value || null;

  // Validate hex color
  if (!/^#[0-9A-Fa-f]{6}$/.test(color)) {
    showToast('颜色格式不正确，请使用 #RRGGBB 格式', 'error');
    return;
  }

  var newCat = {
    name: name,
    icon: icon,
    color: color,
    parentId: parentId,
    sortOrder: parentId ? DataStore.getChildren(parentId).length : DataStore.getRootCategories().length
  };

  DataStore.addCategory(newCat);
  closeModal();
  showToast('✅ 分类已添加');
  renderCategories();
}

function openEditCategory(id) {
  var cat = DataStore.getCategory(id);
  if (!cat) return;

  // If it's a default category (id starts with 'cat-'), prevent editing
  // Actually, we allow editing but not changing ID

  var rootCats = DataStore.getRootCategories();
  var isDefault = (id.indexOf('cat-root-') === 0 || id.indexOf('cat-child-') === 0);

  var html = '<div class="modal-title">编辑分类</div>';

  html += '<div class="form-group">';
  html += '  <label class="form-label">名称</label>';
  html += '  <input class="form-input" id="editCatName" type="text" value="' + escHtml(cat.name) + '" autocomplete="off">';
  html += '</div>';

  html += '<div class="form-group">';
  html += '  <label class="form-label">图标 (Emoji)</label>';
  html += '  <input class="form-input" id="editCatIcon" type="text" value="' + escHtml(cat.icon || '📦') + '" autocomplete="off">';
  html += '</div>';

  html += '<div class="form-group">';
  html += '  <label class="form-label">颜色 (Hex)</label>';
  html += '  <input class="form-input" id="editCatColor" type="text" value="' + escHtml(cat.color || '#6366F1') + '" autocomplete="off">';
  html += '</div>';

  html += '<div class="form-group">';
  html += '  <label class="form-label">上级分类</label>';
  html += '  <select class="form-input" id="editCatParent">';
  html += '    <option value="">无 (顶级分类)</option>';
  for (var i = 0; i < rootCats.length; i++) {
    var selected = rootCats[i].id === cat.parentId ? ' selected' : '';
    if (rootCats[i].id !== id) {
      html += '    <option value="' + rootCats[i].id + '"' + selected + '>' + rootCats[i].icon + ' ' + escHtml(rootCats[i].name) + '</option>';
    }
  }
  html += '  </select>';
  html += '</div>';

  html += '<div class="modal-actions">';
  html += '  <button class="btn btn-outline" onclick="closeModal()">取消</button>';
  html += '  <button class="btn btn-primary" onclick="saveEditCategory(\'' + id + '\')">保存</button>';
  html += '</div>';
  html += '<button class="btn btn-danger btn-block mt-8" onclick="confirmDeleteCategory(\'' + id + '\')">🗑️ 删除分类</button>';

  showModal(html, true);
}

function saveEditCategory(id) {
  var name = document.getElementById('editCatName').value.trim();
  if (!name) {
    showToast('请输入分类名称', 'error');
    return;
  }
  var icon = document.getElementById('editCatIcon').value.trim() || '📦';
  var color = document.getElementById('editCatColor').value.trim() || '#6366F1';
  var parentId = document.getElementById('editCatParent').value || null;

  if (!/^#[0-9A-Fa-f]{6}$/.test(color)) {
    showToast('颜色格式不正确', 'error');
    return;
  }

  DataStore.updateCategory(id, {
    name: name,
    icon: icon,
    color: color,
    parentId: parentId
  });

  closeModal();
  showToast('✅ 分类已更新');
  renderCategories();
}

function confirmDeleteCategory(id) {
  var cat = DataStore.getCategory(id);
  if (!cat) return;
  var html = '<div class="modal-title">确认删除</div>';
  html += '<p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 8px;">确定删除分类「' + escHtml(cat.icon) + ' ' + escHtml(cat.name) + '」？</p>';
  html += '<p style="font-size: 0.82rem; color: var(--text-muted);">相关记录将显示为"未知分类"</p>';
  html += '<div class="confirm-actions">';
  html += '  <button class="btn btn-outline" onclick="closeModal()">取消</button>';
  html += '  <button class="btn btn-danger" onclick="doDeleteCategory(\'' + id + '\')">确认</button>';
  html += '</div>';
  showModal(html, true);
}

function doDeleteCategory(id) {
  DataStore.deleteCategory(id);
  closeModal();
  showToast('🗑️ 分类已删除');
  renderCategories();
}

/* ============================================================
   EXPORT / IMPORT
   ============================================================ */
function handleExport() {
  var json = DataStore.exportJSON();
  var now = new Date();
  var y = now.getFullYear();
  var m = String(now.getMonth() + 1).padStart(2, '0');
  var d = String(now.getDate()).padStart(2, '0');
  var filename = 'budget-data-' + y + '-' + m + '-' + d + '.json';

  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ 数据已导出');
}

function handleImport() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var content = ev.target.result;
      showImportModal(content);
    };
    reader.readAsText(file);
  };
  input.click();
}

function showImportModal(jsonStr) {
  var html = '<div class="modal-title">导入数据</div>';
  html += '<p style="font-size: 0.88rem; color: var(--text-secondary); margin-bottom: 12px;">选择导入方式：</p>';
  html += '<div class="import-actions">';
  html += '  <button class="btn btn-outline" id="importBtnReplace">替换当前数据</button>';
  html += '  <button class="btn btn-primary" id="importBtnMerge">合并到当前数据</button>';
  html += '</div>';
  html += '<button class="btn btn-ghost btn-block mt-8" onclick="closeModal()" style="color:var(--text-muted);">取消</button>';
  showModal(html, true);

  // Attach handlers via JS to avoid encoding issues with JSON string
  document.getElementById('importBtnReplace').onclick = function() { doImport(jsonStr, 'replace'); };
  document.getElementById('importBtnMerge').onclick = function() { doImport(jsonStr, 'merge'); };
}

function doImport(jsonStr, mode) {
  var result = DataStore.importJSON(jsonStr, mode);
  if (result) {
    closeModal();
    showToast('✅ 数据导入成功');
    // Refresh current tab
    var activeTab = document.querySelector('.tab-item.active');
    if (activeTab) {
      var tab = activeTab.getAttribute('data-tab');
      if (tab === 'records') renderRecords();
      if (tab === 'categories') renderCategories();
    }
    // Also reset add form
    resetAddForm();
  } else {
    showToast('❌ 导入失败：数据格式不正确', 'error');
  }
}

/* ============================================================
   CLEAR ALL
   ============================================================ */
function handleClearAll() {
  var html = '<div class="modal-title">⚠️ 确认清空</div>';
  html += '<p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 8px;">确定要清空所有数据？此操作不可撤销！</p>';
  html += '<p style="font-size: 0.82rem; color: var(--text-muted);">将删除所有记录和自定义分类，恢复默认分类。</p>';
  html += '<div class="confirm-actions">';
  html += '  <button class="btn btn-outline" onclick="closeModal()">取消</button>';
  html += '  <button class="btn btn-danger" onclick="doClearAll()">确认清空</button>';
  html += '</div>';
  showModal(html, true);
}

function doClearAll() {
  DataStore.clearAll();
  closeModal();
  showToast('✅ 数据已清空');
  resetAddForm();
  renderRecords();
  renderCategories();
}
