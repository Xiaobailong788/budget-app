(function() {
'use strict';

const StatsEngine = {
  getRecordsInMonth(month) {
    return DataStore.getRecords().filter(r => getMonthKey(r.date || r.createdAt) === month);
  },

  getMonthTotal(month) {
    return this.getRecordsInMonth(month).reduce((sum, r) => sum + (r.amount || 0), 0);
  },

  getCategoryTotals(month) {
    const result = {};
    this.getRecordsInMonth(month).forEach(r => {
      result[r.categoryId] = (result[r.categoryId] || 0) + r.amount;
    });
    return result;
  },

  getDailyTotals(month, options = {}) {
    const daily = {};
    const records = options.excludeBills
      ? this.getRecordsInMonth(month).filter(r => !this.isBillCategory(r.categoryId))
      : this.getRecordsInMonth(month);
    records.forEach(r => {
      const d = new Date(r.date || r.createdAt);
      const day = d.getDate();
      daily[day] = (daily[day] || 0) + r.amount;
    });
    const daysInMonth = new Date(parseInt(month.split('-')[0]), parseInt(month.split('-')[1]), 0).getDate();
    const result = [];
    for (let i = 1; i <= daysInMonth; i++) {
      result.push({ day: i, total: daily[i] || 0 });
    }
    return result;
  },

  getDailyAverage(month) {
    const records = this.getRecordsInMonth(month).filter(r => !r.excludeFromAvg);
    if (!records.length) return 0;
    const daysInMonth = new Date(parseInt(month.split('-')[0]), parseInt(month.split('-')[1]), 0).getDate();
    const now = new Date();
    const today = now.getDate();
    const currentMonth = getMonthKey(now.toISOString());
    const daysPassed = month === currentMonth ? today : daysInMonth;
    return daysPassed ? records.reduce((s, r) => s + r.amount, 0) / daysPassed : 0;
  },

  getPredictedTotal(month) {
    const records = this.getRecordsInMonth(month);
    if (!records.length) return 0;
    const daysInMonth = new Date(parseInt(month.split('-')[0]), parseInt(month.split('-')[1]), 0).getDate();
    const now = new Date();
    const today = now.getDate();
    const currentMonth = getMonthKey(now.toISOString());
    const daysPassed = month === currentMonth ? today : daysInMonth;
    const total = records.reduce((s, r) => s + r.amount, 0);
    return daysPassed ? (total / daysPassed) * daysInMonth : 0;
  },

  getSavingsPrediction(month) {
    const budget = DataStore.getMonthlyIncome(month) || DataStore.getBudget(month);
    const predicted = this.getPredictedTotal(month);
    return budget - predicted;
  },

  getRemainingDailyLimit(month) {
    const budget = DataStore.getMonthlyIncome(month) || DataStore.getBudget(month);
    if (!budget) return 0;
    const spent = this.getMonthTotal(month);
    const remaining = budget - spent;
    const now = new Date();
    const daysInMonth = new Date(parseInt(month.split('-')[0]), parseInt(month.split('-')[1]), 0).getDate();
    const today = now.getDate();
    const currentMonth = getMonthKey(now.toISOString());
    const remainingDays = month === currentMonth ? (daysInMonth - today) : 0;
    if (remainingDays <= 0) return 0;
    return remaining / remainingDays;
  },

  getCategoryBreakdownDeep(month, categoryId) {
    const cat = DataStore.getCategory(categoryId);
    if (!cat) return null;
    const records = this.getRecordsInMonth(month).filter(r => r.categoryId === categoryId);
    const children = DataStore.getChildren(categoryId);
    const breakdown = {
      category: cat,
      total: records.reduce((s, r) => s + r.amount, 0),
      count: records.length,
      children: []
    };
    children.forEach(child => {
      const childBreak = this.getCategoryBreakdownDeep(month, child.id);
      if (childBreak) {
        breakdown.total += childBreak.total;
        breakdown.children.push(childBreak);
      }
    });
    return breakdown;
  },

  getCustomRangeTotals(startDate, endDate) {
    const start = new Date(startDate);
    const end = new Date(endDate);
    const records = DataStore.getRecords().filter(r => {
      const d = new Date(r.date || r.createdAt);
      return d >= start && d <= end;
    });
    const daily = {};
    records.forEach(r => {
      const key = (r.date || r.createdAt).substr(0, 10);
      daily[key] = (daily[key] || 0) + r.amount;
    });
    return {
      total: records.reduce((s, r) => s + r.amount, 0),
      count: records.length,
      daily: Object.entries(daily).sort((a,b) => a[0].localeCompare(b[0])).map(([day, total]) => ({ day, total })),
      categoryTotals: (() => {
        const ct = {};
        records.forEach(r => {
          ct[r.categoryId] = (ct[r.categoryId] || 0) + r.amount;
        });
        return ct;
      })()
    };
  },

  getOverspentCategories(month) {
    const catTotals = this.getCategoryTotals(month);
    const budget = DataStore.getMonthlyIncome(month) || DataStore.getBudget(month);
    if (!budget) return [];
    const overspent = [];
    Object.entries(catTotals).forEach(([catId, total]) => {
      const cat = DataStore.getCategory(catId);
      if (cat) {
        const pct = (total / budget) * 100;
        if (pct > 80) {
          overspent.push({ category: cat, total, percent: pct });
        }
      }
    });
    return overspent.sort((a,b) => b.percent - a.percent);
  },

  getLast7Days() {
    const result = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const key = d.toISOString().substr(0, 10);
      const dayTotal = DataStore.getRecords().filter(r => {
        const rd = (r.date || r.createdAt).substr(0, 10);
        return rd === key;
      }).reduce((s, r) => s + r.amount, 0);
      result.push({ date: key, total: dayTotal, label: (d.getMonth()+1)+'/'+d.getDate() });
    }
    return result;
  },

  // Check if a category is a bill category
  isBillCategory(categoryId) {
    const billCats = DataStore.getBillCategories();
    return billCats.some(b => b.id === categoryId);
  },

  // Get spending in bill categories only (for a month)
  getBillSpendingActual(month) {
    return this.getRecordsInMonth(month)
      .filter(r => this.isBillCategory(r.categoryId))
      .reduce((sum, r) => sum + r.amount, 0);
  },

  // Get spending in non-bill categories only
  getVariableSpending(month) {
    return this.getRecordsInMonth(month)
      .filter(r => !this.isBillCategory(r.categoryId))
      .reduce((sum, r) => sum + r.amount, 0);
  },

  // Get daily totals excluding bills
  getDailyTotalsVariable(month) {
    const daily = {};
    this.getRecordsInMonth(month)
      .filter(r => !this.isBillCategory(r.categoryId))
      .forEach(r => {
        const d = new Date(r.date || r.createdAt);
        const day = d.getDate();
        daily[day] = (daily[day] || 0) + r.amount;
      });
    const daysInMonth = new Date(parseInt(month.split('-')[0]), parseInt(month.split('-')[1]), 0).getDate();
    const result = [];
    for (let i = 1; i <= daysInMonth; i++) {
      result.push({ day: i, total: daily[i] || 0 });
    }
    return result;
  },

  // Get daily average excluding bills
  getDailyAverageVariable(month) {
    const records = this.getRecordsInMonth(month).filter(r => !this.isBillCategory(r.categoryId) && !r.excludeFromAvg);
    if (!records.length) return 0;
    const daysInMonth = new Date(parseInt(month.split('-')[0]), parseInt(month.split('-')[1]), 0).getDate();
    const now = new Date();
    const today = now.getDate();
    const currentMonth = getMonthKey(now.toISOString());
    const daysPassed = month === currentMonth ? today : daysInMonth;
    const varTotal = records.reduce((s, r) => s + r.amount, 0);
    return daysPassed ? varTotal / daysPassed : 0;
  },

  // Get combined disposable info
  getDisposableInfo(month) {
    const income = DataStore.getMonthlyIncome(month);
    const billPlanned = DataStore.getBillTotal(month);
    const billActual = this.getBillSpendingActual(month);
    const variableSpending = this.getVariableSpending(month);
    const netDisposable = Math.max(0, income - billPlanned);
    const daysInMonth = new Date(parseInt(month.split('-')[0]), parseInt(month.split('-')[1]), 0).getDate();
    const now = new Date();
    const today = now.getDate();
    const currentMonth = getMonthKey(now.toISOString());
    const daysPassed = month === currentMonth ? today : daysInMonth;
    const netDailyAvg = daysPassed > 0 ? variableSpending / daysPassed : 0;
    return { income, billPlanned, billActual, variableSpending, netDisposable, netDailyAvg };
  },

  getMonthlyTotals(numMonths = 6) {
    const result = [];
    const now = new Date();
    for (let i = numMonths - 1; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      const total = this.getMonthTotal(key);
      result.push({ month: key, total, label: key });
    }
    return result;
  }
};

  // === EXPORTS ===
  window.StatsEngine = StatsEngine;
})();
/* ============================================================

(function() {
'use strict';

const SimulationEngine = {
  /**
   * Run a what-if simulation for a given month.
   * @param {string} month - 'YYYY-MM'
   * @param {object} params - user's what-if assumptions
   * @returns {object} projection result with comparison to current trend
   */
  run(month, params) {
    if (!params) return null;
    const now = new Date();
    const isCurrentMonth = month === getMonthKey(now.toISOString());
    const today = now.getDate();
    const daysInMonth = new Date(parseInt(month.split('-')[0]), parseInt(month.split('-')[1]), 0).getDate();
    const daysPassed = isCurrentMonth ? today : daysInMonth;
    const remainingDays = Math.max(0, daysInMonth - daysPassed);

    // Override params with actuals if not specified
    const income = params.income != null ? params.income : (DataStore.getMonthlyIncome(month) || DataStore.getBudget(month) || 0);
    const bills = params.bills != null ? params.bills : DataStore.getBillTotal(month);
    const netDisposable = Math.max(0, income - bills);
    const savingsTarget = params.savingsTarget || DataStore.getSavingsTarget();
    const percentBase = DataStore.getPercentBase();
    const baseAmount = percentBase === 'net' ? netDisposable : income;
    let targetAmount = 0;
    if (savingsTarget.type === 'fixed') targetAmount = savingsTarget.fixedAmount || 0;
    else if (savingsTarget.type === 'percent') targetAmount = (savingsTarget.percent || 0) / 100 * baseAmount;
    else if (savingsTarget.type === 'both') targetAmount = (savingsTarget.fixedAmount || 0) + (savingsTarget.percent || 0) / 100 * baseAmount;
    const spendable = Math.max(0, netDisposable - targetAmount);

    // Get actual spending to date (variable categories only)
    const allRecords = DataStore.getRecords()
      .filter(r => getMonthKey(r.date || r.createdAt) === month && !StatsEngine.isBillCategory(r.categoryId));
    const actualSpent = allRecords.reduce((s, r) => s + r.amount, 0);
    const categoryTotals = {};
    const categoryDays = {};
    allRecords.forEach(r => {
      categoryTotals[r.categoryId] = (categoryTotals[r.categoryId] || 0) + r.amount;
      const d = new Date(r.date || r.createdAt);
      const day = d.getDate();
      if (!categoryDays[r.categoryId]) categoryDays[r.categoryId] = new Set();
      categoryDays[r.categoryId].add(day);
    });

    // Build full category tree with current stats
    const allCats = DataStore.getCategories();
    const catMap = {}; allCats.forEach(c => catMap[c.id] = c);
    const rootCats = DataStore.getRootCategories();

    // Compute leaf category ids
    const leafCatIds = new Set();
    allCats.forEach(c => {
      // It's a leaf if it has no children
      const hasChildren = allCats.some(x => x.parentId === c.id);
      if (!hasChildren) leafCatIds.add(c.id);
    });

    // Get current daily average per category
    const getCurrentDailyAvg = (catId) => {
      return daysPassed > 0 ? (categoryTotals[catId] || 0) / daysPassed : 0;
    };

    // For each leaf category, compute projected spending
    const categoryProjections = {};
    let totalProjectedRemaining = 0;
    const adjustments = (params.categoryAdjustments) || {};
    const globalAdj = params.globalAdjustment || { mode: null, value: null };

    // First pass: get root-level settings for inheritance
    const rootSettings = {};
    Object.entries(adjustments).forEach(([catId, adj]) => {
      const cat = catMap[catId];
      if (cat && !cat.parentId) {
        rootSettings[catId] = adj;
      }
    });

    // Process leaf categories
    leafCatIds.forEach(catId => {
      const cat = catMap[catId];
      if (!cat) return;
      const rootId = cat.parentId || catId;
      const rootCat = rootId === catId ? cat : catMap[rootId];

      // Determine effective adjustment: direct first, then inherit from root
      let adj = adjustments[catId];
      if (!adj) adj = adjustments[rootId] || null;
      if (!adj) adj = { mode: 'trend', value: null };

      const currentAvg = getCurrentDailyAvg(catId);
      let projectedRemaining;

      switch (adj.mode) {
        case 'daily':
          projectedRemaining = adj.value * remainingDays;
          break;
        case 'total':
          projectedRemaining = adj.value || 0;
          break;
        case 'percent':
          projectedRemaining = currentAvg * remainingDays * (1 + (adj.value || 0) / 100);
          break;
        case 'adjust':
          projectedRemaining = (currentAvg + (adj.value || 0)) * remainingDays;
          break;
        case 'zero':
          projectedRemaining = 0;
          break;
        case 'trend':
        default:
          projectedRemaining = currentAvg * remainingDays;
          break;
      }

      // Apply global adjustment if the category doesn't have a specific non-trend override
      if (globalAdj.mode && adj.mode === 'trend') {
        if (globalAdj.mode === 'percent') {
          projectedRemaining = projectedRemaining * (1 + (globalAdj.value || 0) / 100);
        } else if (globalAdj.mode === 'amount') {
          projectedRemaining = projectedRemaining + (globalAdj.value || 0) * remainingDays;
        }
      }

      projectedRemaining = Math.max(0, projectedRemaining);
      totalProjectedRemaining += projectedRemaining;

      categoryProjections[catId] = {
        category: cat,
        rootId: rootId,
        rootName: rootCat ? rootCat.name : cat.name,
        currentTotal: categoryTotals[catId] || 0,
        currentDailyAvg: currentAvg,
        mode: adj.mode,
        value: adj.value,
        projectedRemaining: projectedRemaining,
        projectedTotal: (categoryTotals[catId] || 0) + projectedRemaining
      };
    });

    // Add hypothetical categories
    const hypotheticals = (params.hypotheticalCategories) || [];
    let hypotheticalTotal = 0;
    const hypotheticalProjections = [];
    hypotheticals.forEach(h => {
      const daily = h.type === 'daily' ? (h.amount || 0) : ((h.amount || 0) / remainingDays);
      const hypRemaining = h.type === 'daily' ? (h.amount || 0) * remainingDays : (h.amount || 0);
      hypotheticalTotal += hypRemaining;
      hypotheticalProjections.push({
        name: h.name,
        icon: h.icon || '❓',
        daily: daily,
        projectedRemaining: hypRemaining
      });
    });
    totalProjectedRemaining += hypotheticalTotal;

    // Account for spending on non-leaf categories (e.g., records on root categories directly)
    const leafTotalCurrent = Object.values(categoryProjections).reduce((s, p) => s + p.currentTotal, 0);
    const unaccounted = Math.max(0, actualSpent - leafTotalCurrent);
    if (unaccounted > 0.01) {
      const unaccountedProjection = (unaccounted / Math.max(1, daysPassed)) * remainingDays;
      totalProjectedRemaining += unaccountedProjection;
    }

    // Aggregate to root level
    const rootProjections = {};
    rootCats.forEach(rc => {
      const children = Object.values(categoryProjections).filter(p => p.rootId === rc.id);
      const currentTotal = children.reduce((s, p) => s + p.currentTotal, 0);
      const projectedRemaining = children.reduce((s, p) => s + p.projectedRemaining, 0);
      rootProjections[rc.id] = {
        category: rc,
        currentTotal: currentTotal,
        projectedRemaining: projectedRemaining,
        projectedTotal: currentTotal + projectedRemaining,
        children: children
      };
    });

    // Global result
    const totalProjected = actualSpent + totalProjectedRemaining;
    const projectedSavings = netDisposable - totalProjected;
    const projectedDailyAvg = totalProjected / daysInMonth;
    const savingsAttained = projectedSavings >= targetAmount;

    // Current trend (for comparison) — use StatsEngine to match Overview exactly
    const trendTotal = StatsEngine.getPredictedTotal(month);
    const trendDailyAvg = StatsEngine.getDailyAverage(month);
    const unpaidBills = Math.max(0, DataStore.getBillTotal(month) - StatsEngine.getBillSpendingActual(month));
    const trendSavings = StatsEngine.getSavingsPrediction(month) - unpaidBills;

    console.log('[SimEngine] result:', {
      month,
      income, bills, actualSpent, totalProjectedRemaining, totalProjected,
      trendTotal, trendDailyAvg, trendSavings,
      daysPassed, remainingDays, daysInMonth,
      netDisposable, targetAmount, spendable,
      actualBills: StatsEngine.getBillSpendingActual(month),
      overviewPredicted: StatsEngine.getPredictedTotal(month),
      simTotalPlusBills: totalProjected + StatsEngine.getBillSpendingActual(month)
    });

    return {
      // Parameters used
      params: params,
      income: income,
      bills: bills,
      netDisposable: netDisposable,
      targetAmount: targetAmount,
      spendable: spendable,

      // Actuals
      daysPassed: daysPassed,
      remainingDays: remainingDays,
      daysInMonth: daysInMonth,
      actualSpent: actualSpent,

      // Projection
      totalProjected: totalProjected,
      projectedRemaining: totalProjectedRemaining,
      projectedDailyAvg: projectedDailyAvg,
      projectedSavings: projectedSavings,
      savingsAttained: savingsAttained,
      hypotheticalTotal: hypotheticalTotal,

      // Current trend (comparison)
      trendTotal: trendTotal,
      trendDailyAvg: trendDailyAvg,
      trendSavings: trendSavings,

      // Per-root-category breakdown
      rootProjections: rootProjections,

      // Hypothetical categories
      hypotheticalProjections: hypotheticalProjections,

      // Leaf projections for detail
      categoryProjections: categoryProjections
    };
  },

  /**
   * Get the current trend projection (no what-if changes).
   */
  getCurrentTrend(month) {
    return this.run(month, {});
  }
};

  // === EXPORTS ===
  window.SimulationEngine = SimulationEngine;
})();

function navigateTo(tab) {
  if (tab === currentTab && tab !== 'add') {
    // Force re-render if page is empty (e.g., on initial load)
    const pageEl = document.getElementById('page-' + tab);
    if (pageEl && pageEl.innerHTML.trim()) return;

  window.currentTab = tab;

  // Update page sections
  document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
  const pageEl = document.getElementById('page-' + tab);
  if (pageEl) pageEl.classList.add('active');

  // Update nav items
  document.querySelectorAll('.nav-item, .sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });

  // Update title
  document.getElementById('pageTitle').textContent = pageTitles[tab] || tab;

  // Trigger render
  if (tab === 'overview') renderOverview();
  else if (tab === 'add') renderAddPage();
  else if (tab === 'records') renderRecords();
  else if (tab === 'categories') renderCategories();
  else if (tab === 'stats') renderStats();
  else if (tab === 'report') renderReport();
  else if (tab === 'whatif') renderWhatIf();
  else if (tab === 'settings') renderSettings();

  let cat = DataStore.getCategory(catId);
  while (cat) {

  return parts.join(' > ');

function buildCategoryTreePicker(cats, depth, context) {
  let html = '';
  cats.forEach(cat => {

    html += `
      <div style="padding:8px 12px;cursor:pointer;border-radius:var(--radius-sm);transition:var(--transition-fast);display:flex;align-items:center;gap:8px;margin-left:${indent}px"

        <span>${escHtml(cat.icon)}</span>

      </div>

    if (children.length) {
      html += buildCategoryTreePicker(children, depth + 1, context);

}

function refreshOverviewBudget() {
  const now = new Date();
  const month = getMonthKey(now.toISOString());
  const includeBills = isBillToggleChecked('overviewBudget');
  const monthTotal = includeBills ? StatsEngine.getMonthTotal(month) : StatsEngine.getVariableSpending(month);
  const budget = DataStore.getMonthlyIncome(month) || DataStore.getBudget(month);
  if (!budget) return;

  const totalBills = DataStore.getBillTotal(month);
  const savingsTarget = DataStore.getSavingsTarget();
  const percentBase = DataStore.getPercentBase();
  const netDisposable = Math.max(0, budget - totalBills);
  const baseAmount = percentBase === 'net' ? netDisposable : budget;
  const targetAmount = (() => {
    const t = savingsTarget;
    if (t.type === 'fixed') return t.fixedAmount || 0;
    if (t.type === 'percent') return baseAmount * (t.percent || 0) / 100;
    if (t.type === 'both') return (t.fixedAmount || 0) + (baseAmount * (t.percent || 0) / 100);
    return 0;
  })();
  const spendableBudget = Math.max(0, netDisposable - targetAmount);
  const budgetPct = includeBills
    ? (budget > 0 ? (monthTotal / budget) * 100 : 0)
    : (spendableBudget > 0 ? (monthTotal / spendableBudget) * 100 : 0);

  // Redraw ring
  const budgetOverspend = budgetPct > 100;
  drawRing('budgetRing', Math.min(budgetPct, 200) / 100, budgetOverspend ? '#EF4444' : '#6366F1',
    (budgetOverspend ? '+' : '') + budgetPct.toFixed(0) + '%', '#EF4444');

  // Update label below ring
  const parent = document.getElementById('budgetRing')?.parentElement;
  if (!parent) return;
  const labelEl = parent.querySelector('.text-sm.text-secondary');
  if (labelEl) {
    labelEl.textContent = budgetPct > 100
      ? '超支 ' + formatMoney(monthTotal - (includeBills ? budget : spendableBudget))
      : formatMoney(monthTotal) + ' / ' + formatMoney(includeBills ? budget : spendableBudget);
    labelEl.style.color = budgetPct > 100 ? 'var(--danger)' : '';
    labelEl.style.fontWeight = budgetPct > 100 ? '600' : '';
  }

  // Update bottom formula text
  const formulaEl = parent.querySelector('.text-xs.text-muted');
  if (formulaEl) {
    formulaEl.remove();
  }
  if (targetAmount > 0 && budget > 0) {
    const newFormula = document.createElement('div');
    newFormula.className = 'text-xs text-muted mt-4';
    newFormula.textContent = `月收入 ${formatMoney(budget)}` + (totalBills > 0 ? ` − 账单 ${formatMoney(totalBills)}` : '') + ` − 储蓄 ${formatMoney(targetAmount)} = 日常可用 ${formatMoney(spendableBudget)}`;

/* ============================================================

(function() {
'use strict';
function drawRing(canvasId, progress, color, label, overspendColor) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const tc = getThemeColors();
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const cssSize = rect.width || 160;
  const bufferSize = Math.round(cssSize * dpr);
  if (canvas.width !== bufferSize || canvas.height !== bufferSize) {
    canvas.width = bufferSize;
    canvas.height = bufferSize;
  }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const cx = cssSize / 2, cy = cssSize / 2, r = cssSize * 0.38, lineW = cssSize * 0.1;

  ctx.clearRect(0, 0, cssSize, cssSize);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = tc.border;
  ctx.lineWidth = lineW;
  ctx.lineCap = 'round';
  ctx.stroke();

  const startAngle = -Math.PI / 2;
  const normalProgress = Math.min(progress, 1);

  // Normal progress (up to 100%)
  if (normalProgress > 0) {
    const endAngle = startAngle + Math.PI * 2 * normalProgress;
    ctx.beginPath();
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // Overspend portion (beyond 100%) in red
  if (progress > 1) {
    const overshoot = Math.min(progress - 1, 1);
    const overStart = startAngle + Math.PI * 2 * normalProgress;
    const overEnd = overStart + Math.PI * 2 * overshoot;
    ctx.beginPath();
    ctx.arc(cx, cy, r, overStart, overEnd);
    ctx.strokeStyle = overspendColor || '#EF4444';
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // Label
  ctx.fillStyle = progress > 1 ? (overspendColor || '#EF4444') : color;
  ctx.font = `bold ${cssSize * 0.16}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, cy);
}

function drawSparkline(canvasId, data) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !data.length) return;
  const tc = getThemeColors();
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = rect.width || 600;
  const ch = 80;
  if (canvas.width !== Math.round(w * dpr) || canvas.height !== Math.round(ch * dpr)) {
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(ch * dpr);
  }

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const cw = w, chartH = ch;

  const maxVal = Math.max(...data.map(d => d.total), 0.01);
  const minVal = 0;
  const padding = { top: 8, bottom: 8, left: 8, right: 8 };
  const plotW = cw - padding.left - padding.right;
  const plotH = chartH - padding.top - padding.bottom;

  // Draw line
  ctx.beginPath();
  data.forEach((d, i) => {
    const x = padding.left + (i / (data.length - 1)) * plotW;
    const y = padding.top + plotH - ((d.total - minVal) / (maxVal - minVal)) * plotH;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = '#6366F1';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Fill area
  const lastIdx = data.length - 1;
  const lastX = padding.left + (lastIdx / (data.length - 1)) * plotW;
  const lastY = padding.top + plotH - ((data[lastIdx].total - minVal) / (maxVal - minVal)) * plotH;
  ctx.lineTo(lastX, padding.top + plotH);
  ctx.lineTo(padding.left, padding.top + plotH);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, padding.top, 0, padding.top + plotH);
  grad.addColorStop(0, 'rgba(99,102,241,0.2)');
  grad.addColorStop(1, 'rgba(99,102,241,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Dots
  data.forEach((d, i) => {
    const x = padding.left + (i / (data.length - 1)) * plotW;
    const y = padding.top + plotH - ((d.total - minVal) / (maxVal - minVal)) * plotH;
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#6366F1';
    ctx.fill();
  });
}

  // === EXPORTS ===
  window.drawRing = drawRing;
  window.drawSparkline = drawSparkline;
})();

function getFilteredRecords() {
  let records = DataStore.getRecords();
  const f = recordsFilter;
  if (f.keyword) {
    const kw = f.keyword.toLowerCase();
    records = records.filter(r => (r.note || '').toLowerCase().includes(kw));
  }
  if (f.categoryId) {
    const descIds = DataStore.getDescendantIds(f.categoryId);
    records = records.filter(r => descIds.includes(r.categoryId));
  }
  if (f.dateStart) {
    records = records.filter(r => (r.date || r.createdAt) >= f.dateStart);
  }
  if (f.dateEnd) {
    records = records.filter(r => (r.date || r.createdAt) <= f.dateEnd + 'T23:59');
  }
  if (f.amountMin) {
    records = records.filter(r => r.amount >= parseFloat(f.amountMin));
  }
  if (f.amountMax) {
    records = records.filter(r => r.amount <= parseFloat(f.amountMax));
  }
  if (f.overspentOnly) {
    // Get the current month's overspent category IDs
    const currentMonth = getBudgetMonth();
    const catBudgets = DataStore.getAllCategoryBudgets();
    const overspentIds = new Set();
    const catTotals = {};
    // Calculate spending per root category for current month
    records.forEach(r => {
      const m = getMonthKey(r.date || r.createdAt);
      if (m === currentMonth) {
        const rootId = getRootAncestorId(r.categoryId);
        if (rootId) {
          catTotals[rootId] = (catTotals[rootId] || 0) + r.amount;
        }
      }
    });
    // Find overspent root categories
    Object.entries(catBudgets).forEach(([key, budget]) => {
      if (budget > 0) {
        const [catId, month] = key.split(':');
        if (month === currentMonth) {
          const spent = catTotals[catId] || 0;
          if (spent > budget) {
            overspentIds.add(catId);
            // Also add all descendant IDs
            DataStore.getDescendantIds(catId).forEach(id => overspentIds.add(id));
          }
        }
      }
    });
    if (overspentIds.size > 0) {
      records = records.filter(r => {
        const rootId = getRootAncestorId(r.categoryId);
        return rootId && overspentIds.has(rootId);
      });
    }
  }
  // Apply sorting
  if (recordsSort && recordsSort.length > 0) {
    records.sort((a, b) => {
      for (const level of recordsSort) {
        let cmp = 0;
        const dir = level.dir === 'asc' ? 1 : -1;
        switch (level.field) {
          case 'date':
            cmp = ((a.date || a.createdAt) || '').localeCompare((b.date || b.createdAt) || '');
            break;
          case 'amount':
            cmp = (a.amount || 0) - (b.amount || 0);
            break;
          case 'note':
            cmp = (a.note || '').localeCompare(b.note || '');
            break;
          case 'category': {
            const ca = DataStore.getCategory(a.categoryId);
            const cb = DataStore.getCategory(b.categoryId);
            cmp = (ca ? ca.name : '').localeCompare(cb ? cb.name : '');
            break;
          }
        }
        if (cmp !== 0) return cmp * dir;
      }
      return 0;
    });
  }
  return records;
}

        <!-- Desktop delete button (always visible on hover) -->
        <button class="btn btn-ghost btn-sm record-del-btn" 
          style="position:absolute;top:4px;right:4px;padding:2px 6px;font-size:0.75rem;opacity:0;transition:opacity 0.2s"
          onclick="event.stopPropagation();deleteRecordConfirm('${r.id}')" title="删除">🗑️</button>
        ` : ''}
      </div>
    `;
    }
  });

  // Pagination controls
  if (totalPages > 1) {
    const p = page;
    const btnStyle = 'padding:4px 10px;font-size:0.78rem;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);color:var(--text);cursor:pointer';
    const btnActive = 'padding:4px 10px;font-size:0.78rem;border:1px solid var(--primary);border-radius:4px;background:var(--primary);color:#fff;cursor:pointer';
    const btnDisabled = 'padding:4px 10px;font-size:0.78rem;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);color:var(--text-muted);cursor:default;opacity:0.4';
    
    html += '<div style="display:flex;align-items:center;gap:6px;justify-content:center;padding:16px 0 8px;flex-wrap:wrap">';
    
    // First page
    html += `<button style="${p === 0 ? btnDisabled : btnStyle}" onclick="recordsPage=0;renderRecordsList()" ${p === 0 ? 'disabled' : ''}>«</button>`;
    // Prev page
    html += `<button style="${p === 0 ? btnDisabled : btnStyle}" onclick="recordsPage=${p-1};renderRecordsList()" ${p === 0 ? 'disabled' : ''}>‹</button>`;
    
    // Page numbers - show at most 7 around current page
    const pageWindowStart = Math.max(0, p - 3);
    const pageWindowEnd = Math.min(totalPages - 1, p + 3);
    for (let i = pageWindowStart; i <= pageWindowEnd; i++) {
      html += `<button style="${i === p ? btnActive : btnStyle}" onclick="recordsPage=${i};renderRecordsList()">${i+1}</button>`;
    }
    
    // Next page
    html += `<button style="${p >= totalPages - 1 ? btnDisabled : btnStyle}" onclick="recordsPage=${p+1};renderRecordsList()" ${p >= totalPages - 1 ? 'disabled' : ''}>›</button>`;
    // Last page
    html += `<button style="${p >= totalPages - 1 ? btnDisabled : btnStyle}" onclick="recordsPage=${totalPages-1};renderRecordsList()" ${p >= totalPages - 1 ? 'disabled' : ''}>»</button>`;
    
    html += `<span class="text-xs text-muted" style="margin-left:4px">${p+1}/${totalPages} 页 (${filtered.length} 条)</span>`;
    html += '</div>';
  }

  container.innerHTML = html;

  // Attach per-card events (normal view only for swipe; compact handles its own)
  container.querySelectorAll('.record-card').forEach(card => {
    const isCompact = card.classList.contains('compact');

    if (!isCompact) {
      // Normal view: mouse hover for delete button
      card.addEventListener('mouseenter', () => {
        const btn = card.querySelector('.record-del-btn');
        if (btn) btn.style.opacity = '0.6';
      });
      card.addEventListener('mouseleave', () => {
        const btn = card.querySelector('.record-del-btn');
        if (btn) btn.style.opacity = '0';
      });
      card.addEventListener('click', (e) => {
        if (e.target.closest('.record-delete-btn') || e.target.closest('.record-del-btn')) return;
        openEditRecord(card.dataset.id);
      });

      // Swipe to delete (normal view only)
      let startX = 0, currentX = 0, isDragging = false;
      card.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        isDragging = true;
      });
      card.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        currentX = e.touches[0].clientX;
        const diff = startX - currentX;
        if (diff > 0) {
          const deleteBtn = card.querySelector('.record-delete-btn');
          deleteBtn.style.right = Math.max(-80 + Math.min(diff, 80)) + 'px';
          card.style.transform = `translateX(${-Math.min(diff, 80)}px)`;
        }
      });
      card.addEventListener('touchend', () => {
        isDragging = false;
        const diff = startX - currentX;
        const deleteBtn = card.querySelector('.record-delete-btn');
        if (diff > 40) {
          deleteBtn.style.right = '0';
          card.style.transform = 'translateX(-80px)';
          deleteBtn.onclick = (e) => {
            e.stopPropagation();
            deleteRecordConfirm(card.dataset.id);
          };
        } else {
          deleteBtn.style.right = '-80px';
          card.style.transform = '';
        }
      });
    }
  });

  // Remove any leftover sentinel
  const oldSentinel = document.getElementById('recordsSentinel');
  if (oldSentinel) oldSentinel.remove();
}

/* ===== BATCH OPERATIONS ===== */
function toggleBatchMode() {
  batchMode = !batchMode;
  if (!batchMode) {
    selectedRecordIds.clear();
  }
  renderRecords();
}

function toggleRecordSelection(id) {
  if (selectedRecordIds.has(id)) {
    selectedRecordIds.delete(id);
  } else {
    selectedRecordIds.add(id);
  }
  renderRecordsList();
  updateBatchCount();
}

function updateBatchCount() {
  const countEl = document.getElementById('batchCount');
  if (countEl) {
    countEl.textContent = '已选 ' + selectedRecordIds.size + ' 条';
  }
  const toolbar = document.getElementById('batchToolbar');
  if (toolbar) {
    const count = selectedRecordIds.size;
    // Keep toolbar visible in batch mode even if nothing selected
  }
}

function batchCancel() {
  selectedRecordIds.clear();
  batchMode = false;
  renderRecords();
}

function batchDelete() {
  const count = selectedRecordIds.size;
  if (count === 0) {
    showToast('请先选择要删除的记录', 'warning');
    return;
  }
  showModal(`
    <div class="modal-title">确认批量删除</div>
    <p style="color:var(--text-secondary);margin-bottom:16px">确定要删除选中的 <strong>${count}</strong> 条记录吗？此操作不可撤销。</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-danger" onclick="confirmBatchDelete()">删除 ${count} 条</button>
    </div>
  `);
}

function confirmBatchDelete() {
  const ids = [...selectedRecordIds];
  ids.forEach(id => {
    DataStore.softDeleteRecord(id);
  });
  selectedRecordIds.clear();
  batchMode = false;
  closeModal();
  showToast(`🗑️ 已删除 ${ids.length} 条记录`);
  refreshCurrentPage();
}

function batchChangeCategory() {
  const count = selectedRecordIds.size;
  if (count === 0) {
    showToast('请先选择要修改的记录', 'warning');
    return;
  }
  // Show category picker
  const roots = DataStore.getRootCategories();
  let html = `<div class="modal-title">批量修改分类</div>
    <p class="text-sm text-secondary mb-8">将选中的 <strong>${count}</strong> 条记录分类修改为：</p>
    <div style="max-height:50vh;overflow-y:auto">`;
  html += buildBatchCategoryTree(roots, 0);
  html += '</div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button></div>';
  showModal(html);
}

function buildBatchCategoryTree(cats, depth) {
  let html = '';
  cats.forEach(cat => {
    const children = DataStore.getChildren(cat.id);
    const indent = depth * 20;
    html += `
      <div style="padding:8px 12px;cursor:pointer;border-radius:var(--radius-sm);transition:var(--transition-fast);display:flex;align-items:center;gap:8px;margin-left:${indent}px"
           onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''"
           onclick="confirmBatchChangeCategory('${cat.id}')">
        <span style="width:10px;height:10px;border-radius:50%;background:${cat.color};display:inline-block"></span>
        <span>${escHtml(cat.icon)}</span>
        <span>${escHtml(cat.name)}</span>
      </div>`;
    if (children.length) {
      html += buildBatchCategoryTree(children, depth + 1);
    }
  });
  return html;
}

function confirmBatchChangeCategory(catId) {
  const cat = DataStore.getCategory(catId);
  if (!cat) return;
  const ids = [...selectedRecordIds];
  ids.forEach(id => {
    DataStore.updateRecord(id, { categoryId: catId });
  });
  selectedRecordIds.clear();
  batchMode = false;
  closeModal();
  showToast(`✅ 已将 ${ids.length} 条记录分类改为 ${cat.icon} ${cat.name}`);
  refreshCurrentPage();
}

function deleteRecordConfirm(id) {
  const record = DataStore.getRecord(id);
  if (!record) return;
  const cat = DataStore.getCategory(record.categoryId);
  showModal(`
    <div class="modal-title">确认删除</div>
    <p style="color:var(--text-secondary);margin-bottom:16px">确定要删除这条记录吗？</p>
    <div style="border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span>${cat ? cat.icon : '❓'}</span>
        <span>${cat ? escHtml(cat.name) : '未知分类'}</span>
        <span style="margin-left:auto;font-weight:700">${formatMoney(record.amount)}</span>
      </div>
      ${record.note ? '<div style="font-size:0.85rem;color:var(--text-muted)">' + escHtml(record.note) + '</div>' : ''}
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-outline" onclick="confirmDeleteRecord('${id}')">软删除（可撤销）</button>
      <button class="btn btn-danger" onclick="confirmHardDeleteRecord('${id}')">立即删除</button>
    </div>
  `);
}

function confirmDeleteRecord(id) {
  logEvent('confirmDeleteRecord', 'id=' + id);
  const record = DataStore.softDeleteRecord(id);
  closeModal();
  if (record) {
    // Show undo toast
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast warning';
    toast.innerHTML = `<span>🗑️</span> 已删除，<button class="btn btn-sm btn-primary" style="padding:2px 10px;font-size:0.8rem" onclick="undoDelete(this)">撤销</button>`;
    container.appendChild(toast);
    toast._pendingId = id;
    // Auto-dismiss after 5s
    toast._autoTimeout = setTimeout(() => {
      if (toast.parentNode) {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-10px)';
        toast.style.transition = 'all 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }
    }, 5000);
  }
  refreshCurrentPage();
}

function confirmHardDeleteRecord(id) {
  logEvent('confirmHardDeleteRecord', 'id=' + id);
  closeModal();
  const success = DataStore.forceDeleteRecord(id);
  if (success) {
    showToast('🗑️ 已永久删除', 'success');
  } else {
    showToast('❌ 删除失败：记录不存在', 'error');
  }
  refreshCurrentPage();
}

function undoDelete(btn) {
  const toast = btn.closest('.toast');
  if (!toast) return;
  const success = DataStore.undoDelete();
  if (success) {
    toast.innerHTML = `<span>✅</span> 已恢复`;
    toast.classList.add('success');
    toast.classList.remove('warning');
    clearTimeout(toast._autoTimeout);
    setTimeout(() => {
      if (toast.parentNode) {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-10px)';
        toast.style.transition = 'all 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }
    }, 2000);
    refreshCurrentPage();
  } else {
    toast.innerHTML = `<span>❌</span> 无法撤销（已超时）`;
    toast.classList.add('error');
    toast.classList.remove('warning');
  }
}

function openEditRecord(id) {
  const record = DataStore.getRecord(id);
  if (!record) return;
  const cat = DataStore.getCategory(record.categoryId);
  selectedCategoryId = record.categoryId;

  showModal(`
    <div class="modal-title">编辑记录</div>
    <form id="editForm" onsubmit="submitEditRecord(event, '${id}')">
      <div class="input-group">
        <label class="input-label">金额 (RM)</label>
        <div style="position:relative">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-weight:700;color:var(--primary)">RM</span>
          <input type="text" id="editAmount" class="input-field" value="${record.amount}" style="padding-left:44px;font-size:1.2rem;font-weight:700" inputmode="decimal">
        </div>
      </div>
      <div class="input-group">
        <label class="input-label">分类</label>
        <button type="button" class="input-field" style="text-align:left;cursor:pointer" onclick="openCategoryPicker('edit')">
          <span id="editCategoryDisplay">${cat ? escHtml(cat.icon) + ' ' + escHtml(cat.name) : '请选择'}</span>
        </button>
      </div>
      <div class="input-group">
        <label class="input-label">日期时间</label>
        <input type="datetime-local" id="editDateTime" class="input-field" value="${(record.date || record.createdAt).slice(0, 16)}">
      </div>
      <div class="input-group">
        <label class="input-label">备注</label>
        <input type="text" id="editNote" class="input-field" value="${escHtml(record.note || '')}">
      </div>
      <div class="input-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0">
          <input type="checkbox" id="editExcludeAvg" ${record.excludeFromAvg ? 'checked' : ''} style="width:18px;height:18px;cursor:pointer">
          <span class="text-sm text-secondary">📌 不计日均（一次性大额消费）</span>
        </label>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">取消</button>
        <button type="button" class="btn btn-danger" onclick="closeModal();deleteRecordConfirm('${id}')">🗑️ 删除</button>
        <button type="submit" class="btn btn-primary">保存</button>
      </div>
    </form>
  `);

  // Amount input formatting
  const editAmountInput = document.getElementById('editAmount');
  if (editAmountInput) {
    editAmountInput.addEventListener('input', function() {
      let val = this.value.replace(/[^0-9.]/g, '');
      const parts = val.split('.');
      if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
      if (parts[1] && parts[1].length > 2) val = parts[0] + '.' + parts[1].slice(0, 2);
      this.value = val;
    });
  }
}

function submitEditRecord(e, id) {
  e.preventDefault();
  const amount = parseFloat(document.getElementById('editAmount').value);
  if (!amount || amount <= 0) { showToast('请输入有效金额', 'error'); return; }
  if (!selectedCategoryId) { showToast('请选择分类', 'error'); return; }

  DataStore.updateRecord(id, {
    amount,
    categoryId: selectedCategoryId,
    date: document.getElementById('editDateTime').value,
    note: document.getElementById('editNote').value.trim(),
    excludeFromAvg: document.getElementById('editExcludeAvg').checked,
    updatedAt: new Date().toISOString()
  });
  selectedCategoryId = null;
  closeModal();
  showToast('✅ 记录已更新');
  refreshCurrentPage();
}

function refreshPageData() {
  // Force-reload ALL data from localStorage, clearing any stale in-memory state
  const success = DataStore.reload();
  // Also clear any pending soft-delete state
  const pending = DataStore.getPendingDelete();
  if (pending) {
    DataStore._finalizeDelete(pending.id);
  }
  if (success) {
    showToast('✅ 数据已刷新', 'success');
  } else {
    showToast('❌ 数据刷新失败', 'error');
  }
  // Re-render ALL pages to ensure every view reflects current data
  if (typeof renderOverview === 'function') renderOverview();
  if (typeof renderAddPage === 'function') renderAddPage();
  if (typeof renderCategories === 'function') renderCategories();
  if (typeof renderStats === 'function') renderStats();
  if (typeof renderReport === 'function') renderReport();
  if (typeof renderSettings === 'function') renderSettings();
  if (typeof renderWhatIf === 'function') renderWhatIf();
  // Finally re-render the records page (current context)
  renderRecords();
}

/* ===== SORT FUNCTIONS ===== */
function renderSortControls() {
  const container = document.getElementById('sortControls');
  if (!container) return;
  const fieldLabels = { date: '日期', amount: '金额', note: '备注', category: '分类' };
  let html = '';
  recordsSort.forEach((level, idx) => {
    const arrow = level.dir === 'asc' ? '↑' : '↓';
    html += `
      <div class="sort-level" style="display:inline-flex;align-items:center;gap:4px;margin:2px 4px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);">
        <select onchange="updateSortField(${idx}, this.value)" style="padding:2px 4px;font-size:0.75rem;border:1px solid var(--border);border-radius:3px;background:var(--card-bg);color:var(--text);">
          ${['date','amount','note','category'].map(f => `<option value="${f}" ${level.field === f ? 'selected' : ''}>${fieldLabels[f]}</option>`).join('')}
        </select>
        <button class="btn btn-ghost btn-sm" style="padding:0 4px;font-size:0.8rem;border:none;cursor:pointer;background:none" onclick="toggleSortDir(${idx})" title="切换排序方向">${arrow}</button>
        ${recordsSort.length > 1 ? `<button class="btn btn-ghost btn-sm" style="padding:0 4px;font-size:0.8rem;border:none;cursor:pointer;background:none;color:var(--danger)" onclick="removeSortLevel(${idx})" title="移除排序">×</button>` : ''}
      </div>
    `;
  });
  container.innerHTML = html;
}

function addSortLevel() {
  recordsSort.push({ field: 'date', dir: 'desc' });
  applySort();
}

function removeSortLevel(idx) {
  recordsSort.splice(idx, 1);
  if (recordsSort.length === 0) {
    recordsSort.push({ field: 'date', dir: 'desc' });
  }
  applySort();
}

function updateSortField(idx, field) {
  recordsSort[idx].field = field;
  applySort();
}

function toggleSortDir(idx) {
  recordsSort[idx].dir = recordsSort[idx].dir === 'asc' ? 'desc' : 'asc';
  applySort();
}

function clearSort() {
  recordsSort = [{ field: 'date', dir: 'desc' }];
  applySort();
}

function applySort() {
  localStorage.setItem('budgetRecordsSort', JSON.stringify(recordsSort));
  window.recordsPage = 0;
  renderRecordsList();
  renderSortControls();
}

      html += `<div class="cat-children">${buildCategoryTreeHTML(children, depth + 1)}</div>`;
    }
    
    html += `</div>`; // end cat-body-inner
    html += `</div>`; // end cat-body
    html += `</div>`; // end cat-item
  });
  return html;
}

function saveCategoryBudget(catId, month, value, type) {
  const amount = parseFloat(value) || 0;
  const budgetType = type || 'fixed';
  
  // Validate: child budget cannot exceed parent's budget
  const cat = DataStore.getCategory(catId);
  if (cat && cat.parentId && amount > 0) {
    const parentBudget = DataStore.getCategoryBudget(cat.parentId, month).value || 0;
    // Sum of all children's budgets (including this new one)
    const siblings = DataStore.getChildren(cat.parentId);
    let siblingSum = 0;
    siblings.forEach(s => {
      if (s.id === catId) return; // exclude current
      const sb = DataStore.getCategoryBudget(s.id, month).value || 0;
      siblingSum += sb;
    });
    if (siblingSum + amount > parentBudget) {
      showToast('⚠️ 子项预算总和 (' + formatMoney(siblingSum + amount) + ') 超过了父级预算 (' + formatMoney(parentBudget) + ')，未保存', 'error');
      return;
    }
  }
  
  DataStore.setCategoryBudget(catId, month, amount, budgetType);
  showToast(amount > 0 ? '✅ 预算已保存' : 'ℹ️ 预算已清除');
}

function mergeCategory(sourceId) {
  const sourceCat = DataStore.getCategory(sourceId);
  if (!sourceCat) return;
  _mergeSourceId = sourceId;
  _mergeTargetId = null;
  const children = DataStore.getChildren(sourceId);
  const descendants = DataStore.getDescendantIds(sourceId);
  const allCats = DataStore.getCategories().filter(c => !descendants.includes(c.id) && c.id !== sourceId);

  let html = `
    <div class="modal-title">合并分类</div>
    <p class="text-sm text-secondary mb-8">
      将 <strong>${sourceCat.icon} ${escHtml(sourceCat.name)}</strong> 合并到其他分类。
      <br>所有记录将重新归类到目标分类。
    </p>
    <div class="input-group">
      <label class="input-label">选择目标分类</label>
      <div style="max-height:30vh;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px">`;
  html += buildMergeTargetTree(allCats.filter(c => !c.parentId), 0, sourceId, descendants);
  html += `</div></div>`;

  // If source has children, ask what to do with them
  if (children.length > 0) {
    html += `
      <div class="input-group">
        <label class="input-label">处理子分类 (${children.length} 个)</label>
        <div class="flex flex-col gap-4" style="padding:4px 0">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 8px;border-radius:var(--radius-sm);background:var(--bg)">
            <input type="radio" name="mergeChildren" value="move" checked>
            <span class="text-sm">将子分类移至目标分类下</span>
          </label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 8px;border-radius:var(--radius-sm);background:var(--bg)">
            <input type="radio" name="mergeChildren" value="delete">
            <span class="text-sm" style="color:var(--danger)">删除所有子分类</span>
          </label>
        </div>
      </div>`;
  }

  html += `
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmMergeCategory()" id="mergeConfirmBtn" disabled>请先选择目标分类</button>
    </div>`;
  showModal(html);
}

function buildMergeTargetTree(cats, depth, sourceId, excludeIds) {
  let html = '';
  cats.forEach(cat => {
    if (excludeIds && excludeIds.includes(cat.id)) return;
    if (cat.id === sourceId) return;
    const children = DataStore.getChildren(cat.id);
    const indent = depth * 20;
    html += `
      <div style="padding:6px 10px;cursor:pointer;border-radius:var(--radius-sm);transition:var(--transition-fast);display:flex;align-items:center;gap:6px;margin-left:${indent}px"
           onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''"
           onclick="selectMergeTarget('${cat.id}','${escHtml(cat.icon)} ${escHtml(cat.name)}')">
        <span style="width:10px;height:10px;border-radius:50%;background:${cat.color};display:inline-block"></span>
        <span>${escHtml(cat.icon)}</span>
        <span class="text-sm">${escHtml(cat.name)}</span>
      </div>`;
    if (children.length) {
      html += buildMergeTargetTree(children, depth + 1, sourceId, excludeIds);
    }
  });
  return html;
}

let _mergeSourceId = null;
let _mergeTargetId = null;

function selectMergeTarget(catId, displayName) {
  _mergeTargetId = catId;
  const btn = document.getElementById('mergeConfirmBtn');
  if (btn) {
    btn.disabled = false;
    btn.textContent = `合并到 ${displayName}`;
  }
}

function confirmMergeCategory() {
  const sourceId = _mergeSourceId;
  const targetId = _mergeTargetId;
  if (!sourceId || !targetId) {
    showToast('请选择目标分类', 'error');
    return;
  }
  if (sourceId === targetId) {
    showToast('不能合并到自身', 'error');
    return;
  }

  // Determine children handling
  const children = DataStore.getChildren(sourceId);
  let handleChildren = 'move';
  const childrenRadios = document.querySelectorAll('input[name="mergeChildren"]');
  if (childrenRadios.length > 0) {
    childrenRadios.forEach(r => { if (r.checked) handleChildren = r.value; });
  }

  const sourceCat = DataStore.getCategory(sourceId);
  const targetCat = DataStore.getCategory(targetId);
  if (!sourceCat || !targetCat) { showToast('分类不存在', 'error'); return; }

  // Get all descendant IDs of source (including source)
  const descIds = DataStore.getDescendantIds(sourceId);

  // Update all records belonging to source or its descendants
  const records = DataStore.getRecords();
  let updatedCount = 0;
  records.forEach(r => {
    if (descIds.includes(r.categoryId)) {
      r.categoryId = targetId;
      r.updatedAt = new Date().toISOString();
      updatedCount++;
    }
  });

  // Handle children categories
  if (handleChildren === 'move') {
    children.forEach(child => {
      child.parentId = targetId;
    });
  } else if (handleChildren === 'delete') {
    // Delete all children (and recursively their children)
    const deleteRecursive = (id) => {
      const grandChildren = DataStore.getChildren(id);
      grandChildren.forEach(gc => deleteRecursive(gc.id));
      DataStore._data.categories = DataStore._data.categories.filter(c => c.id !== id);
    };
    children.forEach(child => deleteRecursive(child.id));
  }

  // Delete the source category itself
  DataStore._data.categories = DataStore._data.categories.filter(c => c.id !== sourceId);
  DataStore.save();

  closeModal();
  _mergeSourceId = null;
  _mergeTargetId = null;
  showToast(`✅ 合并完成，已更新 ${updatedCount} 条记录`);
  renderCategories();
}

function toggleCatItem(arrowEl) {
  const item = arrowEl.closest('.cat-item');
  if (!item) return;
  const body = item.querySelector('.cat-body');
  const catId = item.dataset.id;
  if (!body || !catId) return;
  const isExpanded = expandedCategories.has(catId);
  
  if (isExpanded) {
    // Collapse: lock current height instantly, then animate to 0
    body.style.transition = 'none';
    body.style.maxHeight = body.scrollHeight + 'px';
    expandedCategories.delete(catId);
    arrowEl.classList.remove('expanded');
    requestAnimationFrame(() => {
      body.style.transition = '';
      body.style.maxHeight = '0';
    });
  } else {
    // Expand
    expandedCategories.add(catId);
    arrowEl.classList.add('expanded');
    requestAnimationFrame(() => {
      const h = body.scrollHeight;
      body.style.maxHeight = h + 'px';
      // After animation, free constraint so nested expansions work
      setTimeout(() => {
        if (expandedCategories.has(catId)) {
          body.style.maxHeight = 'none';
        }
      }, 400);
    });
  }
}

function buildBreadcrumb(cat) {
  // Walk up the parent chain to collect ancestors
  const ancestors = [];
  let current = cat;
  let guard = 0;
  while (current && current.parentId && guard < 20) {
    current = DataStore.getCategory(current.parentId);
    if (current) ancestors.unshift(current);
    guard++;
  }
  
  let html = '<div class="cat-breadcrumb">';
  
  if (ancestors.length <= 2) {
    // Show all ancestors
    ancestors.forEach(a => {
      html += `<span class="crumb-item" onclick="expandAndScrollTo('${a.id}')">${escHtml(a.icon)} ${escHtml(a.name)}</span>`;
      html += '<span class="crumb-sep">/</span>';
    });
  } else {
    // First ancestor
    html += `<span class="crumb-item" onclick="expandAndScrollTo('${ancestors[0].id}')">${escHtml(ancestors[0].icon)} ${escHtml(ancestors[0].name)}</span>`;
    html += '<span class="crumb-sep">/</span>';
    // Ellipsis for hidden levels
    html += '<span class="crumb-item" style="cursor:default;color:var(--text-muted)">⋯</span>';
    html += '<span class="crumb-sep">/</span>';
    // Last ancestor (the direct parent)
    html += `<span class="crumb-item" onclick="expandAndScrollTo('${ancestors[ancestors.length - 1].id}')">${escHtml(ancestors[ancestors.length - 1].icon)} ${escHtml(ancestors[ancestors.length - 1].name)}</span>`;
    html += '<span class="crumb-sep">/</span>';
  }

  // Current category
  html += `<span class="crumb-current">${escHtml(cat.icon)} ${escHtml(cat.name)}</span>`;
  html += '</div>';

  return html;
}

function expandAndScrollTo(catId) {
  // Expand all ancestors so this category becomes visible
  const cat = DataStore.getCategory(catId);
  if (!cat) return;
  
  // Walk up and expand each ancestor
  let current = cat;
  let guard = 0;
  while (current && current.parentId && guard < 30) {
    const parent = DataStore.getCategory(current.parentId);
    if (parent) {
      expandedCategories.add(parent.id);
      current = parent;
    } else break;
    guard++;
  }
  
  // Re-render the tree
  renderCategories();
  
  // Scroll to the target element (after DOM update)
  setTimeout(() => {
    const el = document.querySelector(`.cat-item[data-id="${catId}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

/* ============================================================
   CALENDAR HEATMAP
   ============================================================ */
function getHeatmapColor(ratio) {
  if (ratio === 0) return null; // no spending
  // Smooth gradient:  Blue → Cyan → Green → Yellow → Orange → Red
  //   ratio 0.0 → Deep Blue (far under budget)
  //   ratio 0.5 → Green (under budget)  
  //   ratio 1.0 → Yellow (at target)
  //   ratio 1.5 → Orange (over budget)
  //   ratio 2.0+ → Deep Red (far over budget)
  const stops = [
    { r: 0.0, color: [0x22, 0x55, 0xCC] },  // vibrant blue
    { r: 0.4, color: [0x22, 0x99, 0x88] },  // teal
    { r: 0.7, color: [0x44, 0xBB, 0x55] },  // green
    { r: 1.0, color: [0xFB, 0xBD, 0x0A] },  // warm yellow
    { r: 1.5, color: [0xF9, 0x73, 0x16] },  // orange
    { r: 2.0, color: [0xDC, 0x26, 0x26] }   // deep red
  ];
  const t = Math.min(ratio, 2.0);
  let lo = stops[0], hi = stops[stops.length - 1];
  for (let i = 0; i < stops.length - 1; i++) {
    if (t >= stops[i].r && t <= stops[i + 1].r) {
      lo = stops[i]; hi = stops[i + 1]; break;
    }
  }
  const span = hi.r - lo.r;
  const frac = span > 0 ? (t - lo.r) / span : 0;
  const r = Math.round(lo.color[0] + (hi.color[0] - lo.color[0]) * frac);
  const g = Math.round(lo.color[1] + (hi.color[1] - lo.color[1]) * frac);
  const b = Math.round(lo.color[2] + (hi.color[2] - lo.color[2]) * frac);
  return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
}

function getDailySavingsTarget(month) {
  const budget = DataStore.getMonthlyIncome(month) || DataStore.getBudget(month);
  if (!budget) return 0;
  const savingsTarget = DataStore.getSavingsTarget();
  const percentBase = DataStore.getPercentBase();
  const totalBills = DataStore.getBillTotal(month);
  const netDisposable = Math.max(0, budget - totalBills);
  const baseAmount = percentBase === 'net' ? netDisposable : budget;
  const targetAmount = (() => {
    const t = savingsTarget;
    if (t.type === 'fixed') return t.fixedAmount || 0;
    if (t.type === 'percent') return baseAmount * (t.percent || 0) / 100;
    if (t.type === 'both') return (t.fixedAmount || 0) + (baseAmount * (t.percent || 0) / 100);
    return 0;
  })();
  const spendable = Math.max(0, netDisposable - targetAmount);
  const parts = month.split('-');
  const daysInMonth = new Date(parseInt(parts[0]), parseInt(parts[1]), 0).getDate();
  return daysInMonth > 0 ? spendable / daysInMonth : 0;
}

function renderCalendarHeatmap(month) {
  if (!month) return '<div class="text-sm text-muted">请选择月份查看日历热力图</div>';
  const parts = month.split('-');
  const year = parseInt(parts[0]);
  const mon = parseInt(parts[1]);
  const daysInMonth = new Date(year, mon, 0).getDate();
  const firstDayOfWeek = new Date(year, mon - 1, 1).getDay(); // 0=Sun

  const excludeBills = true;
  const dailyTarget = getDailySavingsTarget(month);
  const dailyTotals = StatsEngine.getDailyTotals(month, { excludeBills });
  const dayMap = {};
  dailyTotals.forEach(d => { dayMap[d.day] = d.total; });

  const now = new Date();
  const today = now.getDate();
  const currentMonth = getMonthKey(now.toISOString());
  const isCurrentMonth = month === currentMonth;

  const weekdays = ['日', '一', '二', '三', '四', '五', '六'];

  let html = '<div class="heatmap-container">';

  // Month display (linked to stats month selector)
  html += `<div class="flex items-center justify-between mb-8">
    <span class="text-sm font-semibold">📅 ${year}年${mon}月 消费热力图</span>
    ${dailyTarget > 0 ? `<span class="text-xs text-muted">日均可支配: ${formatMoney(dailyTarget)}</span>` : '<span class="text-xs text-muted">未设置预算/储蓄目标</span>'}
  </div>`;

  // Legend
  html += '<div class="heatmap-legend">';
  html += '<span class="heatmap-legend-label">少</span>';
  const legendStops = [0, 0.5, 0.9, 1.1, 1.5, 2.0, 3.0];
  legendStops.forEach(r => {
    const color = getHeatmapColor(r);
    if (color) {
      html += `<div class="heatmap-legend-item" style="background:${color}"></div>`;
    }
  });
  html += `<span class="heatmap-legend-label">多</span>`;
  html += '<span class="heatmap-legend-label" style="margin-left:8px">⚫ 无消费</span>';
  html += '</div>';

  // Weekday headers
  html += '<div class="heatmap-grid">';
  weekdays.forEach(wd => {
    html += `<div class="heatmap-weekday">${wd}</div>`;
  });

  // Empty cells before first day
  for (let i = 0; i < firstDayOfWeek; i++) {
    html += '<div></div>';
  }

  // Day cells
  const dateStrMonth = year + '-' + String(mon).padStart(2, '0');
  for (let day = 1; day <= daysInMonth; day++) {
    const spending = dayMap[day] || 0;
    const ratio = dailyTarget > 0 ? spending / dailyTarget : 0;
    const color = getHeatmapColor(ratio);
    const isFuture = isCurrentMonth && day > today;
    const isEmpty = spending === 0;

    const dateStr = dateStrMonth + '-' + String(day).padStart(2, '0');
    const tooltipText = isEmpty ? '无消费' : formatMoney(spending) + ' (比目标 ' + (ratio === 0 ? '0' : (ratio * 100).toFixed(0)) + '%)';

    let cellStyle = '';
    if (isFuture) {
      cellStyle = 'background:#E2E8F0;color:#94A3B8';
    } else if (isEmpty) {
      cellStyle = '';
    } else if (color) {
      cellStyle = `background:${color};color:white;text-shadow:0 1px 2px rgba(0,0,0,0.3)`;
    }

    const classes = 'heatmap-day'
      + (isFuture ? ' future' : '')
      + (isEmpty && !isFuture ? ' empty-day' : '');

    html += `<!-- heatmap-day click -->
      <div class="${classes}" style="${cellStyle}"
      ${!isFuture ? `onclick="showDayRecords('${dateStr}')"` : ''}>
      ${day}
      <div class="heatmap-tooltip">${dateStrMonth.slice(5)}/${String(day).padStart(2,'0')} ${tooltipText}</div>
    </div>`;
  }

  html += '</div>'; // close grid

  // Day records popup area
  html += '<div id="heatmapDayPopup" class="heatmap-day-popup" style="display:none"></div>';

  html += '</div>'; // close container

  return html;
}

  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = rect.width || 600;
  const h = 230;
  if (canvas.width !== Math.round(w * dpr) || canvas.height !== Math.round(h * dpr)) {
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
  }

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Calculate previous month
  const parts = month.split('-');
  const prevM = parseInt(parts[1]) - 1;
  const prevMonth = prevM > 0 ? parts[0] + '-' + String(prevM).padStart(2,'0') : (parseInt(parts[0])-1) + '-12';

  const thisData = getChartData(month);
  const prevDataMap = {};
  getChartData(prevMonth).forEach(d => {
    prevDataMap[d.id] = d.total;
  });

  if (!thisData.length) {
    ctx.fillStyle = tc.textMuted;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂无数据', w/2, h/2);
    return;
  }

  const padding = { top: 20, bottom: 55, left: 60, right: 25 };
  const plotW = w - padding.left - padding.right;
  const plotH = h - padding.top - padding.bottom;
  const maxVal = Math.max(...thisData.map(d => Math.max(d.total, prevDataMap[d.id] || 0)), 0.01);
  const groupW = plotW / thisData.length;
  const barW = Math.min(18, groupW * 0.35);

  // Grid
  ctx.strokeStyle = tc.border;
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = padding.top + (plotH / 4) * i;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(w - padding.right, y);
    ctx.stroke();
    ctx.fillStyle = tc.textMuted;
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(formatMoney(maxVal * (1 - i/4)), padding.left - 5, y + 3);
  }

  // Grouped bars
  thisData.forEach((d, i) => {
    const x = padding.left + i * groupW + (groupW - barW * 2) / 2;
    const prevVal = prevDataMap[d.id] || 0;

    // Previous month bar (green, left)
    const prevH = (prevVal / maxVal) * plotH;
    ctx.fillStyle = '#10B981';
    ctx.beginPath();
    ctx.roundRect(x, padding.top + plotH - prevH, barW, Math.max(prevH, 1), [3, 0, 0, 3]);
    ctx.fill();
    if (prevVal > 0) {
      ctx.fillStyle = '#059669';
      ctx.font = 'bold 8px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(formatMoney(prevVal), x + barW/2, padding.top + plotH - prevH - 3);
    }

    // This month bar (blue, right)
    const thisH = (d.total / maxVal) * plotH;
    ctx.fillStyle = '#6366F1';
    ctx.beginPath();
    ctx.roundRect(x + barW, padding.top + plotH - thisH, barW, Math.max(thisH, 1), [0, 3, 3, 0]);
    ctx.fill();
    ctx.fillStyle = '#4F46E5';
    ctx.font = 'bold 8px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(formatMoney(d.total), x + barW + barW/2, padding.top + plotH - thisH - 3);

    // Category label
    ctx.fillStyle = tc.text;
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(d.cat.name.length > 4 ? d.cat.name.slice(0,4)+'..' : d.cat.name, x + barW, h - 8);
  });

  // Labels for this/prev month
  ctx.fillStyle = '#6366F1';
  ctx.font = 'bold 9px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('🔵 本月', padding.left, 12);
  ctx.fillStyle = '#10B981';
  ctx.fillText('🟢 上月', padding.left + 80, 12);
}

function renderBillToggle(chartId, checked = true) {
  const stored = localStorage.getItem('chartBillToggle_' + chartId);

  return `<label class="bill-toggle">

      onchange="toggleBillFilter('${chartId}')">

  </label>`;
}

function toggleBillFilter(chartId) {
  const key = 'chartBillToggle_' + chartId;
  const checked = document.getElementById('toggle-' + chartId).checked;
  localStorage.setItem(key, checked ? '1' : '0');
  if (chartId === 'overviewBudget') {
    if (typeof refreshOverviewBudget === 'function') refreshOverviewBudget();
  } else if (chartId === 'pieChart') {

  }

function refreshOverviewBudget() {
  const now = new Date();
  const month = getMonthKey(now.toISOString());
  const includeBills = isBillToggleChecked('overviewBudget');
  const monthTotal = includeBills ? StatsEngine.getMonthTotal(month) : StatsEngine.getVariableSpending(month);
  const budget = DataStore.getMonthlyIncome(month) || DataStore.getBudget(month);
  if (!budget) return;

  const totalBills = DataStore.getBillTotal(month);
  const savingsTarget = DataStore.getSavingsTarget();
  const percentBase = DataStore.getPercentBase();
  const netDisposable = Math.max(0, budget - totalBills);
  const baseAmount = percentBase === 'net' ? netDisposable : budget;
  const targetAmount = (() => {
    const t = savingsTarget;
    if (t.type === 'fixed') return t.fixedAmount || 0;
    if (t.type === 'percent') return baseAmount * (t.percent || 0) / 100;
    if (t.type === 'both') return (t.fixedAmount || 0) + (baseAmount * (t.percent || 0) / 100);
    return 0;
  })();
  const spendableBudget = Math.max(0, netDisposable - targetAmount);
  const budgetPct = includeBills
    ? (budget > 0 ? (monthTotal / budget) * 100 : 0)
    : (spendableBudget > 0 ? (monthTotal / spendableBudget) * 100 : 0);

  // Redraw ring
  const budgetOverspend = budgetPct > 100;
  drawRing('budgetRing', Math.min(budgetPct, 200) / 100, budgetOverspend ? '#EF4444' : '#6366F1',
    (budgetOverspend ? '+' : '') + budgetPct.toFixed(0) + '%', '#EF4444');

  // Update label below ring
  const parent = document.getElementById('budgetRing')?.parentElement;
  if (!parent) return;
  const labelEl = parent.querySelector('.text-sm.text-secondary');
  if (labelEl) {
    labelEl.textContent = budgetPct > 100
      ? '超支 ' + formatMoney(monthTotal - (includeBills ? budget : spendableBudget))
      : formatMoney(monthTotal) + ' / ' + formatMoney(includeBills ? budget : spendableBudget);
    labelEl.style.color = budgetPct > 100 ? 'var(--danger)' : '';
    labelEl.style.fontWeight = budgetPct > 100 ? '600' : '';
  }

  // Update bottom formula text
  const formulaEl = parent.querySelector('.text-xs.text-muted');
  if (formulaEl) {
    formulaEl.remove();
  }
  if (targetAmount > 0 && budget > 0) {
    const newFormula = document.createElement('div');
    newFormula.className = 'text-xs text-muted mt-4';
    newFormula.textContent = `月收入 ${formatMoney(budget)}` + (totalBills > 0 ? ` − 账单 ${formatMoney(totalBills)}` : '') + ` − 储蓄 ${formatMoney(targetAmount)} = 日常可用 ${formatMoney(spendableBudget)}`;
    parent.appendChild(newFormula);
  }
}

function changeStatsMonth(month) {

  window.statsEndDate = '';
  statsDrillStack = [];
  window.statsDrillStack = [];

function changeStatsCustom() {
  statsStartDate = document.getElementById('statsDateStart').value;
  window.statsStartDate = statsStartDate;
  statsEndDate = document.getElementById('statsDateEnd').value;
  window.statsEndDate = statsEndDate;
  if (statsStartDate && statsEndDate) {
    // Validate: if start > end, swap them
    if (statsStartDate > statsEndDate) {
      [statsStartDate, statsEndDate] = [statsEndDate, statsStartDate];
      window.statsStartDate = statsStartDate;
      window.statsEndDate = statsEndDate;
      document.getElementById('statsDateStart').value = statsStartDate;
      document.getElementById('statsDateEnd').value = statsEndDate;
      showToast('日期范围已自动修正', 'warning');
    }
    statsMonth = '';
    window.statsMonth = '';
    statsDrillStack = [];
    window.statsDrillStack = [];
    renderStats();
  }
}

  // Pop one level: go to parent
  if (statsDrillStack.length > 1) {
    statsDrillStack.pop(); // remove current, parent becomes active

  updateDrillCharts();
