(function() {
'use strict';

const SimulationEngine = {
  /**
   * Run a what-if simulation for a given month.
   * @param {string} month - 'YYYY-MM'
   * @param {object} params - user's what-if assumptions
   * @returns {object} projection result with comparison to current trend
   */
  run(month, params, opts) {
    if (!params) return null;
    const now = new Date();
    const periodOpts = (opts && opts.period) || null;
    const isRolling = periodOpts && periodOpts.key === 'rolling30';
    const isCurrentMonth = month === getMonthKey(now.toISOString());
    const today = now.getDate();
    const daysInMonth = isRolling
      ? periodOpts.daysInPeriod
      : new Date(parseInt(month.split('-')[0]), parseInt(month.split('-')[1]), 0).getDate();
    const daysPassed = isRolling ? periodOpts.daysPassed : (isCurrentMonth ? today : daysInMonth);
    const remainingDays = Math.max(0, daysInMonth - daysPassed);

    // Override params with actuals if not specified
    const income = params.income != null ? params.income : (DataStore.getMonthlyIncome(month) || DataStore.getBudget(month) || 0);
    const bills = params.bills != null ? params.bills : DataStore.getBillTotal(month);
    const netDisposable = Math.max(0, income - bills);
    const savingsTarget = params.savingsTarget || DataStore.getSavingsTarget();
    const percentBase = DataStore.getPercentBase();
    const baseAmount = percentBase === 'net' ? netDisposable : income;
    let targetAmount = 0;
    if (savingsTarget.type === 'fixed') targetAmount = savingsTarget.fixedAmount || 0;
    else if (savingsTarget.type === 'percent') targetAmount = (savingsTarget.percent || 0) / 100 * baseAmount;
    const spendable = Math.max(0, netDisposable - targetAmount);

    // Get actual spending to date (variable categories only)
    const allRecords = isRolling
      ? DataStore.getRecords()
          .filter(r => {
            const d = new Date(r.date || r.createdAt);
            return d >= periodOpts.start && d <= periodOpts.end && !StatsEngine.isBillCategory(r.categoryId);
          })
      : DataStore.getRecords()
          .filter(r => getMonthKey(r.date || r.createdAt) === month && !StatsEngine.isBillCategory(r.categoryId));
    const actualSpent = allRecords.reduce((s, r) => s + r.amount, 0);
    const categoryTotals = {};
    const categoryDays = {};
    allRecords.forEach(r => {
      categoryTotals[r.categoryId] = (categoryTotals[r.categoryId] || 0) + r.amount;
      const d = new Date(r.date || r.createdAt);
      const day = d.getDate();
      if (!categoryDays[r.categoryId]) categoryDays[r.categoryId] = new Set();
      categoryDays[r.categoryId].add(day);
    });

    // Build full category tree with current stats
    const allCats = DataStore.getCategories();
    const catMap = {}; allCats.forEach(c => catMap[c.id] = c);
    const rootCats = DataStore.getRootCategories();

    // Compute leaf category ids
    const leafCatIds = new Set();
    allCats.forEach(c => {
      // It's a leaf if it has no children
      const hasChildren = allCats.some(x => x.parentId === c.id);
      if (!hasChildren) leafCatIds.add(c.id);
    });

    // Get current daily average per category
    const getCurrentDailyAvg = (catId) => {
      return daysPassed > 0 ? (categoryTotals[catId] || 0) / daysPassed : 0;
    };

    // For each leaf category, compute projected spending
    const categoryProjections = {};
    let totalProjectedRemaining = 0;
    const adjustments = (params.categoryAdjustments) || {};
    const globalAdj = params.globalAdjustment || { mode: null, value: null };

    // First pass: get root-level settings for inheritance
    const rootSettings = {};
    Object.entries(adjustments).forEach(([catId, adj]) => {
      const cat = catMap[catId];
      if (cat && !cat.parentId) {
        rootSettings[catId] = adj;
      }
    });

    // Process leaf categories
    leafCatIds.forEach(catId => {
      const cat = catMap[catId];
      if (!cat) return;
      const rootId = cat.parentId || catId;
      const rootCat = rootId === catId ? cat : catMap[rootId];

      // Determine effective adjustment: direct first, then inherit from root
      let adj = adjustments[catId];
      if (!adj) adj = adjustments[rootId] || null;
      if (!adj) adj = { mode: 'trend', value: null };

      const currentAvg = getCurrentDailyAvg(catId);
      let projectedRemaining;

      switch (adj.mode) {
        case 'daily':
          projectedRemaining = adj.value * remainingDays;
          break;
        case 'total':
          projectedRemaining = adj.value || 0;
          break;
        case 'percent':
          projectedRemaining = currentAvg * remainingDays * (1 + (adj.value || 0) / 100);
          break;
        case 'adjust':
          projectedRemaining = (currentAvg + (adj.value || 0)) * remainingDays;
          break;
        case 'zero':
          projectedRemaining = 0;
          break;
        case 'trend':
        default:
          projectedRemaining = currentAvg * remainingDays;
          break;
      }

      // Apply global adjustment if the category doesn't have a specific non-trend override
      if (globalAdj.mode && adj.mode === 'trend') {
        if (globalAdj.mode === 'percent') {
          projectedRemaining = projectedRemaining * (1 + (globalAdj.value || 0) / 100);
        } else if (globalAdj.mode === 'amount') {
          projectedRemaining = projectedRemaining + (globalAdj.value || 0) * remainingDays;
        }
      }

      projectedRemaining = Math.max(0, projectedRemaining);
      totalProjectedRemaining += projectedRemaining;

      categoryProjections[catId] = {
        category: cat,
        rootId: rootId,
        rootName: rootCat ? rootCat.name : cat.name,
        currentTotal: categoryTotals[catId] || 0,
        currentDailyAvg: currentAvg,
        mode: adj.mode,
        value: adj.value,
        projectedRemaining: projectedRemaining,
        projectedTotal: (categoryTotals[catId] || 0) + projectedRemaining
      };
    });

    // Add hypothetical categories
    const hypotheticals = (params.hypotheticalCategories) || [];
    let hypotheticalTotal = 0;
    const hypotheticalProjections = [];
    hypotheticals.forEach(h => {
      const daily = h.type === 'daily' ? (h.amount || 0) : ((h.amount || 0) / remainingDays);
      const hypRemaining = h.type === 'daily' ? (h.amount || 0) * remainingDays : (h.amount || 0);
      hypotheticalTotal += hypRemaining;
      hypotheticalProjections.push({
        name: h.name,
        icon: h.icon || '❓',
        daily: daily,
        projectedRemaining: hypRemaining
      });
    });
    totalProjectedRemaining += hypotheticalTotal;

    // Account for spending on non-leaf categories (e.g., records on root categories directly)
    const leafTotalCurrent = Object.values(categoryProjections).reduce((s, p) => s + p.currentTotal, 0);
    const unaccounted = Math.max(0, actualSpent - leafTotalCurrent);
    if (unaccounted > 0.01) {
      const unaccountedProjection = (unaccounted / Math.max(1, daysPassed)) * remainingDays;
      totalProjectedRemaining += unaccountedProjection;
    }

    // Aggregate to root level
    const rootProjections = {};
    rootCats.forEach(rc => {
      const children = Object.values(categoryProjections).filter(p => p.rootId === rc.id);
      const currentTotal = children.reduce((s, p) => s + p.currentTotal, 0);
      const projectedRemaining = children.reduce((s, p) => s + p.projectedRemaining, 0);
      rootProjections[rc.id] = {
        category: rc,
        currentTotal: currentTotal,
        projectedRemaining: projectedRemaining,
        projectedTotal: currentTotal + projectedRemaining,
        children: children
      };
    });

    // Global result
    const totalProjected = actualSpent + totalProjectedRemaining;
    const projectedSavings = netDisposable - totalProjected;
    const projectedDailyAvg = totalProjected / daysInMonth;
    const savingsAttained = projectedSavings >= targetAmount;

    // Current trend (for comparison) — use StatsEngine to match Overview exactly
    const trendTotal = isRolling ? StatsEngine.getPeriodPredictedTotal() : StatsEngine.getPredictedTotal(month);
    const trendDailyAvg = isRolling ? StatsEngine.getPeriodDailyAverage() : StatsEngine.getDailyAverage(month);
    const unpaidBills = Math.max(0, DataStore.getBillTotal(month) - (isRolling ? StatsEngine.getPeriodBillSpending() : StatsEngine.getBillSpendingActual(month)));
    const trendSavings = isRolling ? (income - trendTotal - unpaidBills) : (StatsEngine.getSavingsPrediction(month) - unpaidBills);

    console.log('[SimEngine] result:', {
      month,
      income, bills, actualSpent, totalProjectedRemaining, totalProjected,
      trendTotal, trendDailyAvg, trendSavings,
      daysPassed, remainingDays, daysInMonth,
      netDisposable, targetAmount, spendable,
      actualBills: StatsEngine.getBillSpendingActual(month),
      overviewPredicted: StatsEngine.getPredictedTotal(month),
      simTotalPlusBills: totalProjected + StatsEngine.getBillSpendingActual(month)
    });

    return {
      // Parameters used
      params: params,
      income: income,
      bills: bills,
      netDisposable: netDisposable,
      targetAmount: targetAmount,
      spendable: spendable,

      // Actuals
      daysPassed: daysPassed,
      remainingDays: remainingDays,
      daysInMonth: daysInMonth,
      actualSpent: actualSpent,

      // Projection
      totalProjected: totalProjected,
      projectedRemaining: totalProjectedRemaining,
      projectedDailyAvg: projectedDailyAvg,
      projectedSavings: projectedSavings,
      savingsAttained: savingsAttained,
      hypotheticalTotal: hypotheticalTotal,

      // Current trend (comparison)
      trendTotal: trendTotal,
      trendDailyAvg: trendDailyAvg,
      trendSavings: trendSavings,

      // Per-root-category breakdown
      rootProjections: rootProjections,

      // Hypothetical categories
      hypotheticalProjections: hypotheticalProjections,

      // Leaf projections for detail
      categoryProjections: categoryProjections
    };
  },

  /**
   * Get the current trend projection (no what-if changes).
   */
  getCurrentTrend(month) {
    return this.run(month, {});
  }
};

  // === EXPORTS ===
  window.SimulationEngine = SimulationEngine;
})();

function navigateTo(tab) {
  if (tab === currentTab && tab !== 'add') {
    // Force re-render if page is empty (e.g., on initial load)
    const pageEl = document.getElementById('page-' + tab);
    if (pageEl && pageEl.innerHTML.trim()) return;
  }
  const prevTab = currentTab;
  currentTab = tab;
  window.currentTab = tab;

  // Update page sections
  document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
  const pageEl = document.getElementById('page-' + tab);
  if (pageEl) pageEl.classList.add('active');

  // Update nav items
  document.querySelectorAll('.nav-item, .sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });

  // Update title
  document.getElementById('pageTitle').textContent = pageTitles[tab] || tab;

  // Trigger render
  if (tab === 'overview') renderOverview();
  else if (tab === 'add') renderAddPage();
  else if (tab === 'records') renderRecords();
  else if (tab === 'categories') renderCategories();
  else if (tab === 'stats') renderStats();
  else if (tab === 'report') renderReport();
  else if (tab === 'whatif') renderWhatIf();
  else if (tab === 'settings') renderSettings();

  applyI18nToDOM();
}

    }
  });
});

function applyTheme(theme) {

function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  const icons = { success: '✅', error: '❌', warning: '⚠️' };
  toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span> ${message}`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateY(-10px)';
    toast.style.transition = 'all 0.3s ease';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function showModal(html, dismissable = true) {
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  content.innerHTML = '';
  // Use insertAdjacentHTML for faster parsing than innerHTML
  content.insertAdjacentHTML('beforeend', html);
  overlay.classList.add('open');
  if (dismissable) {
    overlay.onclick = (e) => {
      if (e.target === overlay) closeModal();
    };
  } else {
    overlay.onclick = null;
  }
}

function formatMoney(amount) {
  return 'RM ' + Number(amount).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function getCategoryFullPath(catId) {
  const parts = [];
  let cat = DataStore.getCategory(catId);
  while (cat) {
    parts.unshift(cat.icon + ' ' + cat.name);
    cat = cat.parentId ? DataStore.getCategory(cat.parentId) : null;
  }
  return parts.join(' > ');
}

function getRootAncestorId(catId) {
  let cat = DataStore.getCategory(catId);
  while (cat && cat.parentId) {
    cat = DataStore.getCategory(cat.parentId);
  }
  return cat ? cat.id : null;
}

function getRootAncestor(catId) {
  let cat = DataStore.getCategory(catId);
  while (cat && cat.parentId) {
    cat = DataStore.getCategory(cat.parentId);
  }
  return cat;
}

function refreshCurrentPage() {
  const tab = window.currentTab || 'overview';
  if (tab === 'overview') { if (typeof renderOverview === 'function') renderOverview(); }
  else if (tab === 'add') { if (typeof renderAddPage === 'function') renderAddPage(); }
  else if (tab === 'records') { if (typeof renderRecords === 'function') renderRecords(); }
  else if (tab === 'categories') { if (typeof renderCategories === 'function') renderCategories(); }
  else if (tab === 'stats') { if (typeof renderStats === 'function') renderStats(); }
  else if (tab === 'report') { if (typeof renderReport === 'function') renderReport(); }
  else if (tab === 'whatif') { if (typeof renderWhatIf === 'function') renderWhatIf(); }
  else if (tab === 'settings') { if (typeof renderSettings === 'function') renderSettings(); }
}

async function submitPin() {
  const pin = document.getElementById('pinInput').value;
  if (!pin) return;
  const btn = document.querySelector('#modalContent .btn-primary');
  if (btn) btn.disabled = true;
  const valid = await DataStore.verifyPin(pin);
  if (valid) {
    const unlocked = await DataStore.unlockData(pin);
    if (unlocked) {
      closeModal();
      window._pinRequired = false;
      resetActivityTimer(); // 解锁后重置空闲计时
      // Re-init the app
      initApp();
    } else {
      document.getElementById('pinError').style.display = 'block';
      if (btn) btn.disabled = false;
    }
  } else {
    document.getElementById('pinError').style.display = 'block';
    if (btn) btn.disabled = false;
  }
}

function openTagPicker(selectedTags, callback) {
  const allTags = DataStore.getAllTags();
  const selected = new Set(selectedTags || []);
  
  let html = `
    <div class="modal-title">🏷️ ${__('ui.tag.selectTitle')}</div>
    <div style="padding:8px 0">
      <input type="text" id="tagSearchInput" class="input-field" placeholder="${__('ui.tag.searchPlaceholder')}" 
        style="margin-bottom:8px" oninput="filterTagList()" autocomplete="off">
      <div id="tagListContainer" style="max-height:40vh;overflow-y:auto">`;
  
  if (allTags.length === 0) {
    html += `<div class="text-sm text-muted" style="padding:12px;text-align:center">${__('ui.tag.emptyState')}</div>`;
  } else {
    allTags.forEach(tag => {
      const stats = DataStore.getTagStats(tag);
      html += `
        <div class="flex items-center gap-8" style="padding:6px 4px;cursor:pointer;border-radius:6px;hover:background:var(--bg)"
          onclick="toggleTagPick('${escHtml(tag)}')" id="tag-item-${escHtml(tag)}" data-tag="${escHtml(tag)}">
          <span id="tag-check-${escHtml(tag)}" style="width:20px;text-align:center">
            ${selected.has(tag) ? '✅' : '⬜'}
          </span>
          <span style="flex:1">${escHtml(tag)}</span>
          <span class="text-xs text-muted">${stats.count}${__('ui.tag.countSuffix')} · ${formatMoney(stats.total)}</span>
        </div>`;
    });
  }
  
  html += `</div>
      <div id="createTagSection" style="display:none;margin-top:8px">
        <div class="flex items-center gap-8">
          <span>${__('ui.tag.createLabelPrefix')}</span><span id="newTagNameDisplay" style="font-weight:700"></span><span>${__('ui.tag.createLabelSuffix')}</span>
          <button class="btn btn-primary btn-sm" onclick="createAndSelectTag()">${__('ui.tag.createButton')}</button>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">${__('ui.tag.cancelButton')}</button>
      <button class="btn btn-primary" onclick="confirmTagPick()">✅ ${__('ui.tag.doneButton', selected.size)}</button>
    </div>`;
  
  // Store callback
  window._tagPickerCallback = callback;
  window._tagPickerSelected = selected;
  
  showModal(html);
  
  // Bind search
  setTimeout(() => {
    const searchInput = document.getElementById('tagSearchInput');
    if (searchInput) searchInput.focus();
  }, 100);
}

function filterTagList() {
  const query = (document.getElementById('tagSearchInput').value || '').toLowerCase().trim();
  const container = document.getElementById('tagListContainer');
  if (!container) return;
  
  const items = container.querySelectorAll('[data-tag]');
  let hasVisible = false;
  items.forEach(item => {
    const tag = item.getAttribute('data-tag').toLowerCase();
    if (tag.includes(query)) {
      item.style.display = 'flex';
      hasVisible = true;
    } else {
      item.style.display = 'none';
    }
  });
  
  // Show create section if no match and query not empty
  const createSection = document.getElementById('createTagSection');
  const nameDisplay = document.getElementById('newTagNameDisplay');
  if (query && !hasVisible) {
    // Check if it's actually a new tag
    const allTags = DataStore.getAllTags();
    if (!allTags.includes(query)) {
      createSection.style.display = 'block';
      if (nameDisplay) nameDisplay.textContent = query;
      window._pendingNewTag = query;
    } else {
      createSection.style.display = 'none';
    }
  } else {
    createSection.style.display = 'none';
    window._pendingNewTag = null;
  }
}

function toggleTagPick(tag) {
  const selected = window._tagPickerSelected;
  if (!selected) return;
  if (selected.has(tag)) {
    selected.delete(tag);
    const check = document.getElementById('tag-check-' + tag);
    if (check) check.textContent = '⬜';
  } else {
    selected.add(tag);
    const check = document.getElementById('tag-check-' + tag);
    if (check) check.textContent = '✅';
  }
  // Update button text
  const btn = document.querySelector('#modalContent .btn-primary');
  if (btn) btn.textContent = `✅ ${__('ui.tag.doneButton', selected.size)}`;
}

function createAndSelectTag() {
  const tag = window._pendingNewTag;
  if (!tag) return;
  DataStore.addTagUsage(tag);
  window._tagPickerSelected.add(tag);
  // Refresh picker
  const cb = window._tagPickerCallback;
  const sel = window._tagPickerSelected;
  closeModal();
  openTagPicker([...sel], cb);
}

function confirmTagPick() {
  const selected = window._tagPickerSelected;
  const callback = window._tagPickerCallback;
  closeModal();
  if (callback && selected) {
    callback([...selected]);
  }
  window._tagPickerSelected = null;
  window._tagPickerCallback = null;
  window._pendingNewTag = null;
}

// ===== AUTO-LOCK (Inactivity Timer) =====
let _lastActivity = Date.now();
let _inactivityInterval = null;
let _autoLockTimeout = parseInt(localStorage.getItem('budgetAutoLockTimeout') || '5'); // minutes, default 5

function resetActivityTimer() {
  if (window._pinRequired) return;
  _lastActivity = Date.now();
}

function getAutoLockTimeout() {
  return _autoLockTimeout;
}

function setAutoLockTimeout(minutes) {
  _autoLockTimeout = minutes;
  localStorage.setItem('budgetAutoLockTimeout', minutes);
  restartInactivityCheck();
}

function restartInactivityCheck() {
  stopInactivityCheck();
  startInactivityCheck();
}

function startInactivityCheck() {
  if (_inactivityInterval) clearInterval(_inactivityInterval);
  if (_autoLockTimeout <= 0) return; // 0 = never lock

  _inactivityInterval = setInterval(() => {
    if (window._pinRequired) return;
    const hasPinHash = localStorage.getItem('budgetAppPinHash');
    if (!hasPinHash) return; // no PIN set

    const elapsed = (Date.now() - _lastActivity) / 60000;
    if (elapsed >= _autoLockTimeout) {
      lockApp();
    }
  }, 10000); // check every 10s
}

function stopInactivityCheck() {
  if (_inactivityInterval) {
    clearInterval(_inactivityInterval);
    _inactivityInterval = null;
  }
}

function lockApp() {
  if (window._pinRequired) return;
  const hasPinHash = localStorage.getItem('budgetAppPinHash');
  if (!hasPinHash) return;

  // Save current state then clear plaintext
  if (DataStore._data) DataStore.save();
  localStorage.removeItem('budgetAppData');

  window._pinRequired = true;
  showPinModal();
}

function refreshOverviewBudget() {
  const now = new Date();
  const month = getMonthKey(now.toISOString());
  const includeBills = isBillToggleChecked('overviewBudget');

  const targetAmount = (() => {
    const t = savingsTarget;

    return 0;

function showBudgetSelector(month) {
  const rootCats = DataStore.getRootCategories();
  const catBudgets = DataStore.getAllCategoryBudgets();
  // Get categories with budgets (including children)
  const budgeted = [];
  rootCats.forEach(cat => {
    const bk = cat.id + ':' + month;
    const raw = catBudgets[bk];
    const hasBudget = raw && ((typeof raw === 'number' && raw > 0) || (typeof raw === 'object' && raw.value > 0));
    if (hasBudget) budgeted.push(cat);
    // Also check children
    const children = DataStore.getChildren(cat.id);
    children.forEach(child => {
      const ck = child.id + ':' + month;
      const craw = catBudgets[ck];
      const chasBudget = craw && ((typeof craw === 'number' && craw > 0) || (typeof craw === 'object' && craw.value > 0));
      if (chasBudget) budgeted.push(child);
    });
  });
  // Load current selection
  let selected = budgetMonitoredIds ? [...budgetMonitoredIds] : budgeted.map(c => c.id);
  
  let html = '<div class="modal-title">' + __('budgetProgress.selectTitle') + '</div>';
  html += '<div style="max-height:50vh;overflow-y:auto;margin-bottom:12px">';

  html += '<button class="btn btn-sm btn-outline" onclick="(function(){var c=document.querySelectorAll(\'.budget-sel-cb\');c.forEach(function(e){e.checked=false})})()">' + __('budgetProgress.deselectAll') + '</button>';
  html += '<button class="btn btn-sm btn-outline" onclick="(function(){var c=document.querySelectorAll(\'.budget-sel-cb\');c.forEach(function(e){e.checked=!e.checked})})()">' + __('budgetProgress.invert') + '</button>';
  html += '</div>';
  
  budgeted.forEach(cat => {
    const checked = selected.includes(cat.id);
    const isChild = !!cat.parentId;
    html += '<label style="display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;border-radius:var(--radius-sm);transition:background 0.15s;margin-bottom:2px' + (isChild ? ';margin-left:24px;font-size:0.85rem' : '') + '" onmouseover="this.style.background=\'var(--bg)\'" onmouseout="this.style.background=\'\'">';

    html += '<span style="width:10px;height:10px;border-radius:50%;background:' + cat.color + ';display:inline-block"></span>';

  html += '<button class="btn btn-primary" onclick="confirmBudgetSelection(\'' + month + '\')">' + __('budgetProgress.confirm') + '</button>';
  html += '</div>';
  
  showModal(html);
}

function confirmBudgetSelection(month) {
  const cbs = document.querySelectorAll('.budget-sel-cb:checked');
  const ids = Array.from(cbs).map(cb => cb.value);
  if (ids.length === 0) {
    showToast(__('budgetProgress.selectAtLeastOne'), 'warning');
    return;
  }
  if (ids.length === DataStore.getRootCategories().filter(c => {
    const bk = c.id + ':' + month;
    return (DataStore.getAllCategoryBudgets()[bk] || 0) > 0;
  }).length) {
    budgetMonitoredIds = null; // all selected → store null
    localStorage.removeItem('budgetMonitoredIds');
  } else {
    budgetMonitoredIds = ids;
    localStorage.setItem('budgetMonitoredIds', JSON.stringify(ids));
  }
  closeModal();
  refreshBudgetCards(month);
}

function renderBudgetProgressCard(month, showHeader) {
  console.log('[budgetProgress] renderBudgetProgressCard month:', month, 'view:', budgetProgressView, 'sort:', budgetProgressSort);
  const rootCats = DataStore.getRootCategories();
  const catBudgets = DataStore.getAllCategoryBudgets();
  const records = DataStore.getRecords().filter(r => getMonthKey(r.date || r.createdAt) === month);
  
  // Calculate spent per root category
  const catSpent = {};
  records.forEach(r => {
    const rootId = getRootAncestorId(r.categoryId);
    if (rootId) catSpent[rootId] = (catSpent[rootId] || 0) + r.amount;
  });

  // Build rows for categories that HAVE a budget set
  let rows = [];
  rootCats.forEach(cat => {
    const budgetKey = cat.id + ':' + month;
    const rawBudget = catBudgets[budgetKey];
    let budget = 0, budgetType = 'fixed';
    if (typeof rawBudget === 'number') { budget = rawBudget; budgetType = 'fixed'; }
    else if (rawBudget && typeof rawBudget === 'object') { budget = rawBudget.value || 0; budgetType = rawBudget.type || 'fixed'; }
    if (budget <= 0) return; // skip if no budget
    if (budgetMonitoredIds && !budgetMonitoredIds.includes(cat.id)) return;
    const spent = catSpent[cat.id] || 0;
    const pct = Math.min((spent / budget) * 100, 200);
    const children = DataStore.getChildren(cat.id);
    // Get child breakdown for segmented view
    const childData = [];
    children.forEach(child => {
      const childTotal = records.filter(r => r.categoryId === child.id).reduce((s, r) => s + r.amount, 0);
      if (childTotal > 0) childData.push({ cat: child, total: childTotal });
    });
    rows.push({ cat, budget, spent, pct, childData });
    // Also add children with their own budgets for empty-state check
    children.forEach(child => {
      const childKey = child.id + ':' + month;
      const childRaw = catBudgets[childKey];
      let cb = 0;
      if (typeof childRaw === 'number') cb = childRaw;
      else if (childRaw && typeof childRaw === 'object') cb = childRaw.value || 0;
      if (cb > 0) rows.push({ cat: child, budget: cb, spent: 0, pct: 0, childData: [] });
    });
  });

  // Sort (read from window to pick up inline onchange changes)
  const _sort = window.budgetProgressSort || budgetProgressSort;
  if (_sort === 'usage') rows.sort((a, b) => b.pct - a.pct);
  else if (_sort === 'amount') rows.sort((a, b) => b.spent - a.spent);
  else if (_sort === 'name') rows.sort((a, b) => a.cat.name.localeCompare(b.cat.name));

  if (!rows.length) { console.log('[budgetProgress] no budgeted categories for month:', month); return '<div class="card mb-16"><div class="card-title">' + __('budgetProgress.emptyTitle') + '</div><div class="text-sm text-muted" style="padding:12px 0;text-align:center">' + __('budgetProgress.emptyMessage') + '</div></div>'; }

  const totalBudget = rows.reduce((s, r) => s + r.budget, 0);
  const totalSpent = rows.reduce((s, r) => s + r.spent, 0);
  const totalPct = totalBudget > 0 ? (totalSpent / totalBudget * 100) : 0;

  let html = '<div class="card mb-16">';
  html += '<div class="card-title" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';

  html += '<span class="bvt-label' + (budgetProgressView === 'segmented' ? ' active' : '') + '">' + __('budgetProgress.segmentedView') + '</span>';
  html += '</div>';

  html += '<select class="input-field" style="width:auto;font-size:0.72rem;padding:2px 6px" onchange="budgetProgressSort=this.value;localStorage.setItem(\'budgetProgressSort\',this.value);refreshBudgetCards(\'' + month + '\')">';
  const sortOpts = [['usage', __('budgetProgress.sortUsage')], ['amount', __('budgetProgress.sortAmount')], ['name', __('budgetProgress.sortName')]];
  sortOpts.forEach(([v,l]) => html += '<option value="' + v + '" ' + ((window.budgetProgressSort || budgetProgressSort) === v ? 'selected' : '') + '>' + l + '</option>');
  html += '</select>';
  // Select button
  html += '<div class="view-toggle-btn" onclick="showBudgetSelector(\'' + month + '\')" style="font-size:0.7rem" title="' + __('budgetProgress.selectBtnTitle') + '">' + __('budgetProgress.selectBtn') + '</div>';
  html += '</div>'; // end card-title
  // Guide text
  html += '<div style="font-size:0.72rem;color:var(--text-muted);margin-bottom:8px;line-height:1.4;padding:0 2px">' + __('budgetProgress.guideText') + '</div>';
  html += '<div id="budgetProgressInner" style="animation:bpFadeIn 0.25s ease">' + renderBudgetProgressCardInner(month) + '</div>';
  html += '</div>';
  return html;

function renderBudgetProgressCardInner(month) {
  console.log('[budgetProgress] renderBudgetProgressCardInner month:', month);
  const rootCats = DataStore.getRootCategories();
  const catBudgets = DataStore.getAllCategoryBudgets();
  const records = DataStore.getRecords().filter(r => getMonthKey(r.date || r.createdAt) === month);
  
  const catSpent = {};
  records.forEach(r => {
    const rootId = getRootAncestorId(r.categoryId);
    if (rootId) catSpent[rootId] = (catSpent[rootId] || 0) + r.amount;
  });

  // Build parent rows only; children with budgets stay grouped under parent
  let rows = [];
  rootCats.forEach(cat => {
    const budgetKey = cat.id + ':' + month;
    const rawBudget = catBudgets[budgetKey];
    let budget = 0, budgetType = 'fixed';
    if (typeof rawBudget === 'number') { budget = rawBudget; budgetType = 'fixed'; }
    else if (rawBudget && typeof rawBudget === 'object') { budget = rawBudget.value || 0; budgetType = rawBudget.type || 'fixed'; }
      if (budgetType === 'percent' && budget > 0) {
        const monthlyBudget = DataStore.getMonthlyIncome(month) || DataStore.getBudget(month);
        budget = monthlyBudget > 0 ? (budget / 100) * monthlyBudget : 0;
      }
    if (budget <= 0) return;
    if (budgetMonitoredIds && !budgetMonitoredIds.includes(cat.id)) return;
    const spent = catSpent[cat.id] || 0;
    const pct = Math.min((spent / budget) * 100, 200);
    const children = DataStore.getChildren(cat.id);
    // Child spending data (for segmented bar)
    const childData = [];
    children.forEach(child => {
      const childTotal = records.filter(r => r.categoryId === child.id).reduce((s, r) => s + r.amount, 0);
      if (childTotal > 0) childData.push({ cat: child, total: childTotal });
    });
    // Children that have their own budgets (shown as separate indented rows under parent)
    const childBudgetRows = [];
    children.forEach(child => {
      const childKey = child.id + ':' + month;
      const childRaw = catBudgets[childKey];
      let childBudget = 0, childType = 'fixed';
      if (typeof childRaw === 'number') { childBudget = childRaw; childType = 'fixed'; }
      else if (childRaw && typeof childRaw === 'object') { childBudget = childRaw.value || 0; childType = childRaw.type || 'fixed'; }
      if (childBudget <= 0) return;
      if (childType === 'percent' && childBudget > 0) {
        const monthlyBudget = DataStore.getMonthlyIncome(month) || DataStore.getBudget(month);
        childBudget = monthlyBudget > 0 ? (childBudget / 100) * monthlyBudget : 0;
      }
      const childSpent = records.filter(r => r.categoryId === child.id).reduce((s, r) => s + r.amount, 0);
      const childPct = Math.min((childSpent / childBudget) * 100, 200);
      childBudgetRows.push({ cat: child, budget: childBudget, spent: childSpent, pct: childPct, parentName: cat.name });
    });
    rows.push({ cat, budget, spent, pct, childData, childBudgetRows });
  });

  // Sort only parent rows — children stay with their parent (read from window to pick up inline onchange)
  const _sort2 = window.budgetProgressSort || budgetProgressSort;
  if (_sort2 === 'usage') rows.sort((a, b) => b.pct - a.pct);
  else if (_sort2 === 'amount') rows.sort((a, b) => b.spent - a.spent);
  else if (_sort2 === 'name') rows.sort((a, b) => a.cat.name.localeCompare(b.cat.name));

  // Total: parent budgets already include child budget share (no double-count)
  const totalBudget = rows.reduce((s, r) => s + r.budget, 0);
  const totalSpent = rows.reduce((s, r) => s + r.spent, 0);
  const totalPct = totalBudget > 0 ? (totalSpent / totalBudget * 100) : 0;

  let html = '';
  rows.forEach(r => {
    // ── Render parent row ──
    const pStatus = r.pct >= 100 ? 'danger' : (r.pct >= 80 ? 'warning' : 'success');
    const pBarColor = r.pct >= 100 ? '#EF4444' : (r.pct >= 80 ? '#F59E0B' : '#10B981');

    html += '<div style="margin-bottom:10px">';
    html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">';
    html += '<span>' + r.cat.icon + '</span>';

    html += '<span style="font-size:0.78rem;font-weight:600">' + formatMoney(r.spent) + '</span>';
    html += '<span class="text-xs text-muted">/ ' + formatMoney(r.budget) + '</span>';
    html += '<span style="font-size:0.8rem;font-weight:700;color:' + pBarColor + ';width:48px;text-align:right">' + r.pct.toFixed(0) + '%</span>';
    if (r.pct > 100) html += '<span class="badge badge-danger" style="font-size:0.6rem">' + __('budgetProgress.overspent') + '</span>';
    html += '</div>';

    // Progress bar
    if (budgetProgressView === 'solid') {
      html += '<div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden">';
      html += '<div style="height:100%;width:' + Math.min(r.pct, 100) + '%;background:' + pBarColor + ';border-radius:4px;transition:width 0.3s"></div>';
      html += '</div>';
    } else {
      // Segmented bar - show children
      const totalFillPct = Math.min(r.pct, 100);
      html += '<div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden;display:flex;gap:1px">';
      if (r.childData.length > 0) {
        r.childData.forEach((cd, ci) => {
          const segFillRatio = r.spent > 0 ? cd.total / r.spent : 0;
          const segW = segFillRatio * totalFillPct;
          if (segW > 0) {
            const segColor = (cd.cat.color === r.cat.color) ? COLORS[ci % COLORS.length] : cd.cat.color;

          }
        });
        const directSpent = r.spent - r.childData.reduce((s, cd) => s + cd.total, 0);
        if (directSpent > 0.01) {
          const directFillRatio = directSpent / r.spent;
          const directW = directFillRatio * totalFillPct;
          html += '<div style="height:100%;width:' + directW + '%;background:' + pBarColor + ';border-radius:2px;min-width:4px;opacity:0.5" title="直接: ' + formatMoney(directSpent) + '"></div>';
        }
      }
      let filledSum = 0;
      if (r.childData.length > 0) {
        r.childData.forEach(cd => { filledSum += r.spent > 0 ? (cd.total / r.spent) * totalFillPct : 0; });
        const directSpent = r.spent - r.childData.reduce((s, cd) => s + cd.total, 0);
        if (directSpent > 0.01) filledSum += (directSpent / r.spent) * totalFillPct;
      }
      if (filledSum < 100) {

        });
        html += '</div>';
      }
    }
    html += '</div>';

    // ── Render child budget rows right after parent ──
    r.childBudgetRows.forEach(cr => {
      const cBarColor = cr.pct >= 100 ? '#EF4444' : (cr.pct >= 80 ? '#F59E0B' : '#10B981');
      html += '<div style="margin-bottom:6px;margin-left:16px">';

      html += '<span class="text-xs text-muted">/ ' + formatMoney(cr.budget) + '</span>';

      html += '</div>';
      html += '</div>';
    });
  });

  // Total row
  html += '<div style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px;display:flex;align-items:center;gap:6px">';

(function() {
'use strict';
function drawRing(canvasId, progress, color, label, overspendColor) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const tc = getThemeColors();
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const cssSize = rect.width || 160;
  const bufferSize = Math.round(cssSize * dpr);
  if (canvas.width !== bufferSize || canvas.height !== bufferSize) {
    canvas.width = bufferSize;
    canvas.height = bufferSize;
  }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const cx = cssSize / 2, cy = cssSize / 2, r = cssSize * 0.38, lineW = cssSize * 0.1;

  ctx.clearRect(0, 0, cssSize, cssSize);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = tc.border;
  ctx.lineWidth = lineW;
  ctx.lineCap = 'round';
  ctx.stroke();

  const startAngle = -Math.PI / 2;
  const normalProgress = Math.min(progress, 1);

  // Normal progress (up to 100%)
  if (normalProgress > 0) {
    const endAngle = startAngle + Math.PI * 2 * normalProgress;
    ctx.beginPath();
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // Overspend portion (beyond 100%) in red
  if (progress > 1) {
    const overshoot = Math.min(progress - 1, 1);
    const overStart = startAngle + Math.PI * 2 * normalProgress;
    const overEnd = overStart + Math.PI * 2 * overshoot;
    ctx.beginPath();
    ctx.arc(cx, cy, r, overStart, overEnd);
    ctx.strokeStyle = overspendColor || '#EF4444';
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // Label
  ctx.fillStyle = progress > 1 ? (overspendColor || '#EF4444') : color;
  ctx.font = `bold ${cssSize * 0.16}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, cy);
}

function drawSparkline(canvasId, data) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !data.length) return;
  const tc = getThemeColors();
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = rect.width || 600;
  const ch = 80;
  if (canvas.width !== Math.round(w * dpr) || canvas.height !== Math.round(ch * dpr)) {
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(ch * dpr);
  }

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const cw = w, chartH = ch;

  const maxVal = Math.max(...data.map(d => d.total), 0.01);
  const minVal = 0;
  const padding = { top: 8, bottom: 8, left: 8, right: 8 };
  const plotW = cw - padding.left - padding.right;
  const plotH = chartH - padding.top - padding.bottom;

  // Draw line
  ctx.beginPath();
  data.forEach((d, i) => {
    const x = padding.left + (i / (data.length - 1)) * plotW;
    const y = padding.top + plotH - ((d.total - minVal) / (maxVal - minVal)) * plotH;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = '#6366F1';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Fill area
  const lastIdx = data.length - 1;
  const lastX = padding.left + (lastIdx / (data.length - 1)) * plotW;
  const lastY = padding.top + plotH - ((data[lastIdx].total - minVal) / (maxVal - minVal)) * plotH;
  ctx.lineTo(lastX, padding.top + plotH);
  ctx.lineTo(padding.left, padding.top + plotH);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, padding.top, 0, padding.top + plotH);
  grad.addColorStop(0, 'rgba(99,102,241,0.2)');
  grad.addColorStop(1, 'rgba(99,102,241,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Dots
  data.forEach((d, i) => {
    const x = padding.left + (i / (data.length - 1)) * plotW;
    const y = padding.top + plotH - ((d.total - minVal) / (maxVal - minVal)) * plotH;
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#6366F1';
    ctx.fill();
  });
}

  // === EXPORTS ===
  window.drawRing = drawRing;
  window.drawSparkline = drawSparkline;
})();

function getFilteredRecords() {
  let records = DataStore.getRecords();
  const f = recordsFilter;
  if (f.keyword) {
    const kw = f.keyword.toLowerCase();
    records = records.filter(r => (r.note || '').toLowerCase().includes(kw));
  }
  if (f.categoryId) {
    const descIds = DataStore.getDescendantIds(f.categoryId);
    records = records.filter(r => descIds.includes(r.categoryId));
  }
  if (f.dateStart) {
    records = records.filter(r => (r.date || r.createdAt) >= f.dateStart);
  }
  if (f.dateEnd) {
    records = records.filter(r => (r.date || r.createdAt) <= f.dateEnd + 'T23:59');
  }
  if (f.amountMin) {
    records = records.filter(r => r.amount >= parseFloat(f.amountMin));
  }
  if (f.amountMax) {
    records = records.filter(r => r.amount <= parseFloat(f.amountMax));
  }
  if (f.overspentOnly) {
    // Get the current month's overspent category IDs
    const currentMonth = getBudgetMonth();
    const catBudgets = DataStore.getAllCategoryBudgets();
    const overspentIds = new Set();
    const catTotals = {};
    // Calculate spending per root category for current month
    records.forEach(r => {
      const m = getMonthKey(r.date || r.createdAt);
      if (m === currentMonth) {
        const rootId = getRootAncestorId(r.categoryId);
        if (rootId) {
          catTotals[rootId] = (catTotals[rootId] || 0) + r.amount;
        }
      }
    });
    // Find overspent root categories
    Object.entries(catBudgets).forEach(([key, budget]) => {
      if (budget > 0) {
        const [catId, month] = key.split(':');
        if (month === currentMonth) {
          const spent = catTotals[catId] || 0;
          if (spent > budget) {
            overspentIds.add(catId);
            // Also add all descendant IDs
            DataStore.getDescendantIds(catId).forEach(id => overspentIds.add(id));
          }
        }
      }
    });
    if (overspentIds.size > 0) {
      records = records.filter(r => {
        const rootId = getRootAncestorId(r.categoryId);
        return rootId && overspentIds.has(rootId);
      });
    }
  }
  // Tag filter
  if (f.tags && f.tags.length > 0) {
    records = records.filter(r => r.tags && f.tags.some(t => r.tags.includes(t)));
  }
  // Apply sorting
  if (recordsSort && recordsSort.length > 0) {
    records.sort((a, b) => {
      for (const level of recordsSort) {
        let cmp = 0;
        const dir = level.dir === 'asc' ? 1 : -1;
        switch (level.field) {
          case 'date':
            cmp = ((a.date || a.createdAt) || '').localeCompare((b.date || b.createdAt) || '');
            break;
          case 'amount':
            cmp = (a.amount || 0) - (b.amount || 0);
            break;
          case 'note':
            cmp = (a.note || '').localeCompare(b.note || '');
            break;
          case 'category': {
            const ca = DataStore.getCategory(a.categoryId);
            const cb = DataStore.getCategory(b.categoryId);
            cmp = (ca ? ca.name : '').localeCompare(cb ? cb.name : '');
            break;
          }
        }
        if (cmp !== 0) return cmp * dir;
      }
      return 0;
    });
  }
  return records;
}

function toggleOverspentFilter() {

    html += `

function clearRecordsFilter() {

function renderRecordsList() {
  const container = document.getElementById('recordsList');
  const countEl = document.getElementById('recordsCount');
  if (!container) return;

  const filtered = getFilteredRecords();
  countEl.textContent = __('records.count', filtered.length);

  const perPage = window.recordsPerPage || parseInt(localStorage.getItem('budgetRecordsPerPage') || '20');
  let page = window.recordsPage || 0;
  const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
  if (page >= totalPages) page = Math.max(0, totalPages - 1);
  const start = page * perPage;
  const end = Math.min(start + perPage, filtered.length);
  window.recordsPage = page;
  const pageRecords = filtered.slice(start, end);

  if (!pageRecords.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">' + __('records.empty.title') + '</div><div class="empty-hint">' + __('records.empty.hint') + '</div></div>';
    return;
  }

  let html = '';
  pageRecords.forEach(r => {
    const cat = DataStore.getCategory(r.categoryId);
    const dateStr = (r.date || r.createdAt).replace('T', ' ');
    const isSelected = selectedRecordIds.has(r.id);
    const selStyle = isSelected ? 'border-color:var(--primary);background:rgba(99,102,241,0.05)' : '';
    if (compactRecordsView) {
      // ===== COMPACT VIEW =====
      html += `
        <div class="card record-card compact" data-id="${r.id}" style="${selStyle}" onclick="${batchMode ? '' : "openEditRecord('" + r.id + "')"}">
          <div class="compact-row">
            ${batchMode ? `<input type="checkbox" class="batch-checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation();toggleRecordSelection('${r.id}')" style="flex-shrink:0;width:16px;height:16px;cursor:pointer">` : ''}
            <span class="compact-date">${dateStr.slice(0, 10)}</span>
            <span class="compact-cat">${cat ? escHtml(cat.icon) + escHtml(cat.name) : __('records.unknown')}</span>
            <span class="compact-note">${r.note ? '📝 ' + escHtml(r.note) : ''}</span>
            ${r.tags && r.tags.length > 0 ? `<span style="display:inline-flex;flex-wrap:wrap;gap:2px;margin-left:4px">${r.tags.map(t => `<span style="padding:0 4px;background:var(--bg);border-radius:4px;font-size:0.6rem;color:var(--text-muted)">${escHtml(t)}</span>`).join('')}</span>` : ''}
            ${r.excludeFromAvg ? '<span class="text-xs text-muted" style="font-size:0.6rem;margin-left:2px" title="' + __('records.excludeFromAvg') + '">📌</span>' : ''}
            <span class="compact-amount" style="color:var(--primary)">${formatMoney(r.amount)}</span>
            ${!batchMode ? `<button class="btn btn-ghost btn-sm record-del-btn" style="padding:0 4px;font-size:0.7rem;opacity:0.5;flex-shrink:0;background:none;border:none;cursor:pointer"
              onclick="event.stopPropagation();deleteRecordConfirm('${r.id}')" title="${__('records.delete')}">🗑️</button>` : ''}
          </div>
        </div>
      `;
    } else {
      // ===== NORMAL (CARD) VIEW =====
      html += `
      <div class="card record-card" style="cursor:${batchMode ? 'default' : 'pointer'};position:relative;overflow:hidden;${selStyle}" data-id="${r.id}" onclick="${batchMode ? "toggleRecordSelection('" + r.id + "')" : "openEditRecord('" + r.id + "')"}">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-12">
            ${batchMode ? `<input type="checkbox" class="batch-checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation();toggleRecordSelection('${r.id}')" style="width:18px;height:18px;cursor:pointer;flex-shrink:0">` : ''}
            <div style="width:40px;height:40px;border-radius:50%;background:${cat ? cat.color + '20' : '#eee'};display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0">
              ${cat ? escHtml(cat.icon) : '❓'}
            </div>
            <div>
              <div class="font-semibold">${cat ? escHtml(cat.name) : __('records.unknownCategory')}</div>
              <div class="text-sm text-muted">${dateStr.slice(0, 16)}</div>
              ${r.note ? '<div class="text-sm text-secondary">' + escHtml(r.note) + '</div>' : ''}
              ${r.tags && r.tags.length > 0 ? `<div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:2px">${r.tags.map(t => `<span style="padding:0 4px;background:var(--bg);border-radius:4px;font-size:0.65rem;color:var(--text-muted)">${escHtml(t)}</span>`).join('')}</div>` : ''}
              ${r.excludeFromAvg ? '<span class="text-xs text-muted" style="font-size:0.6rem;margin-left:4px" title="' + __('records.excludeFromAvg') + '">📌</span>' : ''}
            </div>
          </div>
          <div class="text-right">
            <div class="font-bold text-lg" style="color:var(--primary)">${formatMoney(r.amount)}</div>
          </div>
        </div>
        ${!batchMode ? `
        <!-- Swipe delete hint -->
        <div class="record-delete-btn" style="position:absolute;right:-80px;top:0;bottom:0;width:80px;background:var(--danger);color:white;display:flex;align-items:center;justify-content:center;font-weight:600;transition:right 0.25s ease;border-radius:0 var(--radius) var(--radius) 0">
          ${__('records.delete')}
        </div>
        <!-- Desktop delete button (always visible on hover) -->
        <button class="btn btn-ghost btn-sm record-del-btn" 
          style="position:absolute;top:4px;right:4px;padding:2px 6px;font-size:0.75rem;opacity:0;transition:opacity 0.2s"
          onclick="event.stopPropagation();deleteRecordConfirm('${r.id}')" title="${__('records.delete')}">🗑️</button>
        ` : ''}
      </div>
    `;
    }
  });

  // Pagination controls
  if (totalPages > 1) {
    const p = page;
    const btnStyle = 'padding:4px 10px;font-size:0.78rem;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);color:var(--text);cursor:pointer';
    const btnActive = 'padding:4px 10px;font-size:0.78rem;border:1px solid var(--primary);border-radius:4px;background:var(--primary);color:#fff;cursor:pointer';
    const btnDisabled = 'padding:4px 10px;font-size:0.78rem;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);color:var(--text-muted);cursor:default;opacity:0.4';
    
    html += '<div style="display:flex;align-items:center;gap:6px;justify-content:center;padding:16px 0 8px;flex-wrap:wrap">';
    
    // First page
    html += `<button style="${p === 0 ? btnDisabled : btnStyle}" onclick="recordsPage=0;renderRecordsList()" ${p === 0 ? 'disabled' : ''}>«</button>`;
    // Prev page
    html += `<button style="${p === 0 ? btnDisabled : btnStyle}" onclick="recordsPage=${p-1};renderRecordsList()" ${p === 0 ? 'disabled' : ''}>‹</button>`;
    
    // Page numbers - show at most 7 around current page
    const pageWindowStart = Math.max(0, p - 3);
    const pageWindowEnd = Math.min(totalPages - 1, p + 3);
    for (let i = pageWindowStart; i <= pageWindowEnd; i++) {
      html += `<button style="${i === p ? btnActive : btnStyle}" onclick="recordsPage=${i};renderRecordsList()">${i+1}</button>`;
    }
    
    // Next page
    html += `<button style="${p >= totalPages - 1 ? btnDisabled : btnStyle}" onclick="recordsPage=${p+1};renderRecordsList()" ${p >= totalPages - 1 ? 'disabled' : ''}>›</button>`;
    // Last page
    html += `<button style="${p >= totalPages - 1 ? btnDisabled : btnStyle}" onclick="recordsPage=${totalPages-1};renderRecordsList()" ${p >= totalPages - 1 ? 'disabled' : ''}>»</button>`;
    
    html += `<span class="text-xs text-muted" style="margin-left:4px">${__('records.pagination.pageInfo', p+1, totalPages, filtered.length)}</span>`;
    html += '</div>';
  }

  container.innerHTML = html;

  // Attach per-card events (normal view only for swipe; compact handles its own)
  container.querySelectorAll('.record-card').forEach(card => {
    const isCompact = card.classList.contains('compact');

    if (!isCompact) {
      // Normal view: mouse hover for delete button
      card.addEventListener('mouseenter', () => {
        const btn = card.querySelector('.record-del-btn');
        if (btn) btn.style.opacity = '0.6';
      });
      card.addEventListener('mouseleave', () => {
        const btn = card.querySelector('.record-del-btn');
        if (btn) btn.style.opacity = '0';
      });
      card.addEventListener('click', (e) => {
        if (e.target.closest('.record-delete-btn') || e.target.closest('.record-del-btn')) return;
        openEditRecord(card.dataset.id);
      });

      // Swipe to delete (normal view only)
      let startX = 0, currentX = 0, isDragging = false;
      card.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        isDragging = true;
      });
      card.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        currentX = e.touches[0].clientX;
        const diff = startX - currentX;
        if (diff > 0) {
          const deleteBtn = card.querySelector('.record-delete-btn');
          deleteBtn.style.right = Math.max(-80 + Math.min(diff, 80)) + 'px';
          card.style.transform = `translateX(${-Math.min(diff, 80)}px)`;
        }
      });
      card.addEventListener('touchend', () => {
        isDragging = false;
        const diff = startX - currentX;
        const deleteBtn = card.querySelector('.record-delete-btn');
        if (diff > 40) {
          deleteBtn.style.right = '0';
          card.style.transform = 'translateX(-80px)';
          deleteBtn.onclick = (e) => {
            e.stopPropagation();
            deleteRecordConfirm(card.dataset.id);
          };
        } else {
          deleteBtn.style.right = '-80px';
          card.style.transform = '';
        }
      });
    }
  });

  // Remove any leftover sentinel
  const oldSentinel = document.getElementById('recordsSentinel');
  if (oldSentinel) oldSentinel.remove();
}

/* ===== BATCH OPERATIONS ===== */
function toggleBatchMode() {
  batchMode = !batchMode;
  if (!batchMode) {
    selectedRecordIds.clear();
  }
  renderRecords();
}

function toggleRecordSelection(id) {
  if (selectedRecordIds.has(id)) {
    selectedRecordIds.delete(id);
  } else {
    selectedRecordIds.add(id);
  }
  renderRecordsList();
  updateBatchCount();
}

function updateBatchCount() {
  const countEl = document.getElementById('batchCount');
  if (countEl) {
    countEl.textContent = __('records.batch.selected', selectedRecordIds.size);
  }
  const toolbar = document.getElementById('batchToolbar');
  if (toolbar) {
    const count = selectedRecordIds.size;
    // Keep toolbar visible in batch mode even if nothing selected
  }
}

function batchCancel() {
  selectedRecordIds.clear();
  batchMode = false;
  renderRecords();
}

function batchDelete() {
  const count = selectedRecordIds.size;
  if (count === 0) {
    showToast(__('records.batch.selectFirst'), 'warning');
    return;
  }
    showModal(`
    <div class="modal-title">${__('records.batch.confirmTitle')}</div>
    <p style="color:var(--text-secondary);margin-bottom:16px">${__('records.batch.confirmText', count)}</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">${__('records.cancel')}</button>
      <button class="btn btn-danger" onclick="confirmBatchDelete()">${__('records.batch.confirmDeleteBtn', count)}</button>
    </div>
  `);
}

function confirmBatchDelete() {
  const ids = [...selectedRecordIds];
  ids.forEach(id => {
    DataStore.softDeleteRecord(id);
  });
  selectedRecordIds.clear();
  batchMode = false;
  closeModal();
  showToast(__('records.batch.deleted', ids.length));
  refreshCurrentPage();
}

function batchChangeCategory() {
  const count = selectedRecordIds.size;
  if (count === 0) {
    showToast(__('records.batch.selectFirstMod'), 'warning');
    return;
  }
  // Show category picker
  const roots = DataStore.getRootCategories();
  let html = `<div class="modal-title">${__('records.batch.changeTitle')}</div>
    <p class="text-sm text-secondary mb-8">${__('records.batch.changeText', count)}</p>
    <div style="max-height:50vh;overflow-y:auto">`;
  html += buildBatchCategoryTree(roots, 0);
  html += '</div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">' + __('records.cancel') + '</button></div>';
  showModal(html);
}

function buildBatchCategoryTree(cats, depth) {
  let html = '';
  cats.forEach(cat => {
    const children = DataStore.getChildren(cat.id);
    const indent = depth * 20;
    html += `
      <div style="padding:8px 12px;cursor:pointer;border-radius:var(--radius-sm);transition:var(--transition-fast);display:flex;align-items:center;gap:8px;margin-left:${indent}px"
           onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''"
           onclick="confirmBatchChangeCategory('${cat.id}')">
        <span style="width:10px;height:10px;border-radius:50%;background:${cat.color};display:inline-block"></span>
        <span>${escHtml(cat.icon)}</span>
        <span>${escHtml(cat.name)}</span>
      </div>`;
    if (children.length) {
      html += buildBatchCategoryTree(children, depth + 1);
    }
  });
  return html;
}

function confirmBatchChangeCategory(catId) {
  const cat = DataStore.getCategory(catId);
  if (!cat) return;
  const ids = [...selectedRecordIds];
  ids.forEach(id => {
    DataStore.updateRecord(id, { categoryId: catId });
  });
  selectedRecordIds.clear();
  batchMode = false;
  closeModal();
  showToast(__('records.batch.changed', ids.length, cat.icon, cat.name));
  refreshCurrentPage();
}

function deleteRecordConfirm(id) {
  const record = DataStore.getRecord(id);
  if (!record) return;
  const cat = DataStore.getCategory(record.categoryId);
  showModal(`
    <div class="modal-title">${__('records.deleteConfirm.title')}</div>

function confirmDeleteRecord(id) {
  logEvent('confirmDeleteRecord', 'id=' + id);
  const record = DataStore.softDeleteRecord(id);
  closeModal();
  if (record) {
    // Show undo toast
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast warning';
    toast.innerHTML = `<span>🗑️</span>${__('records.undoDeleted')}<button class="btn btn-sm btn-primary" style="padding:2px 10px;font-size:0.8rem" onclick="undoDelete(this)">${__('records.undoBtn')}</button>`;
    container.appendChild(toast);
    toast._pendingId = id;
    // Auto-dismiss after 5s
    toast._autoTimeout = setTimeout(() => {
      if (toast.parentNode) {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-10px)';
        toast.style.transition = 'all 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }
    }, 5000);
  }
  refreshCurrentPage();
}

function confirmHardDeleteRecord(id) {
  logEvent('confirmHardDeleteRecord', 'id=' + id);
  closeModal();
  const success = DataStore.forceDeleteRecord(id);
  if (success) {
    showToast(__('records.hardDeleted'), 'success');
  } else {
    showToast(__('records.deleteFail'), 'error');
  }
  refreshCurrentPage();
}

function undoDelete(btn) {
  const toast = btn.closest('.toast');
  if (!toast) return;
  const success = DataStore.undoDelete();
  if (success) {
    toast.innerHTML = `<span>✅</span>${__('records.undoSuccess')}`;
    toast.classList.add('success');
    toast.classList.remove('warning');
    clearTimeout(toast._autoTimeout);
    setTimeout(() => {
      if (toast.parentNode) {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-10px)';
        toast.style.transition = 'all 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }
    }, 2000);
    refreshCurrentPage();
  } else {
    toast.innerHTML = `<span>❌</span>${__('records.undoFail')}`;
    toast.classList.add('error');
    toast.classList.remove('warning');
  }
}

      let val = this.value.replace(/[^0-9.]/g, '');
      const parts = val.split('.');
      if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
      if (parts[1] && parts[1].length > 2) val = parts[0] + '.' + parts[1].slice(0, 2);
      this.value = val;
    });
  }

function submitEditRecord(e, id) {
  e.preventDefault();
  const amount = parseFloat(document.getElementById('editAmount').value);
  if (!amount || amount <= 0) { showToast(__('records.edit.invalidAmount'), 'error'); return; }
  if (!selectedCategoryId) { showToast(__('records.edit.selectCategory'), 'error'); return; }

  DataStore.updateRecord(id, {
    amount,
    categoryId: selectedCategoryId,
    date: document.getElementById('editDateTime').value,
    note: document.getElementById('editNote').value.trim(),
    excludeFromAvg: document.getElementById('editExcludeAvg').checked,
    tags: (() => {
      try { return JSON.parse(document.getElementById('editTagsInput').value); }
      catch(e) { return []; }
    })(),
    updatedAt: new Date().toISOString()
  });
  selectedCategoryId = null;
  closeModal();
  showToast(__('records.edit.saved'));
  refreshCurrentPage();
}

function refreshPageData() {
  // Force-reload ALL data from localStorage, clearing any stale in-memory state
  const success = DataStore.reload();
  // Also clear any pending soft-delete state
  const pending = DataStore.getPendingDelete();
  if (pending) {
    DataStore._finalizeDelete(pending.id);
  }
  if (success) {
    showToast(__('records.refresh.success'), 'success');
  } else {
    showToast(__('records.refresh.fail'), 'error');
  }
  // Re-render ALL pages to ensure every view reflects current data
  if (typeof renderOverview === 'function') renderOverview();
  if (typeof renderAddPage === 'function') renderAddPage();
  if (typeof renderCategories === 'function') renderCategories();
  if (typeof renderStats === 'function') renderStats();
  if (typeof renderReport === 'function') renderReport();
  if (typeof renderSettings === 'function') renderSettings();
  if (typeof renderWhatIf === 'function') renderWhatIf();
  // Finally re-render the records page (current context)
  renderRecords();
}

function renderSortControls() {
  const container = document.getElementById('sortControls');
  if (!container) return;
  const fieldLabels = { date: __('records.sort.fieldDate'), amount: __('records.sort.fieldAmount'), note: __('records.sort.fieldNote'), category: __('records.sort.fieldCategory') };
  let html = '';
  recordsSort.forEach((level, idx) => {
    const arrow = level.dir === 'asc' ? '↑' : '↓';
    html += `
      <div class="sort-level" style="display:inline-flex;align-items:center;gap:4px;margin:2px 4px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);">
        <select onchange="updateSortField(${idx}, this.value)" style="padding:2px 4px;font-size:0.75rem;border:1px solid var(--border);border-radius:3px;background:var(--card-bg);color:var(--text);">
          ${['date','amount','note','category'].map(f => `<option value="${f}" ${level.field === f ? 'selected' : ''}>${fieldLabels[f]}</option>`).join('')}
        </select>
        <button class="btn btn-ghost btn-sm" style="padding:0 4px;font-size:0.8rem;border:none;cursor:pointer;background:none" onclick="toggleSortDir(${idx})" title="${__('records.sort.toggleDir')}">${arrow}</button>
        ${recordsSort.length > 1 ? `<button class="btn btn-ghost btn-sm" style="padding:0 4px;font-size:0.8rem;border:none;cursor:pointer;background:none;color:var(--danger)" onclick="removeSortLevel(${idx})" title="${__('records.sort.remove')}">×</button>` : ''}
      </div>
    `;
  });
  container.innerHTML = html;
}

function addSortLevel() {
  recordsSort.push({ field: 'date', dir: 'desc' });
  applySort();
}

function removeSortLevel(idx) {
  recordsSort.splice(idx, 1);
  if (recordsSort.length === 0) {
    recordsSort.push({ field: 'date', dir: 'desc' });
  }
  applySort();
}

function updateSortField(idx, field) {
  recordsSort[idx].field = field;
  applySort();
}

function toggleSortDir(idx) {
  recordsSort[idx].dir = recordsSort[idx].dir === 'asc' ? 'desc' : 'asc';
  applySort();
}

function clearSort() {
  recordsSort = [{ field: 'date', dir: 'desc' }];
  applySort();
}

function applySort() {
  localStorage.setItem('budgetRecordsSort', JSON.stringify(recordsSort));
  window.recordsPage = 0;
  renderRecordsList();
  renderSortControls();
}

function saveCategoryBudget(catId, month, value, type) {
  const amount = parseFloat(value) || 0;
  const budgetType = type || 'fixed';
  
  // Validate: child budget cannot exceed parent's budget
  const cat = DataStore.getCategory(catId);
  if (cat && cat.parentId && amount > 0) {
    const parentBudget = DataStore.getCategoryBudget(cat.parentId, month).value || 0;
    // Sum of all children's budgets (including this new one)
    const siblings = DataStore.getChildren(cat.parentId);
    let siblingSum = 0;
    siblings.forEach(s => {
      if (s.id === catId) return; // exclude current
      const sb = DataStore.getCategoryBudget(s.id, month).value || 0;
      siblingSum += sb;
    });
    if (siblingSum + amount > parentBudget) {
      showToast(__('categories.budgetExceedParent', formatMoney(siblingSum + amount), formatMoney(parentBudget)), 'error');
      return;
    }
  }
  
  DataStore.setCategoryBudget(catId, month, amount, budgetType);
  showToast(amount > 0 ? __('categories.budgetSaved') : __('categories.budgetCleared'));
}

/* ===== CATEGORY MERGE ===== */
function mergeCategory(sourceId) {
  const sourceCat = DataStore.getCategory(sourceId);
  if (!sourceCat) return;
  _mergeSourceId = sourceId;
  _mergeTargetId = null;
  const children = DataStore.getChildren(sourceId);
  const descendants = DataStore.getDescendantIds(sourceId);
  const allCats = DataStore.getCategories().filter(c => !descendants.includes(c.id) && c.id !== sourceId);

  let html = `
    <div class="modal-title">${__('categories.merge.title')}</div>
    <p class="text-sm text-secondary mb-8">
      ${__('categories.merge.text', sourceCat.icon, escHtml(sourceCat.name))}
    </p>
    <div class="input-group">
      <label class="input-label">${__('categories.merge.selectTarget')}</label>
      <div style="max-height:30vh;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px">`;
  html += buildMergeTargetTree(allCats.filter(c => !c.parentId), 0, sourceId, descendants);
  html += `</div></div>`;

  // If source has children, ask what to do with them
  if (children.length > 0) {
    html += `
      <div class="input-group">
        <label class="input-label">${__('categories.merge.handleChildren', children.length)}</label>
        <div class="flex flex-col gap-4" style="padding:4px 0">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 8px;border-radius:var(--radius-sm);background:var(--bg)">
            <input type="radio" name="mergeChildren" value="move" checked>
            <span class="text-sm">${__('categories.merge.moveChildren')}</span>
          </label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 8px;border-radius:var(--radius-sm);background:var(--bg)">
            <input type="radio" name="mergeChildren" value="delete">
            <span class="text-sm" style="color:var(--danger)">${__('categories.merge.deleteChildren')}</span>
          </label>
        </div>
      </div>`;
  }

  html += `
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">${__('categories.cancel')}</button>
      <button class="btn btn-primary" onclick="confirmMergeCategory()" id="mergeConfirmBtn" disabled>${__('categories.merge.selectFirst')}</button>
    </div>`;
  showModal(html);
}

function buildMergeTargetTree(cats, depth, sourceId, excludeIds) {
  let html = '';
  cats.forEach(cat => {
    if (excludeIds && excludeIds.includes(cat.id)) return;
    if (cat.id === sourceId) return;
    const children = DataStore.getChildren(cat.id);
    const indent = depth * 20;
    html += `
      <div style="padding:6px 10px;cursor:pointer;border-radius:var(--radius-sm);transition:var(--transition-fast);display:flex;align-items:center;gap:6px;margin-left:${indent}px"
           onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''"
           onclick="selectMergeTarget('${cat.id}','${escHtml(cat.icon)} ${escHtml(cat.name)}')">
        <span style="width:10px;height:10px;border-radius:50%;background:${cat.color};display:inline-block"></span>
        <span>${escHtml(cat.icon)}</span>
        <span class="text-sm">${escHtml(cat.name)}</span>
      </div>`;
    if (children.length) {
      html += buildMergeTargetTree(children, depth + 1, sourceId, excludeIds);
    }
  });
  return html;
}

let _mergeSourceId = null;
let _mergeTargetId = null;

function selectMergeTarget(catId, displayName) {
  _mergeTargetId = catId;
  const btn = document.getElementById('mergeConfirmBtn');
  if (btn) {
    btn.disabled = false;
    btn.textContent = __('categories.merge.mergeInto', displayName);
  }
}

function confirmMergeCategory() {
  const sourceId = _mergeSourceId;
  const targetId = _mergeTargetId;
  if (!sourceId || !targetId) {
    showToast(__('categories.merge.selectTargetFirst'), 'error');
    return;
  }
  if (sourceId === targetId) {
    showToast(__('categories.merge.cannotSelf'), 'error');
    return;
  }

  // Determine children handling
  const children = DataStore.getChildren(sourceId);
  let handleChildren = 'move';
  const childrenRadios = document.querySelectorAll('input[name="mergeChildren"]');
  if (childrenRadios.length > 0) {
    childrenRadios.forEach(r => { if (r.checked) handleChildren = r.value; });
  }

  const sourceCat = DataStore.getCategory(sourceId);
  const targetCat = DataStore.getCategory(targetId);
  if (!sourceCat || !targetCat) { showToast(__('categories.notFound'), 'error'); return; }

  // Get all descendant IDs of source (including source)
  const descIds = DataStore.getDescendantIds(sourceId);

  // Update all records belonging to source or its descendants
  const records = DataStore.getRecords();
  let updatedCount = 0;
  records.forEach(r => {
    if (descIds.includes(r.categoryId)) {
      r.categoryId = targetId;
      r.updatedAt = new Date().toISOString();
      updatedCount++;
    }
  });

  // Handle children categories
  if (handleChildren === 'move') {
    children.forEach(child => {
      child.parentId = targetId;
    });
  } else if (handleChildren === 'delete') {
    // Delete all children (and recursively their children)
    const deleteRecursive = (id) => {
      const grandChildren = DataStore.getChildren(id);
      grandChildren.forEach(gc => deleteRecursive(gc.id));
      DataStore._data.categories = DataStore._data.categories.filter(c => c.id !== id);
    };
    children.forEach(child => deleteRecursive(child.id));
  }

  // Delete the source category itself
  DataStore._data.categories = DataStore._data.categories.filter(c => c.id !== sourceId);
  DataStore.save();

  closeModal();
  _mergeSourceId = null;
  _mergeTargetId = null;
  showToast(__('categories.merge.complete', updatedCount));
  renderCategories();
}

function toggleCatItem(arrowEl) {
  const item = arrowEl.closest('.cat-item');
  if (!item) return;
  const body = item.querySelector('.cat-body');
  const catId = item.dataset.id;
  if (!body || !catId) return;
  const isExpanded = expandedCategories.has(catId);
  
  if (isExpanded) {
    // Collapse: lock current height instantly, then animate to 0
    body.style.transition = 'none';
    body.style.maxHeight = body.scrollHeight + 'px';
    expandedCategories.delete(catId);
    arrowEl.classList.remove('expanded');
    requestAnimationFrame(() => {
      body.style.transition = '';
      body.style.maxHeight = '0';
    });
  } else {
    // Expand
    expandedCategories.add(catId);
    arrowEl.classList.add('expanded');
    requestAnimationFrame(() => {
      const h = body.scrollHeight;
      body.style.maxHeight = h + 'px';
      // After animation, free constraint so nested expansions work
      setTimeout(() => {
        if (expandedCategories.has(catId)) {
          body.style.maxHeight = 'none';
        }
      }, 400);
    });
  }
}

function buildBreadcrumb(cat) {
  // Walk up the parent chain to collect ancestors
  const ancestors = [];
  let current = cat;
  let guard = 0;
  while (current && current.parentId && guard < 20) {
    current = DataStore.getCategory(current.parentId);
    if (current) ancestors.unshift(current);
    guard++;
  }
  
  let html = '<div class="cat-breadcrumb">';
  
  if (ancestors.length <= 2) {
    // Show all ancestors
    ancestors.forEach(a => {
      html += `<span class="crumb-item" onclick="expandAndScrollTo('${a.id}')">${escHtml(a.icon)} ${escHtml(a.name)}</span>`;
      html += '<span class="crumb-sep">/</span>';
    });
  } else {
    // First ancestor
    html += `<span class="crumb-item" onclick="expandAndScrollTo('${ancestors[0].id}')">${escHtml(ancestors[0].icon)} ${escHtml(ancestors[0].name)}</span>`;
    html += '<span class="crumb-sep">/</span>';
    // Ellipsis for hidden levels
    html += '<span class="crumb-item" style="cursor:default;color:var(--text-muted)">⋯</span>';
    html += '<span class="crumb-sep">/</span>';
    // Last ancestor (the direct parent)
    html += `<span class="crumb-item" onclick="expandAndScrollTo('${ancestors[ancestors.length - 1].id}')">${escHtml(ancestors[ancestors.length - 1].icon)} ${escHtml(ancestors[ancestors.length - 1].name)}</span>`;
    html += '<span class="crumb-sep">/</span>';
  }

  // Current category
  html += `<span class="crumb-current">${escHtml(cat.icon)} ${escHtml(cat.name)}</span>`;
  html += '</div>';

  return html;
}

function expandAndScrollTo(catId) {
  // Expand all ancestors so this category becomes visible
  const cat = DataStore.getCategory(catId);
  if (!cat) return;
  
  // Walk up and expand each ancestor
  let current = cat;
  let guard = 0;
  while (current && current.parentId && guard < 30) {
    const parent = DataStore.getCategory(current.parentId);
    if (parent) {
      expandedCategories.add(parent.id);
      current = parent;
    } else break;
    guard++;
  }
  
  // Re-render the tree
  renderCategories();
  
  // Scroll to the target element (after DOM update)
  setTimeout(() => {
    const el = document.querySelector(`.cat-item[data-id="${catId}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}
