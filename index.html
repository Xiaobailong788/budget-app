/* ============================================================
   CALENDAR HEATMAP
   ============================================================ */
function getHeatmapColor(ratio) {
  if (ratio === 0) return null; // no spending
  // Smooth gradient:  Blue → Cyan → Green → Yellow → Orange → Red
  //   ratio 0.0 → Deep Blue (far under budget)
  //   ratio 0.5 → Green (under budget)  
  //   ratio 1.0 → Yellow (at target)
  //   ratio 1.5 → Orange (over budget)
  //   ratio 2.0+ → Deep Red (far over budget)
  const stops = [
    { r: 0.0, color: [0x22, 0x55, 0xCC] },  // vibrant blue
    { r: 0.4, color: [0x22, 0x99, 0x88] },  // teal
    { r: 0.7, color: [0x44, 0xBB, 0x55] },  // green
    { r: 1.0, color: [0xFB, 0xBD, 0x0A] },  // warm yellow
    { r: 1.5, color: [0xF9, 0x73, 0x16] },  // orange
    { r: 2.0, color: [0xDC, 0x26, 0x26] }   // deep red
  ];
  const t = Math.min(ratio, 2.0);
  let lo = stops[0], hi = stops[stops.length - 1];
  for (let i = 0; i < stops.length - 1; i++) {
    if (t >= stops[i].r && t <= stops[i + 1].r) {
      lo = stops[i]; hi = stops[i + 1]; break;
    }
  }
  const span = hi.r - lo.r;
  const frac = span > 0 ? (t - lo.r) / span : 0;
  const r = Math.round(lo.color[0] + (hi.color[0] - lo.color[0]) * frac);
  const g = Math.round(lo.color[1] + (hi.color[1] - lo.color[1]) * frac);
  const b = Math.round(lo.color[2] + (hi.color[2] - lo.color[2]) * frac);
  return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
}

function getDailySavingsTarget(month) {
  const budget = DataStore.getMonthlyIncome(month) || DataStore.getBudget(month);
  if (!budget) return 0;
  const savingsTarget = DataStore.getSavingsTarget();
  const percentBase = DataStore.getPercentBase();
  const totalBills = DataStore.getBillTotal(month);
  const netDisposable = Math.max(0, budget - totalBills);
  const baseAmount = percentBase === 'net' ? netDisposable : budget;
  const targetAmount = (() => {
    const t = savingsTarget;
    if (t.type === 'fixed') return t.fixedAmount || 0;
    if (t.type === 'percent') return baseAmount * (t.percent || 0) / 100;
    return 0;
  })();
  const spendable = Math.max(0, netDisposable - targetAmount);
  const parts = month.split('-');
  const daysInMonth = new Date(parseInt(parts[0]), parseInt(parts[1]), 0).getDate();
  return daysInMonth > 0 ? spendable / daysInMonth : 0;
}

function renderCalendarHeatmap(month) {
  if (!month) return '<div class="text-sm text-muted">' + __('stats.heatmap.selectMonth') + '</div>';
  const parts = month.split('-');
  const year = parseInt(parts[0]);
  const mon = parseInt(parts[1]);
  const daysInMonth = new Date(year, mon, 0).getDate();
  const firstDayOfWeek = new Date(year, mon - 1, 1).getDay(); // 0=Sun

  const excludeBills = true;
  const dailyTarget = getDailySavingsTarget(month);
  const dailyTotals = StatsEngine.getDailyTotals(month, { excludeBills });
  const dayMap = {};
  dailyTotals.forEach(d => { dayMap[d.day] = d.total; });

  const now = new Date();
  const today = now.getDate();
  const currentMonth = getMonthKey(now.toISOString());
  const isCurrentMonth = month === currentMonth;

  const weekdays = [__('stats.heatmap.wd0'), __('stats.heatmap.wd1'), __('stats.heatmap.wd2'), __('stats.heatmap.wd3'), __('stats.heatmap.wd4'), __('stats.heatmap.wd5'), __('stats.heatmap.wd6')];

  let html = '<div class="heatmap-container">';

  // Month display (linked to stats month selector)
  html += `<div class="flex items-center justify-between mb-8">
    <span class="text-sm font-semibold">📅 ${__('stats.heatmap.title', year, mon)}</span>
    ${dailyTarget > 0 ? `<span class="text-xs text-muted">${__('stats.heatmap.dailyBudget', formatMoney(dailyTarget))}</span>` : '<span class="text-xs text-muted">' + __('stats.heatmap.noBudget') + '</span>'}
  </div>`;

  // Legend
  html += '<div class="heatmap-legend">';
  html += '<span class="heatmap-legend-label">' + __('stats.heatmap.legendLess') + '</span>';
  const legendStops = [0, 0.5, 0.9, 1.1, 1.5, 2.0, 3.0];
  legendStops.forEach(r => {
    const color = getHeatmapColor(r);
    if (color) {
      html += `<div class="heatmap-legend-item" style="background:${color}"></div>`;
    }
  });
  html += `<span class="heatmap-legend-label">${__('stats.heatmap.legendMore')}</span>`;
  html += '<span class="heatmap-legend-label" style="margin-left:8px">⚫ ' + __('stats.heatmap.noSpending') + '</span>';
  html += '</div>';

  // Weekday headers
  html += '<div class="heatmap-grid">';
  weekdays.forEach(wd => {
    html += `<div class="heatmap-weekday">${wd}</div>`;
  });

  // Empty cells before first day
  for (let i = 0; i < firstDayOfWeek; i++) {
    html += '<div></div>';
  }

  // Day cells
  const dateStrMonth = year + '-' + String(mon).padStart(2, '0');
  for (let day = 1; day <= daysInMonth; day++) {
    const spending = dayMap[day] || 0;
    const ratio = dailyTarget > 0 ? spending / dailyTarget : 0;
    const color = getHeatmapColor(ratio);
    const isFuture = isCurrentMonth && day > today;
    const isEmpty = spending === 0;

    const dateStr = dateStrMonth + '-' + String(day).padStart(2, '0');
    const tooltipText = isEmpty ? __('stats.heatmap.noSpendingShort') : formatMoney(spending) + ' (' + __('stats.heatmap.vsTarget', (ratio === 0 ? '0' : (ratio * 100).toFixed(0))) + ')';

    let cellStyle = '';
    if (isFuture) {
      cellStyle = 'background:#E2E8F0;color:#94A3B8';
    } else if (isEmpty) {
      cellStyle = '';
    } else if (color) {
      cellStyle = `background:${color};color:white;text-shadow:0 1px 2px rgba(0,0,0,0.3)`;
    }

    const classes = 'heatmap-day'
      + (isFuture ? ' future' : '')
      + (isEmpty && !isFuture ? ' empty-day' : '');

    html += `<!-- heatmap-day click -->
      <div class="${classes}" style="${cellStyle}"
      ${!isFuture ? `onclick="showDayRecords('${dateStr}')"` : ''}>
      ${day}
      <div class="heatmap-tooltip">${dateStrMonth.slice(5)}/${String(day).padStart(2,'0')} ${tooltipText}</div>
    </div>`;
  }

  html += '</div>'; // close grid

  // Day records popup area
  html += '<div id="heatmapDayPopup" class="heatmap-day-popup" style="display:none"></div>';

  html += '</div>'; // close container

  return html;
}

function showDayRecords(dateStr) {
  // Determine target: if expanded heatmap is open, use the expand panel; otherwise use the regular popup
  const expandPanel = document.getElementById('expandDayPanel');
  const popup = document.getElementById('heatmapDayPopup');
  
  const isExpand = !!expandPanel;
  const target = isExpand ? expandPanel : popup;
  
  if (!target) return;

function drawCompareBarChart(canvasId, month) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const tc = getThemeColors();
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = rect.width || 600;
  const h = 230;
  if (canvas.width !== Math.round(w * dpr) || canvas.height !== Math.round(h * dpr)) {
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
  }

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Calculate previous month
  const parts = month.split('-');
  const prevM = parseInt(parts[1]) - 1;
  const prevMonth = prevM > 0 ? parts[0] + '-' + String(prevM).padStart(2,'0') : (parseInt(parts[0])-1) + '-12';

  const thisData = getChartData(month);
  const prevDataMap = {};
  getChartData(prevMonth).forEach(d => {
    prevDataMap[d.id] = d.total;
  });

  if (!thisData.length) {
    ctx.fillStyle = tc.textMuted;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(__('stats.noData'), w/2, h/2);
    return;
  }

  const padding = { top: 20, bottom: 55, left: 60, right: 25 };
  const plotW = w - padding.left - padding.right;
  const plotH = h - padding.top - padding.bottom;
  const maxVal = Math.max(...thisData.map(d => Math.max(d.total, prevDataMap[d.id] || 0)), 0.01);
  const groupW = plotW / thisData.length;
  const barW = Math.min(18, groupW * 0.35);

  // Grid
  ctx.strokeStyle = tc.border;
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = padding.top + (plotH / 4) * i;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(w - padding.right, y);
    ctx.stroke();
    ctx.fillStyle = tc.textMuted;
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(formatMoney(maxVal * (1 - i/4)), padding.left - 5, y + 3);
  }

  // Grouped bars
  thisData.forEach((d, i) => {
    const x = padding.left + i * groupW + (groupW - barW * 2) / 2;
    const prevVal = prevDataMap[d.id] || 0;

    // Previous month bar (green, left)
    const prevH = (prevVal / maxVal) * plotH;
    ctx.fillStyle = '#10B981';
    ctx.beginPath();
    ctx.roundRect(x, padding.top + plotH - prevH, barW, Math.max(prevH, 1), [3, 0, 0, 3]);
    ctx.fill();
    if (prevVal > 0) {
      ctx.fillStyle = '#059669';
      ctx.font = 'bold 8px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(formatMoney(prevVal), x + barW/2, padding.top + plotH - prevH - 3);
    }

    // This month bar (blue, right)
    const thisH = (d.total / maxVal) * plotH;
    ctx.fillStyle = '#6366F1';
    ctx.beginPath();
    ctx.roundRect(x + barW, padding.top + plotH - thisH, barW, Math.max(thisH, 1), [0, 3, 3, 0]);
    ctx.fill();
    ctx.fillStyle = '#4F46E5';
    ctx.font = 'bold 8px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(formatMoney(d.total), x + barW + barW/2, padding.top + plotH - thisH - 3);

    // Category label
    ctx.fillStyle = tc.text;
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(d.cat.name.length > 4 ? d.cat.name.slice(0,4)+'..' : d.cat.name, x + barW, h - 8);
  });

  // Labels for this/prev month
  ctx.fillStyle = '#6366F1';
  ctx.font = 'bold 9px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('🔵 ' + __('stats.thisMonth'), padding.left, 12);
  ctx.fillStyle = '#10B981';
  ctx.fillText('🟢 ' + __('stats.lastMonth'), padding.left + 80, 12);
}

function refreshOverviewBudget() {
  const now = new Date();
  const month = getMonthKey(now.toISOString());
  const includeBills = isBillToggleChecked('overviewBudget');
  const monthTotal = includeBills ? StatsEngine.getMonthTotal(month) : StatsEngine.getVariableSpending(month);
  const budget = DataStore.getMonthlyIncome(month) || DataStore.getBudget(month);
  if (!budget) return;

  const totalBills = DataStore.getBillTotal(month);
  const savingsTarget = DataStore.getSavingsTarget();
  const percentBase = DataStore.getPercentBase();
  const netDisposable = Math.max(0, budget - totalBills);
  const baseAmount = percentBase === 'net' ? netDisposable : budget;
  const targetAmount = (() => {
    const t = savingsTarget;
    if (t.type === 'fixed') return t.fixedAmount || 0;
    if (t.type === 'percent') return baseAmount * (t.percent || 0) / 100;
    return 0;
  })();
  const spendableBudget = Math.max(0, netDisposable - targetAmount);
  const budgetPct = includeBills
    ? (budget > 0 ? (monthTotal / budget) * 100 : 0)
    : (spendableBudget > 0 ? (monthTotal / spendableBudget) * 100 : 0);

  // Redraw ring
  const budgetOverspend = budgetPct > 100;
  drawRing('budgetRing', Math.min(budgetPct, 200) / 100, budgetOverspend ? '#EF4444' : '#6366F1',
    (budgetOverspend ? '+' : '') + budgetPct.toFixed(0) + '%', '#EF4444');

  // Update label below ring
  const parent = document.getElementById('budgetRing')?.parentElement;
  if (!parent) return;
  const labelEl = parent.querySelector('.text-sm.text-secondary');
  if (labelEl) {
    labelEl.textContent = budgetPct > 100
      ? __('stats.overspent') + ' ' + formatMoney(monthTotal - (includeBills ? budget : spendableBudget))
      : formatMoney(monthTotal) + ' / ' + formatMoney(includeBills ? budget : spendableBudget);
    labelEl.style.color = budgetPct > 100 ? 'var(--danger)' : '';
    labelEl.style.fontWeight = budgetPct > 100 ? '600' : '';
  }

  // Update bottom formula text
  const formulaEl = parent.querySelector('.text-xs.text-muted');
  if (formulaEl) {
    formulaEl.remove();
  }
  if (targetAmount > 0 && budget > 0) {
    const newFormula = document.createElement('div');
    newFormula.className = 'text-xs text-muted mt-4';
    newFormula.textContent = `${__('stats.monthlyIncome')} ${formatMoney(budget)}` + (totalBills > 0 ? ` − ${__('stats.bills')} ${formatMoney(totalBills)}` : '') + ` − ${__('stats.savings')} ${formatMoney(targetAmount)} = ${__('stats.dailyAvailable')} ${formatMoney(spendableBudget)}`;
    parent.appendChild(newFormula);
  }
}

function renderStats() {
  console.log('[renderStats] rendering for month:', statsMonth, 'custom:', statsStartDate, statsEndDate);
  const el = document.getElementById('page-stats');
  const now = new Date();
  statsMonth = statsMonth || getMonthKey(now.toISOString());
  window.statsMonth = statsMonth;
  const isRolling = getStatsRange() === 'rolling30' && statsMonth === getMonthKey(now.toISOString()) && !useCustomRange();
  const monthTotal = isRolling ? StatsEngine.getPeriodTotal() : StatsEngine.getMonthTotal(statsMonth);
  const dailyAvg = isRolling ? StatsEngine.getPeriodDailyAverage() : StatsEngine.getDailyAverage(statsMonth);
  const predicted = isRolling ? StatsEngine.getPeriodPredictedTotal() : StatsEngine.getPredictedTotal(statsMonth);
  const budget = DataStore.getMonthlyIncome(statsMonth) || DataStore.getBudget(statsMonth);
  const remainingLimit = isRolling ? StatsEngine.getPeriodRemainingDailyLimit() : StatsEngine.getRemainingDailyLimit(statsMonth);

  // Spendable budget for stats page
  const savingsTargetStats = DataStore.getSavingsTarget();
  const percentBaseStats = DataStore.getPercentBase();
  const totalBillsStats = DataStore.getBillTotal(statsMonth);
  const paidBillsStats = isRolling ? StatsEngine.getPeriodBillSpending() : StatsEngine.getBillSpendingActual(statsMonth);
  const unpaidPlannedBillsStats = Math.max(0, totalBillsStats - paidBillsStats);
  const effectiveTotalStats = monthTotal + unpaidPlannedBillsStats;
  const savingsPred = isRolling ? (budget - monthTotal) : (StatsEngine.getSavingsPrediction(statsMonth) - unpaidPlannedBillsStats);
  const netDisposableStats = Math.max(0, budget - totalBillsStats);
  const baseAmountStats = percentBaseStats === 'net' ? netDisposableStats : budget;
  const targetAmountStats = (() => {
    const t = savingsTargetStats;
    if (t.type === 'fixed') return t.fixedAmount || 0;
    if (t.type === 'percent') return baseAmountStats * (t.percent || 0) / 100;
    return 0;
  })();
  const spendableBudgetStats = Math.max(0, netDisposableStats - targetAmountStats);
  const remainingLimitSpendableStats = (() => {
    const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
    const remainingDays = daysInMonth - now.getDate();
    if (remainingDays <= 0) return 0;
    const varSpendingStats = isRolling ? StatsEngine.getPeriodVariableSpending() : StatsEngine.getVariableSpending(statsMonth);
    const remainingAmt = spendableBudgetStats - varSpendingStats;
    return Math.max(0, remainingAmt / remainingDays);
  })();

  const isCustom = useCustomRange();
  const rangeTotal = isCustom ? StatsEngine.getCustomRangeTotals(statsStartDate, statsEndDate) : null;
  const actualSavings = Math.max(0, budget - monthTotal);

  // Compute extra stats

function changeStatsMonth(month) {
  statsMonth = month;
  window.statsMonth = month;
  statsStartDate = '';
  window.statsStartDate = '';
  statsEndDate = '';
  window.statsEndDate = '';
  statsDrillStack = [];
  window.statsDrillStack = [];
  renderStats();
}

function changeStatsCustom() {
  statsStartDate = document.getElementById('statsDateStart').value;
  window.statsStartDate = statsStartDate;
  statsEndDate = document.getElementById('statsDateEnd').value;
  window.statsEndDate = statsEndDate;
  if (statsStartDate && statsEndDate) {
    // Validate: if start > end, swap them
    if (statsStartDate > statsEndDate) {
      [statsStartDate, statsEndDate] = [statsEndDate, statsStartDate];
      window.statsStartDate = statsStartDate;
      window.statsEndDate = statsEndDate;
      document.getElementById('statsDateStart').value = statsStartDate;
      document.getElementById('statsDateEnd').value = statsEndDate;
      showToast(__('stats.dateRangeAutoFixed'), 'warning');
    }
    statsMonth = '';
    window.statsMonth = '';
    statsDrillStack = [];
    window.statsDrillStack = [];
    renderStats();
  }
}

function resetStatsDrill() {
  // Pop one level: go to parent
  if (statsDrillStack.length > 1) {
    statsDrillStack.pop(); // remove current, parent becomes active
  } else {
    statsDrillStack = []; // back to root
    window.statsDrillStack = [];
  }
  updateDrillCharts();
}

function useCustomRange() {
  return statsStartDate && statsEndDate && !statsMonth;
}

function getStatsCatTotals() {
  if (useCustomRange()) {
    const range = StatsEngine.getCustomRangeTotals(statsStartDate, statsEndDate);
    return range.categoryTotals || {};
  }
  const isRollingStats = getStatsRange() === 'rolling30' && statsMonth === getMonthKey(new Date().toISOString());
  return isRollingStats ? StatsEngine.getPeriodCategoryTotals() : StatsEngine.getCategoryTotals(statsMonth);
}

function getStatsDailyTotals() {
  if (useCustomRange()) {
    const range = StatsEngine.getCustomRangeTotals(statsStartDate, statsEndDate);
    return range.daily.map(d => ({ day: d.day.slice(8,10), total: d.total }));
  }
  const isRollingStats = getStatsRange() === 'rolling30' && statsMonth === getMonthKey(new Date().toISOString());
  return isRollingStats ? StatsEngine.getPeriodDailyTotals({ excludeBills: false }) : StatsEngine.getDailyTotals(statsMonth);
}

function getChartData(month, startDate, endDate, options = {}) {
  const excludeBills = options.excludeBills || false;
  let catTotals;
  if (startDate && endDate) {
    const range = StatsEngine.getCustomRangeTotals(startDate, endDate);
    catTotals = range.categoryTotals || {};
  } else {
    const isRollingChart = getStatsRange() === 'rolling30' && month === getMonthKey(new Date().toISOString());
    catTotals = month
      ? (isRollingChart ? StatsEngine.getPeriodCategoryTotals() : StatsEngine.getCategoryTotals(month))
      : getStatsCatTotals();
  }

  // Filter out bill categories if excludeBills
  if (excludeBills) {
    const billCatIds = new Set((DataStore.getBillCategories() || []).map(c => c.id));
    Object.keys(catTotals).forEach(id => {
      if (billCatIds.has(id)) delete catTotals[id];
    });
  }

  // Aggregate to root categories
  const rootTotals = {};
  Object.entries(catTotals).forEach(([id, total]) => {
    const rootId = getRootAncestorId(id);
    if (rootId) {
      rootTotals[rootId] = (rootTotals[rootId] || 0) + total;
    }
  });
  return Object.entries(rootTotals)
    .map(([id, total]) => ({ id, total, cat: DataStore.getCategory(id) }))
    .filter(x => x.cat && x.total > 0)
    .sort((a,b) => b.total - a.total);
}

function getChartDataForRange(startDate, endDate) {
  return getChartData(null, startDate, endDate);
}

function getRawChartData(month, startDate, endDate, options = {}) {
  const excludeBills = options.excludeBills || false;
  let catTotals;
  if (startDate && endDate) {
    const range = StatsEngine.getCustomRangeTotals(startDate, endDate);
    catTotals = range.categoryTotals || {};
  } else {
    const isRollingChart = getStatsRange() === 'rolling30' && month === getMonthKey(new Date().toISOString());
    catTotals = month
      ? (isRollingChart ? StatsEngine.getPeriodCategoryTotals() : StatsEngine.getCategoryTotals(month))
      : getStatsCatTotals();
  }
  if (excludeBills) {
    const billCatIds = new Set((DataStore.getBillCategories() || []).map(c => c.id));
    Object.keys(catTotals).forEach(id => {
      if (billCatIds.has(id)) delete catTotals[id];
    });
  }
  return Object.entries(catTotals)
    .map(([id, total]) => ({ id, total, cat: DataStore.getCategory(id) }))
    .filter(x => x.cat)
    .sort((a,b) => b.total - a.total);
}
function drawPieChart(canvasId, month, startDate, endDate, onDrill, height, noAnim) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  console.log('[drawPieChart] canvasId:', canvasId, 'month:', month, 'noAnim:', noAnim);
  const tc = getThemeColors();

  // Remove old event listeners before redrawing (clean slate)
  const oldHandlers = canvas._pieHandlers;
  if (oldHandlers) {
    canvas.removeEventListener('mousemove', oldHandlers.mousemove);
    canvas.removeEventListener('mouseleave', oldHandlers.mouseleave);
    canvas.removeEventListener('click', oldHandlers.click);
    delete canvas._pieHandlers;
  }

  // --- Sizing: use CSS for display, only set internal resolution ---
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = rect.width || 400;
  const h = height || 250;
  // Only update internal resolution if size actually changed
  if (canvas.width !== Math.round(w * dpr) || canvas.height !== Math.round(h * dpr)) {
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
  }
  // Do NOT set canvas.style.width/height — CSS width:100% handles display sizing

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  let data;
  const drillCategory = getDrillCategory();
  if (drillCategory) {
    const breakdown = StatsEngine.getCategoryBreakdownDeep(month, drillCategory);
    if (breakdown) {
      const childrenData = (breakdown.children || []).map(c => ({ id: c.category.id, total: c.total, cat: c.category }));
      const childrenTotal = childrenData.reduce((s, d) => s + d.total, 0);
      const directTotal = breakdown.total - childrenTotal;
      data = [...childrenData];
      if (directTotal > 0.001) {
        data.push({
          id: breakdown.category.id + '-direct',
          total: directTotal,
          cat: { name: breakdown.category.name + __('stats.direct'), icon: '📌', color: breakdown.category.color }
        });
      }
      if (data.length === 0) {
        data = [{ id: breakdown.category.id, total: breakdown.total, cat: breakdown.category }];
      }
      data = data.filter(d => d.total > 0);
      data.forEach((d, i) => { d.displayColor = COLORS[i % COLORS.length]; });
    } else {
      data = [];
    }
  } else {
    // For expanded charts, use the same toggle as the original chart
    const toggleId = canvasId === 'expandPieChart' ? 'pieChart' : canvasId;
    const excludeBills = !isBillToggleChecked(toggleId);
    data = getChartData(month, startDate, endDate, { excludeBills });
    data.forEach((d, i) => { d.displayColor = COLORS[i % COLORS.length]; });
  }

  if (!data.length) {
    ctx.fillStyle = tc.textMuted;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(__('stats.noData'), w/2, h/2);
    return;
  }

  // --- Geometry ---
  const cx = w * 0.35, cy = h / 2, r = Math.min(w * 0.25, h * 0.38);
  const total = data.reduce((s, d) => s + d.total, 0);

  // Pre-calculate slices
  const slices = [];
  let angleStart = -Math.PI / 2;
  data.forEach(d => {
    const sliceAngle = (d.total / total) * Math.PI * 2;
    slices.push({ ...d, angleStart, sliceAngle });
    angleStart += sliceAngle;

function lightenColor(hex, pct) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, (num >> 16) + Math.round(2.55 * pct));
  const g = Math.min(255, ((num >> 8) & 0x00FF) + Math.round(2.55 * pct));
  const b = Math.min(255, (num & 0x0000FF) + Math.round(2.55 * pct));
  return '#' + (r << 16 | g << 8 | b).toString(16).padStart(6, '0');
}

function darkenColor(hex, pct) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.max(0, (num >> 16) - Math.round(2.55 * pct));
  const g = Math.max(0, ((num >> 8) & 0x00FF) - Math.round(2.55 * pct));
  const b = Math.max(0, (num & 0x0000FF) - Math.round(2.55 * pct));
  return '#' + (r << 16 | g << 8 | b).toString(16).padStart(6, '0');
}

    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';

    return;

  const plotW = w - padding.left - padding.right;

  const maxVal = Math.max(...dailyData.map(d => d.total), 0.01);

  let dailyTarget = 0;
  if (month) {

  const points = dailyData.map((d, i) => ({

      ctx.lineTo(w - padding.right, y);
      ctx.stroke();
      ctx.fillStyle = tc.textMuted;
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'right';

      ctx.font = '11px sans-serif';

  const points = data.map((d, i) => ({
    x: padding.left + (i / (data.length - 1)) * plotW,
    y: padding.top + plotH - (d.total / maxVal) * plotH,
    total: d.total,
    label: d.month.slice(5, 7) + __('stats.month')
  }));

  // Fill area
  ctx.beginPath();
  points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  const lastP = points[points.length - 1];
  ctx.lineTo(lastP.x, padding.top + plotH);
  ctx.lineTo(points[0].x, padding.top + plotH);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, padding.top, 0, padding.top + plotH);
  grad.addColorStop(0, 'rgba(99,102,241,0.15)');
  grad.addColorStop(1, 'rgba(99,102,241,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.strokeStyle = '#6366F1';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Dots + labels
  points.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#6366F1';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // X label
    ctx.fillStyle = tc.text;
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.label, p.x, h - 8);

    // Value above dot
    ctx.fillStyle = tc.textSecondary;
    ctx.font = 'bold 10px sans-serif';
    ctx.fillText(formatMoney(p.total), p.x, p.y - 10);
  });
}
function drawSavingsChart(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const tc = getThemeColors();
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = rect.width || 600;
  const h = 200;
  if (canvas.width !== Math.round(w * dpr) || canvas.height !== Math.round(h * dpr)) {
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
  }

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const months = StatsEngine.getMonthlyTotals(6);
  if (!months.length) {
    ctx.fillStyle = tc.textMuted;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(__('stats.noData'), w/2, h/2);
    return;
  }

  // Compute savings for each month (budget - spending)
  const savings = months.map(m => {
    const b = DataStore.getBudget(m.month);
    return { ...m, savings: b ? b - m.total : 0 };
  });

  const maxVal = Math.max(...savings.map(s => Math.max(s.savings, 0)), 0.01);
  const minVal = Math.min(...savings.map(s => s.savings), 0);

  const padding = { top: 25, bottom: 35, left: 55, right: 20 };
  const plotW = w - padding.left - padding.right;
  const plotH = h - padding.top - padding.bottom;

  // Zero line
  const zeroY = padding.top + plotH - (0 - minVal) / (maxVal - minVal) * plotH;

  // Grid
  ctx.strokeStyle = tc.border;
  ctx.lineWidth = 1;
  for (let i = 0; i <= 3; i++) {
    const y = padding.top + (plotH / 3) * i;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(w - padding.right, y);
    ctx.stroke();
    ctx.fillStyle = tc.textMuted;
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'right';
    const val = maxVal - (maxVal - minVal) * i / 3;
    ctx.fillText(formatMoney(val), padding.left - 5, y + 3);
  }

  // Draw bars
  const barW = Math.min(36, plotW / savings.length * 0.55);
  const gap = plotW / savings.length;

  savings.forEach((s, i) => {
    const x = padding.left + i * gap + (gap - barW) / 2;
    const barH = Math.abs(s.savings) / (maxVal - minVal) * plotH;
    const isPositive = s.savings >= 0;
    const color = isPositive ? '#10B981' : '#EF4444';
    const y = isPositive ? zeroY - barH : zeroY;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x, y, barW, Math.max(barH, 2), [4, 4, 0, 0]);
    ctx.fill();

    // Month label
    ctx.fillStyle = tc.text;
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(s.month.slice(5, 7) + __('stats.month'), x + barW/2, h - 8);

    // Value label
    ctx.fillStyle = isPositive ? '#10B981' : '#EF4444';
    ctx.font = 'bold 9px sans-serif';
    const labelY = isPositive ? y - 5 : y + barH + 14;
    ctx.fillText(formatMoney(s.savings), x + barW/2, labelY);
  });

  // Zero line
  ctx.strokeStyle = tc.textMuted;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(padding.left, zeroY);
  ctx.lineTo(w - padding.right, zeroY);
  ctx.stroke();
  ctx.setLineDash([]);
}

/* ============================================================
   WAFFLE CHART — Tag Distribution Visualization
   ============================================================ */
function drawWaffleChart(canvasId, records) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  // 1. Get dimensions
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = rect.width;
  const h = 220;
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // 2. If independent month selected, filter records
  var filteredRecords = records;
  if (waffleSelectedMonth) {
    filteredRecords = records.filter(function(r) {
      return getMonthKey(r.date || r.createdAt) === waffleSelectedMonth && !r._deleted;
    });
  }

  // 3. Aggregate tags
  const tagTotals = {};
  let untaggedTotal = 0;

  filteredRecords.forEach(function(r) {
    if (r.tags && r.tags.length > 0) {
      r.tags.forEach(function(t) {
        tagTotals[t] = (tagTotals[t] || 0) + r.amount;
      });
    } else {
      untaggedTotal += r.amount;
    }
  });

  var tagKeys = Object.keys(tagTotals);
  var customColors = DataStore.getAllTagColors();
  var tagData = tagKeys.map(function(name, idx) {
    return { name: name, amount: tagTotals[name], color: customColors[name] || COLORS[idx % COLORS.length] };
  });
  tagData.sort(function(a, b) { return b.amount - a.amount; });

  if (waffleIncludeUntagged && untaggedTotal > 0) {
    tagData.push({ name: __('stats.waffle.untagged'), amount: untaggedTotal, color: '#999' });
  }

  var totalAmount = tagData.reduce(function(s, d) { return s + d.amount; }, 0);
  if (totalAmount === 0) {
    ctx.fillStyle = 'var(--text-muted)';
    ctx.textAlign = 'center';
    ctx.fillText(__('stats.waffle.noData'), w / 2, h / 2);
    return;
  }

  // 4. Calculate grid
  var densityMap = { 1: 600, 2: 300, 3: 150, 4: 60, 5: 24 };
  var totalCells = densityMap[waffleDensity] || 200;
  var aspectRatio = w / h;
  var cols = Math.round(Math.sqrt(totalCells * aspectRatio));
  var rows = Math.round(totalCells / cols);
  while (rows * cols < totalCells) cols++;
  var actualCells = rows * cols;

  // 第一遍：估算 cellSize（不含 gap）
  var cellSize = Math.min(w / cols, (h - 30) / rows);
  // 根据估算值计算 gap
  var gap = Math.max(1, Math.min(3, Math.round(cellSize * 0.1)));
  // 第二遍：用 gap 重新计算 cellSize，确保不出界
  cellSize = Math.min(
    (w - (cols - 1) * gap) / cols,
    (h - 30 - (rows - 1) * gap) / rows
  );
  // 安全下限
  cellSize = Math.max(4, Math.floor(cellSize * 10) / 10);
  gap = Math.max(1, Math.min(3, Math.round(cellSize * 0.1)));
  var gridW = cols * cellSize + (cols - 1) * gap;
  var gridH = rows * cellSize + (rows - 1) * gap;
  var offsetX = Math.max(0, (w - gridW) / 2);
  var offsetY = Math.max(0, (h - gridH) / 2);

  // 5. Assign cells to tags
  var cellValue = totalAmount / actualCells;
  var cells = [];
  var remainingCells = actualCells;

  tagData.forEach(function(tag, idx) {
    var tagCells = Math.round(tag.amount / cellValue);
    var assigned = Math.min(tagCells, remainingCells);
    for (var i = 0; i < assigned; i++) {
      cells.push({ tagIndex: idx, color: tag.color });
    }
    remainingCells -= assigned;
  });

  while (cells.length < actualCells) {
    cells.push({ tagIndex: 0, color: tagData[0].color });
  }

  // Order cells by tag grouping
  var orderedCells = [];
  tagData.forEach(function(tag, idx) {
    var count = cells.filter(function(c) { return c.tagIndex === idx; }).length;
    for (var i = 0; i < count; i++) {
      orderedCells.push({ tagIndex: idx, color: tag.color });
    }
  });
  cells = orderedCells;

  // Store for hover
  waffleCells = cells;
  waffleTagData = tagData;

  // 6. Animate
  animateWaffle(ctx, cells, cellSize, gap, offsetX, offsetY, cols, rows, tagData, totalAmount);
}

function drawCell(ctx, x, y, size, color, scale) {
  var s = size * (scale || 1);
  var offset = (size - s) / 2;
  var r = 2;
  ctx.beginPath();
  ctx.roundRect(x + offset, y + offset, s, s, r);
  ctx.fillStyle = color;
  ctx.fill();
}

function animateWaffle(ctx, cells, cellSize, gap, offsetX, offsetY, cols, rows, tagData, totalAmount) {
  var batchSize = Math.max(10, Math.ceil(cells.length / 30));
  var staggerMs = 20;
  var popDuration = 400;
  var totalBatches = Math.ceil(cells.length / batchSize);
  var startTime = performance.now();

  var positions = cells.map(function(cell, i) {
    return {
      col: Math.floor(i / rows),
      row: i % rows,
      tagIndex: cell.tagIndex,
      color: cell.color
    };
  });

  function drawFrame(currentTime) {
    var elapsed = currentTime - startTime;
    ctx.clearRect(0, 0, ctx.canvas.width / (window.devicePixelRatio || 1), 220);

    var allDone = true;
    positions.forEach(function(pos, i) {
      var batchIdx = Math.floor(i / batchSize);
      var batchStart = batchIdx * staggerMs;
      var localTime = elapsed - batchStart;

      var scale;
      if (localTime >= popDuration) {
        scale = 1;
      } else if (localTime > 0) {
        var t = localTime / popDuration;
        scale = t === 1 ? 1 : 1 - Math.pow(2, -7 * t) * Math.cos(t * Math.PI * 2 * 1.2);
        allDone = false;
      } else {
        allDone = false;
        var x = offsetX + pos.col * (cellSize + gap);
        var y = offsetY + pos.row * (cellSize + gap);
        ctx.strokeStyle = 'rgba(128,128,128,0.2)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(x, y, cellSize, cellSize, 2);
        ctx.stroke();
        return;
      }

      var x = offsetX + pos.col * (cellSize + gap);
      var y = offsetY + pos.row * (cellSize + gap);
      var s = cellSize * Math.max(0.01, scale);
      var centerOffset = (cellSize - s) / 2;

      ctx.beginPath();
      ctx.roundRect(x + centerOffset, y + centerOffset, s, s, 2);
      ctx.fillStyle = pos.color;
      ctx.fill();
    });

    if (!allDone) {
      requestAnimationFrame(drawFrame);
    } else {
      drawWaffleLegend(tagData, totalAmount);
      bindWaffleHover(ctx.canvas, cells, cellSize, gap, offsetX, offsetY, cols, rows, tagData, totalAmount);
    }
  }

  requestAnimationFrame(drawFrame);
}

function drawWaffleLegend(tagData, totalAmount) {
  var container = document.getElementById('waffleLegend');
  if (!container) return;
  container.innerHTML = tagData.map(function(t) {
    var pct = ((t.amount / totalAmount) * 100).toFixed(1);
    return '<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 6px;background:var(--bg);border-radius:4px;cursor:pointer" onclick="window.setRecordsTagFilter(\'' + escHtml(t.name) + '\');navigateTo(\'records\')">' +
      '<span style="width:10px;height:10px;border-radius:3px;background:' + t.color + ';display:inline-block;cursor:pointer" onclick="event.stopPropagation();openWaffleTagColorPicker(\'' + escHtml(t.name) + '\',\'' + t.color + '\')"></span>' +
      '<span>' + escHtml(t.name) + '</span>' +
      '<span style="color:var(--text-muted)">' + formatMoney(t.amount) + ' \u00B7 ' + pct + '%</span>' +
    '</span>';
  }).join('');
}

function startHoverAnim(canvas, cells, cellSize, gap, offsetX, offsetY, cols, rows, tagData, totalAmount, tooltip, event, targetTagIdx) {
  // Cancel any running animation
  if (_hoverAnimId) {
    cancelAnimationFrame(_hoverAnimId);
    _hoverAnimId = null;
  }

  var startTime = performance.now();
  var duration = 150; // ms
  var startTagIdx = _hoverState.active ? _hoverState.tagIndex : (targetTagIdx === -1 ? -1 : _hoverState.tagIndex);
  var isLeaving = targetTagIdx === -1;

  function animateHover(currentTime) {
    var elapsed = currentTime - startTime;
    var progress = Math.min(elapsed / duration, 1);
    // Ease-out quadratic
    var eased = progress * (2 - progress);

    var ctx = canvas.getContext('2d');
    var dpr = window.devicePixelRatio || 1;
    var w = canvas.width / dpr;
    var h = canvas.height / dpr;
    ctx.clearRect(0, 0, w, h);

    var highlightIdx = isLeaving ? -1 : targetTagIdx;

    cells.forEach(function(cell, i) {
      var row = i % rows;
      var col = Math.floor(i / rows);
      var x = offsetX + col * (cellSize + gap);
      var y = offsetY + row * (cellSize + gap);
      var isHighlighted = cell.tagIndex === highlightIdx;

      // Interpolate scale and alpha
      var targetScale = isHighlighted ? 1.06 : 1.0;
      var targetAlpha = isHighlighted ? 1.0 : 0.75;
      var startScale = _hoverState.active && _hoverState.tagIndex === cell.tagIndex ? 1.06 : 1.0;
      var startAlpha = _hoverState.active && _hoverState.tagIndex === cell.tagIndex ? 1.0 : 1.0;

      var scale = startScale + (targetScale - startScale) * eased;
      var alpha = startAlpha + (targetAlpha - startAlpha) * eased;
      var s = cellSize * scale;
      var cx = x + cellSize / 2;
      var cy = y + cellSize / 2;

      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
      ctx.beginPath();
      ctx.roundRect(cx - s / 2, cy - s / 2, s, s, 2);
      ctx.fillStyle = cell.color;
      ctx.fill();

      if (isHighlighted && progress > 0.5) {
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      ctx.restore();
    });

    if (progress < 1) {
      _hoverAnimId = requestAnimationFrame(animateHover);
    } else {
      _hoverAnimId = null;
      _hoverState.active = !isLeaving;
      _hoverState.tagIndex = targetTagIdx;
      _hoverState.progress = 1;
      // Final draw to ensure crisp state
      drawWaffleStatic(canvas, cells, cellSize, gap, offsetX, offsetY, cols, rows, tagData, highlightIdx);
    }
  }

  _hoverAnimId = requestAnimationFrame(animateHover);
}

function bindWaffleHover(canvas, cells, cellSize, gap, offsetX, offsetY, cols, rows, tagData, totalAmount) {
  var tooltip = document.getElementById('waffleTooltip');
  if (!tooltip) {
    tooltip = document.createElement('div');
    tooltip.id = 'waffleTooltip';
    tooltip.style.cssText = 'display:none;position:fixed;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:0.75rem;pointer-events:none;z-index:1000;box-shadow:var(--shadow-md)';
    document.body.appendChild(tooltip);
  }
  var currentHoverTag = -1;

  canvas.onmousemove = function(e) {
    var rect = canvas.getBoundingClientRect();
    var mx = e.clientX - rect.left;
    var my = e.clientY - rect.top;
    var col = Math.floor((mx - offsetX) / (cellSize + gap));
    var row = Math.floor((my - offsetY) / (cellSize + gap));
    var idx = col * rows + row;

    if (idx >= 0 && idx < cells.length && mx >= offsetX && my >= offsetY) {
      var tagIdx = cells[idx].tagIndex;
      if (tagIdx !== currentHoverTag) {
        currentHoverTag = tagIdx;
        startHoverAnim(canvas, cells, cellSize, gap, offsetX, offsetY, cols, rows, tagData, totalAmount, tooltip, e, tagIdx);
      }
      // Update tooltip position (with boundary check)
      var tag = tagData[tagIdx];
      var pct = ((tag.amount / totalAmount) * 100).toFixed(1);
      tooltip.innerHTML = '<strong>' + escHtml(tag.name) + '</strong> \u00B7 ' + formatMoney(tag.amount) + ' \u00B7 ' + pct + '%';
      tooltip.style.display = 'block';
      var tw = tooltip.offsetWidth || 180;
      var th = tooltip.offsetHeight || 30;
      var tl = e.clientX + 12;
      var tt = e.clientY + 12;
      if (tl + tw > window.innerWidth - 8) tl = e.clientX - tw - 12;
      if (tt + th > window.innerHeight - 8) tt = e.clientY - th - 12;
      tooltip.style.left = tl + 'px';
      tooltip.style.top = tt + 'px';
      canvas._clickTag = tag.name;
      canvas.style.cursor = 'pointer';
    } else {
      if (currentHoverTag !== -1) {
        currentHoverTag = -1;
        startHoverAnim(canvas, cells, cellSize, gap, offsetX, offsetY, cols, rows, tagData, totalAmount, tooltip, e, -1);
      }
      tooltip.style.display = 'none';
      canvas.style.cursor = 'default';
    }
  };

  canvas.onmouseleave = function() {
    currentHoverTag = -1;
    tooltip.style.display = 'none';
    startHoverAnim(canvas, cells, cellSize, gap, offsetX, offsetY, cols, rows, tagData, totalAmount, tooltip, null, -1);
  };

  canvas.onclick = function(e) {
    var tagName = canvas._clickTag;
    if (tagName && typeof window.setRecordsTagFilter === 'function') {
      window.setRecordsTagFilter(tagName);
      navigateTo('records');
    }
  };
}

function drawWaffleStatic(canvas, cells, cellSize, gap, offsetX, offsetY, cols, rows, tagData, highlightIdx) {
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var w = canvas.width / dpr;
  var h = canvas.height / dpr;
  ctx.clearRect(0, 0, w, h);

  cells.forEach(function(cell, i) {
    var row = i % rows;
    var col = Math.floor(i / rows);
    var x = offsetX + col * (cellSize + gap);
    var y = offsetY + row * (cellSize + gap);
    var isHighlighted = highlightIdx !== undefined && cell.tagIndex === highlightIdx;

    // 缩放因子：高亮格放大，其余变暗
    var scale = isHighlighted ? 1.06 : 1.0;
    var alpha = isHighlighted ? 1.0 : 0.75;
    var s = cellSize * scale;
    var cx = x + cellSize / 2;
    var cy = y + cellSize / 2;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.roundRect(cx - s / 2, cy - s / 2, s, s, 2);
    ctx.fillStyle = cell.color;
    ctx.fill();

    if (isHighlighted) {
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    ctx.restore();
  });
}

let importJSONContent = null;

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    importJSONContent = e.target.result;
    showModal(`
      <div class="modal-title">${__('settings.import.title')}</div>
      <p class="text-sm text-secondary mb-16">${__('settings.import.description')}</p>
      <div class="flex flex-col gap-8">
        <button class="btn btn-primary btn-block" onclick="confirmImportJSON('replace')">🔄 ${__('settings.import.replace')}</button>
        <button class="btn btn-outline btn-block" onclick="confirmImportJSON('merge')">🔀 ${__('settings.import.merge')}</button>
      </div>
      <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">${__('settings.import.cancel')}</button></div>
    `);
  };
  reader.readAsText(file);
  event.target.value = '';
}

function confirmImportJSON(mode) {
  if (!importJSONContent) { showToast(__('settings.toast.noImportData'), 'error'); return; }
  const success = DataStore.importJSON(importJSONContent, mode);
  importJSONContent = null;
  closeModal();
  if (success) {
    showToast(__('settings.toast.importSuccess'));
    renderSettings();
  } else {
    showToast(__('settings.toast.importFailed'), 'error');
  }
}

function repairData() {
  // Check if DataStore._data and localStorage are in sync
  try {
    const raw = localStorage.getItem('budgetAppData');
    if (!raw) {
      showToast(__('settings.toast.noRepairNeeded'), 'success');
      return;
    }
    const lsData = JSON.parse(raw);
    const memRecords = DataStore.getRecords().length;
    const lsRecords = (lsData.records || []).length;
    
    // Check 1: if localStorage has records that memory doesn't (stale in-memory)
    // We reload from localStorage which is the source of truth
    const success = DataStore.reload();
    if (success) {
      // Also clear any pending delete state which might be stale
      const pending = DataStore.getPendingDelete();
      if (pending) {
        DataStore._finalizeDelete(pending.id);
      }
      showToast(__('settings.toast.repairSuccess', lsRecords), 'success');
    }
    
    // Check 2: verify pending delete is not stuck
    const pendingCheck = DataStore.getPendingDelete();
    if (pendingCheck) {
      DataStore._finalizeDelete(pendingCheck.id);
    }
    
    // Re-render all pages
    if (typeof renderOverview === 'function') renderOverview();
    if (typeof renderAddPage === 'function') renderAddPage();
    if (typeof renderRecords === 'function') renderRecords();
    if (typeof renderCategories === 'function') renderCategories();
    if (typeof renderStats === 'function') renderStats();
    if (typeof renderReport === 'function') renderReport();
    if (typeof renderSettings === 'function') renderSettings();
    if (typeof renderWhatIf === 'function') renderWhatIf();
  } catch(e) {
    showToast(__('settings.toast.repairFailed', e.message), 'error');
  }
}

(function() {
'use strict';
let reportMonth = '';

function renderReport() {
  const el = document.getElementById('page-report');
  const now = new Date();
  const isRolling = getStatsRange() === 'rolling30';
  if (!reportMonth) {
    if (isRolling) {
      const { start, end, label } = getPeriodDateRange();
      reportMonth = label; // Use label as pseudo month identifier
    } else {
      reportMonth = getMonthKey(now.toISOString());
    }
  }
  const month = reportMonth;
  const periodRange = isRolling ? getPeriodDateRange() : null;

  const monthTotal = isRolling ? StatsEngine.getPeriodTotal() : StatsEngine.getMonthTotal(month);
  const budget = DataStore.getMonthlyIncome(month) || DataStore.getBudget(month);
  const savingsTarget = DataStore.getSavingsTarget();
  const dailyTotals = isRolling ? StatsEngine.getPeriodDailyTotals({ excludeBills: false }) : StatsEngine.getDailyTotals(month);
  const catTotals = isRolling ? StatsEngine.getPeriodCategoryTotals() : StatsEngine.getCategoryTotals(month);

  // Savings target amount
  const percentBase = DataStore.getPercentBase();
  const totalBills = DataStore.getBillTotal(month);
  const paidBillsRep = isRolling ? StatsEngine.getPeriodBillSpending() : StatsEngine.getBillSpendingActual(month);
  const unpaidPlannedBillsRep = Math.max(0, totalBills - paidBillsRep);
  const netDisposable = Math.max(0, budget - totalBills);
  const baseAmount = percentBase === 'net' ? netDisposable : budget;
  const targetAmount = (() => {
    const t = savingsTarget;
    if (t.type === 'fixed') return t.fixedAmount || 0;
    if (t.type === 'percent') return baseAmount * (t.percent || 0) / 100;
    return 0;
  })();
  const spendableBudget = Math.max(0, netDisposable - targetAmount);
  const variableSpending = isRolling ? StatsEngine.getPeriodVariableSpending() : StatsEngine.getVariableSpending(month);
  const actualSavings = Math.max(0, budget - (monthTotal + unpaidPlannedBillsRep));
  const savingsRate = budget > 0 ? (actualSavings / budget * 100) : 0;
  const predicted = isRolling ? StatsEngine.getPeriodPredictedTotal() : StatsEngine.getPredictedTotal(month);
  const savingsPred = isRolling ? (budget - monthTotal) : (StatsEngine.getSavingsPrediction(month) - unpaidPlannedBillsRep);

  // Aggregate to root categories for table
  const rootTotals = {};
  Object.entries(catTotals).forEach(([id, total]) => {
    const rootId = getRootAncestorId(id);
    if (rootId) rootTotals[rootId] = (rootTotals[rootId] || 0) + total;
  });
  const rootCats = DataStore.getRootCategories();
  const catTableRows = rootCats.map(c => {
    const spent = rootTotals[c.id] || 0;
    const catBudget = DataStore.getCategoryBudget(c.id, month).value || 0;
    const remaining = catBudget > 0 ? catBudget - spent : 0;
    const pct = catBudget > 0 ? (spent / catBudget * 100) : 0;
    const status = catBudget > 0 ? (spent <= catBudget ? __('report.withinBudget') : __('report.overspent')) : __('report.dash');
    return { cat: c, spent, catBudget, remaining, pct, status };
  }).sort((a,b) => b.spent - a.spent);

  // TOP 5
  const top5 = [...catTableRows].filter(r => r.spent > 0).slice(0, 5);

  const parts = month.split('-');
  const year = parts[0], mon = parts[1];

  el.innerHTML = `
    <div class="report-container">
      <!-- Header -->
      <div class="card mb-16 report-header-buttons">
        <div class="flex items-center gap-12" style="flex-wrap:wrap">
          <div class="flex items-center gap-8">
          <label class="text-sm text-secondary">${isRolling ? __('report.selectPeriod') : __('report.selectMonth')}</label>
          <input type="month" id="reportMonthInput" class="input-field" style="width:160px" value="${isRolling ? month : month}" onchange="changeReportMonth(this.value)">
          </div>
          <button class="btn btn-outline" onclick="printReport()">${__('report.printReport')}</button>
        </div>
      </div>

      <!-- Summary row -->
      <div class="grid-4 mb-16">
        <div class="card" style="text-align:center">
          <div class="card-title">${__('report.monthlyIncome')}</div>
          <div class="text-xl font-bold" style="color:var(--primary)">${budget ? formatMoney(budget) : __('report.notSet')}</div>
          ${totalBills > 0 ? `<div class="text-xs text-muted">${__('report.netIncome')} ${formatMoney(Math.max(0, budget - totalBills))}</div>` : ''}
        </div>
        <div class="card" style="text-align:center">
          <div class="card-title">${__('report.totalExpenditure')}</div>
          <div class="text-xl font-bold" style="color:${monthTotal <= spendableBudget ? 'var(--success)' : 'var(--danger)'}">${formatMoney(monthTotal)}</div>
          ${(() => {
            const billActual = StatsEngine.getBillSpendingActual(month);
            if (billActual > 0) {
              const varSpend = monthTotal - billActual;
              return `<div class="text-xs text-muted mt-4">${__('report.daily')} ${formatMoney(varSpend)} · ${__('report.bills')} ${formatMoney(billActual)}</div>`;
            }
            return '';
          })()}
        </div>
        <div class="card" style="text-align:center">
          <div class="card-title">${__('report.savings')}</div>
          <div class="text-xl font-bold" style="color:${actualSavings >= 0 ? 'var(--success)' : 'var(--danger)'}">${formatMoney(actualSavings)}</div>
        </div>
        <div class="card" style="text-align:center">
          <div class="card-title">${__('report.savingsRate')}</div>
          <div class="text-xl font-bold" style="color:${savingsRate >= 20 ? 'var(--success)' : (savingsRate > 0 ? 'var(--warning)' : 'var(--danger)')}">${savingsRate.toFixed(1)}%</div>
        </div>
      </div>

      <!-- Budget & Savings rings -->
      <div class="grid-2 mb-16">
        <div class="card" style="text-align:center">
          <div class="card-title">${__('report.incomeExpenseProgress')}</div>
          <canvas id="reportBudgetRing" width="160" height="160" style="max-width:160px;margin:8px auto"></canvas>
          <div class="text-sm text-secondary">
            ${budget > 0 ? formatMoney(monthTotal) + ' / ' + formatMoney(budget) : __('report.notSetIncome')}
            ${totalBills > 0 ? `<div class="text-xs text-muted mt-4">${__('report.netIncome')} ${formatMoney(netDisposable)} · ${__('report.dailySpendable')} ${formatMoney(spendableBudget)}</div>` : ''}
          </div>
        </div>
        <div class="card" style="text-align:center">
          <div class="card-title">${__('report.savingsProgressTitle')}</div>
          <canvas id="reportSavingsRing" width="160" height="160" style="max-width:160px;margin:8px auto"></canvas>
          <div class="text-sm text-secondary">
            ${targetAmount > 0 ? formatMoney(savingsPred) + ' / ' + formatMoney(targetAmount) : __('report.notSetTarget')}
          </div>
        </div>
      </div>

      <!-- Category breakdown table -->
      <div class="card mb-16">
        <div class="card-title">${__('report.categoryBreakdown')}</div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:0.85rem">
            <thead>
              <tr style="border-bottom:2px solid var(--border);color:var(--text-secondary);font-size:0.78rem">
                <th style="text-align:left;padding:8px 4px">${__('report.category')}</th>
                <th style="text-align:right;padding:8px 4px">${__('report.budget')}</th>
                <th style="text-align:right;padding:8px 4px">${__('report.expense')}</th>
                <th style="text-align:right;padding:8px 4px">${__('report.percentage')}</th>
                <th style="text-align:right;padding:8px 4px">${__('report.remaining')}</th>
                <th style="text-align:center;padding:8px 4px">${__('report.status')}</th>
              </tr>
            </thead>
            <tbody>
              ${catTableRows.map(r => {
                const bgColor = r.spent > 0 ? (r.catBudget > 0 && r.spent > r.catBudget ? '#FFF5F5' : '') : '';
                return `
                <tr style="border-bottom:1px solid var(--border);background:${bgColor}">
                  <td style="padding:8px 4px">${escHtml(r.cat.icon)} ${escHtml(r.cat.name)}</td>
                  <td style="text-align:right;padding:8px 4px">${r.catBudget > 0 ? formatMoney(r.catBudget) : '—'}</td>
                  <td style="text-align:right;padding:8px 4px;font-weight:600">${r.spent > 0 ? formatMoney(r.spent) : '—'}</td>
                  <td style="text-align:right;padding:8px 4px">${monthTotal > 0 ? (r.spent/monthTotal*100).toFixed(1) + '%' : '—'}</td>
                  <td style="text-align:right;padding:8px 4px;color:${r.catBudget > 0 ? (r.remaining >= 0 ? 'var(--success)' : 'var(--danger)') : 'var(--text-muted)'}">${r.catBudget > 0 ? (r.remaining >= 0 ? formatMoney(r.remaining) : '-' + formatMoney(Math.abs(r.remaining))) : '—'}</td>
                  <td style="text-align:center;padding:8px 4px;font-size:0.78rem">${r.status}</td>
                </tr>`;
              }).join('')}
            </tbody>
            <tfoot>
              <tr style="border-top:2px solid var(--border);font-weight:700">
                <td style="padding:8px 4px">${__('report.total')}</td>
                <td style="text-align:right;padding:8px 4px">${budget > 0 ? formatMoney(budget) : '—'}</td>
                <td style="text-align:right;padding:8px 4px;color:var(--primary)">${formatMoney(monthTotal)}</td>
                <td style="text-align:right;padding:8px 4px">100%</td>
                <td style="text-align:right;padding:8px 4px;color:${budget - monthTotal >= 0 ? 'var(--success)' : 'var(--danger)'}">${formatMoney(budget - monthTotal)}</td>
                <td style="text-align:center;padding:8px 4px">${budget > 0 ? (monthTotal <= budget ? '✅' : '⚠️') : '—'}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>

      <!-- Daily trend sparkline -->
      <div class="card mb-16">
        <div class="card-title">${isRolling ? __('report.dailyTrend') + ' (' + periodRange.label + ')' : __('report.dailyTrend') + ' (' + __('report.yearMonth', year, mon) + ')'}</div>
        <canvas id="reportSparkline" width="600" height="160" style="width:100%;height:80px"></canvas>
      </div>

      <!-- TOP 5 spending -->
      <div class="card mb-16">
        <div class="card-title">${__('report.top5')}</div>
        ${top5.length > 0 ? top5.map((r, i) => `
          <div class="flex items-center justify-between" style="padding:6px 0;border-bottom:1px solid var(--border)">
            <div class="flex items-center gap-8">
              <span style="width:20px;height:20px;border-radius:50%;background:${r.cat.color};display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:white;font-weight:700">${i+1}</span>
              <span>${escHtml(r.cat.icon)}</span>
              <span class="font-semibold">${escHtml(r.cat.name)}</span>
            </div>
            <span class="font-bold" style="color:var(--primary)">${formatMoney(r.spent)}</span>
          </div>
        `).join('') : '<div class="text-sm text-muted">' + __('report.noExpenses') + '</div>'}
      </div>

      <!-- Savings prediction summary -->
      <div class="card mb-16" style="border-left:4px solid ${savingsPred >= 0 ? 'var(--success)' : 'var(--danger)'}">
        <div class="card-title">${__('report.savingsSummary')}</div>
        <div class="text-sm" style="line-height:1.8">
          ${budget > 0 ? `
            <p>${__('report.predictionIncome', year, mon, formatMoney(budget))}${totalBills > 0 ? ' ' + __('report.predictionBillsDetail', formatMoney(totalBills), formatMoney(netDisposable)) : ''}</p>
            ${targetAmount > 0 ? `<p>${__('report.predictionSavingsTarget', formatMoney(targetAmount), formatMoney(spendableBudget))}</p>` : ''}
            <p>${__('report.predictionSpentSoFar', formatMoney(monthTotal), dailyTotals.length > 0 ? formatMoney(monthTotal / Math.max(1, dailyTotals.filter(d => d.total > 0).length)) : 0)}</p>
            <p>${savingsPred >= 0
              ? __('report.predictionPositive', formatMoney(savingsPred))
              : __('report.predictionNegative', formatMoney(Math.abs(savingsPred)))}
            </p>
          ` : '<p>' + __('report.predictionSetupHint') + '</p>'}
        </div>
      </div>
    </div>
  `;

  // Draw rings and sparkline
  setTimeout(() => {
    const budgetPct = spendableBudget > 0 ? (monthTotal / spendableBudget) : (budget > 0 ? monthTotal / budget : 0);
    drawRing('reportBudgetRing', Math.min(budgetPct, 1), budgetPct > 1 ? '#EF4444' : '#6366F1',
      (budgetPct * 100).toFixed(0) + '%', '#EF4444');
    const savingsPct = targetAmount > 0 ? Math.min(savingsPred / targetAmount, 1) : 0;
    drawRing('reportSavingsRing', savingsPct, savingsPct >= 1 ? '#10B981' : (savingsPct > 0 ? '#F59E0B' : '#94A3B8'),
      (savingsPct * 100).toFixed(0) + '%');
    drawSparkline('reportSparkline', dailyTotals.map(d => ({ total: d.total, day: d.day })));
  }, 50);
}

function changeReportMonth(month) {
  reportMonth = month;
  renderReport();
}

function printReport() {
  // Navigate to report page first, then print
  navigateTo('report');
  setTimeout(() => { window.print(); }, 100);
}

  // === EXPORTS ===
  window.reportMonth = reportMonth;
  window.renderReport = renderReport;
  window.changeReportMonth = changeReportMonth;
  window.printReport = printReport;

  // === I18N ENTRIES ===

function renderWhatIfParams(month, savedParams, periodOpts) {
  const isRolling = periodOpts && periodOpts.isRolling;
  const allCats = DataStore.getCategories();
  const today = new Date().getDate();
  const daysInMonth = isRolling
    ? periodOpts.daysInPeriod
    : new Date(parseInt(month.split('-')[0]), parseInt(month.split('-')[1]), 0).getDate();
  const daysPassed = isRolling ? periodOpts.daysPassed : today;

  // Get actual spending per category for the period
  const records = isRolling
    ? DataStore.getRecords().filter(r => {
        const d = new Date(r.date || r.createdAt);
        return d >= periodOpts.start && d <= periodOpts.end && !StatsEngine.isBillCategory(r.categoryId);
      })
    : DataStore.getRecords()
        .filter(r => getMonthKey(r.date || r.createdAt) === month && !StatsEngine.isBillCategory(r.categoryId));
  const catActual = {};
  records.forEach(r => {
    catActual[r.categoryId] = (catActual[r.categoryId] || 0) + r.amount;
  });

  // Compute daily avg per category
  const catDailyAvg = {};
  Object.entries(catActual).forEach(([catId, total]) => {
    catDailyAvg[catId] = daysPassed > 0 ? total / daysPassed : 0;
  });

  const adj = savedParams ? savedParams.categoryAdjustments || {} : {};
  const globalAdj = savedParams ? savedParams.globalAdjustment || { mode: null, value: null } : { mode: null, value: null };
  const hypos = savedParams ? savedParams.hypotheticalCategories || [] : [];

  let html = '';

  // === 分类支出调整 ===
  html += `<div class="card mb-16">
    <div class="card-title">🏷️ ${__('whatif.categoryAdjustments')}</div>
    <p class="text-xs text-muted" style="margin-bottom:8px">${__('whatif.categoryDesc')}</p>`;

  // Build category tree
  const treeMap = {};
  allCats.forEach(c => treeMap[c.id] = { ...c, children: [] });
  const treeRoots = [];
  allCats.forEach(c => {
    if (!c.parentId) treeRoots.push(treeMap[c.id]);
    else if (treeMap[c.parentId]) treeMap[c.parentId].children.push(treeMap[c.id]);
  });

  // Recursive render: flat structure (no nested bodies to avoid cumulative padding)
  function renderCatNode(node, depth) {
    const expandKey = 'wi-expand-' + node.id;
    const isExpanded = whatIfExpandStates[expandKey] === true;
    const nodeAdj = adj[node.id] || { mode: 'trend', value: null };
    const hasChildren = node.children.length > 0;

    // Compute daily avg: use direct spending or sum of children
    let nodeDailyAvg = catDailyAvg[node.id] || 0;
    if (!nodeDailyAvg && hasChildren) {
      nodeDailyAvg = node.children.reduce((s, c) => s + (catDailyAvg[c.id] || 0), 0);
    }

    // Compute total spent: direct spending or sum of children
    let nodeSpent = catActual[node.id] || 0;
    if (!nodeSpent && hasChildren) {
      nodeSpent = node.children.reduce((s, c) => s + (catActual[c.id] || 0), 0);
    }

    // Check if any ancestor has mode 'zero' → disable this node
    let isDisabled = false;
    let ancestor = node.parentId ? treeMap[node.parentId] : null;
    while (ancestor) {
      const ancAdj = adj[ancestor.id];
      if (ancAdj && ancAdj.mode === 'zero') { isDisabled = true; break; }
      ancestor = ancestor.parentId ? treeMap[ancestor.parentId] : null;
    }

    // Flat indentation: header indents left, control row indents 16px more
    const headerIndent = depth * 24;
    const bodyIndent = headerIndent + 24;

    let out = '';

    // Header row — only for nodes that have children (expand/collapse purpose)
    if (hasChildren) {
      out += `<div class="whatif-cat-root-header" onclick="toggleWhatIfExpand('${node.id}')" style="cursor:pointer;padding-left:${headerIndent + 12}px">
        <span class="whatif-expand-icon">${isExpanded ? '▼' : '▶'}</span>
        <span>${node.icon} ${node.name}</span>
        <span class="text-xs text-muted" style="margin-left:8px">${__('whatif.dailyAvg', formatMoney(nodeDailyAvg))}</span>
        <span class="text-xs text-muted" style="margin-left:auto">${__('whatif.spent', formatMoney(nodeSpent))}</span>
      </div>`;
    }

    // Controls row — always shown for leaves; for parents only when expanded
    if (!hasChildren || isExpanded) {
      out += `<div class="whatif-cat-row" style="padding-left:${bodyIndent + 12}px">
        <span class="whatif-cat-label">${node.icon} ${node.name}${hasChildren ? __('whatif.mode.overall') : ''}</span>
        <select class="input-field whatif-mode-select" data-cat="${node.id}" data-level="${depth === 0 ? 'root' : 'child'}" ${isDisabled ? 'disabled' : ''}>
          <option value="trend" ${nodeAdj.mode === 'trend' ? 'selected' : ''}>${__('whatif.mode.trend')}</option>
          <option value="daily" ${nodeAdj.mode === 'daily' ? 'selected' : ''}>${__('whatif.mode.daily')}</option>
          <option value="total" ${nodeAdj.mode === 'total' ? 'selected' : ''}>${__('whatif.mode.total')}</option>
          <option value="percent" ${nodeAdj.mode === 'percent' ? 'selected' : ''}>${__('whatif.mode.percent')}</option>
          <option value="adjust" ${nodeAdj.mode === 'adjust' ? 'selected' : ''}>${__('whatif.mode.adjust')}</option>
          <option value="zero" ${nodeAdj.mode === 'zero' ? 'selected' : ''}>${__('whatif.mode.zero')}</option>
        </select>
        <input type="number" class="input-field whatif-value-input" data-cat="${node.id}" value="${nodeAdj.value || ''}" min="0" step="0.01" placeholder="${__('whatif.valuePlaceholder')}" ${isDisabled || nodeAdj.mode === 'trend' || nodeAdj.mode === 'zero' ? 'style="display:none"' : ''}>
        <span class="text-xs text-muted" style="min-width:60px;text-align:right">${__('whatif.dailyAvg', formatMoney(nodeDailyAvg))}</span>
      </div>`;
    }

    // Children — rendered flat (not nested inside body div)
    if (isExpanded && hasChildren) {
      out += node.children.map(ch => renderCatNode(ch, depth + 1)).join('');
    }

    return out;
  }

  treeRoots.forEach(root => {
    html += `<div class="whatif-cat-root">`;
    html += renderCatNode(root, 0);
    html += `</div>`;
  });

  html += `</div>`; // end card

  // === 全局调整 ===
  html += `<div class="card mb-16">
    <div class="card-title">🌐 ${__('whatif.globalAdjustment')}</div>
    <p class="text-xs text-muted" style="margin-bottom:8px">${__('whatif.globalDesc')}</p>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <select class="input-field" id="wi-global-mode" style="width:auto;min-width:120px">
        <option value="" ${!globalAdj.mode ? 'selected' : ''}>${__('whatif.globalModeNone')}</option>
        <option value="percent" ${globalAdj.mode === 'percent' ? 'selected' : ''}>${__('whatif.globalModePercent')}</option>
        <option value="amount" ${globalAdj.mode === 'amount' ? 'selected' : ''}>${__('whatif.globalModeAmount')}</option>
      </select>
      <input type="number" class="input-field" id="wi-global-value" value="${globalAdj.value || ''}" min="0" step="0.01" placeholder="${__('whatif.valuePlaceholder')}" style="width:100px">
      <span class="text-xs text-muted">${__('whatif.globalHint')}</span>
    </div>
  </div>`;

  // === 添加假设分类 ===
  html += `<div class="card mb-16">
    <div class="card-title">➕ ${__('whatif.addHypothetical')}</div>
    <p class="text-xs text-muted" style="margin-bottom:8px">${__('whatif.hypotheticalDesc')}</p>
    <div id="wi-hypo-list">
      ${hypos.map((h, i) => `
        <div class="whatif-hypo-row" data-index="${i}">
          <input type="text" class="input-field wi-hypo-icon" value="${h.icon || ''}" placeholder="${__('whatif.hypoIcon')}" style="width:50px">
          <input type="text" class="input-field wi-hypo-name" value="${h.name || ''}" placeholder="${__('whatif.hypoName')}" style="flex:1">
          <input type="number" class="input-field wi-hypo-amount" value="${h.amount || ''}" min="0" step="0.01" placeholder="${__('whatif.hypoAmount')}" style="width:100px">
          <select class="input-field wi-hypo-type" style="width:auto">
            <option value="daily" ${h.type === 'daily' ? 'selected' : ''}>${__('whatif.perDay')}</option>
            <option value="total" ${h.type === 'total' ? 'selected' : ''}>${__('whatif.perMonth')}</option>
          </select>
          <button class="btn btn-ghost btn-sm" onclick="removeWhatIfHypo(${i})" style="color:var(--danger)">✕</button>
        </div>
      `).join('')}
    </div>
    <button class="btn btn-sm btn-outline mt-8" onclick="addWhatIfHypo()">＋ ${__('whatif.addHypoBtn')}</button>
  </div>`;

  // === Action buttons ===
  html += `<div style="display:flex;gap:12px;margin-bottom:24px">
    <button class="btn btn-primary btn-lg" onclick="runWhatIfSimulation()" style="flex:1">🔮 ${__('whatif.generate')}</button>
    ${savedParams ? '<button class="btn btn-ghost btn-lg" onclick="clearWhatIfSimulation()" style="color:var(--danger)">🗑️ ' + __('whatif.clearScenario') + '</button>' : ''}
  </div>`;

  return html;
}

  </div>`;

  // === 支出对比 (ring charts with clearer labels) ===
  html += `<div class="card mb-16">
    <div class="card-title">📊 ${__('whatif.spendingComparison')}</div>
    <p class="text-xs text-muted" style="margin-bottom:12px">${__('whatif.spendingDesc')}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div style="text-align:center">
        <div class="text-xs text-muted mb-8">${__('whatif.trendTotal')}</div>
        <canvas class="whatif-ring" id="wi-ring-trend-wi" width="140" height="140" style="max-width:140px;max-height:140px;width:100%;height:auto"></canvas>
        <div class="text-sm font-bold">${formatMoney(trendTotal)}</div>
        <div class="text-xs text-muted">${__('whatif.percentOfIncome', income > 0 ? ((trendTotal / income) * 100).toFixed(1) : 0)}</div>
      </div>
      <div style="text-align:center">
        <div class="text-xs text-muted mb-8">${__('whatif.adjustedTotal')}</div>
        <canvas class="whatif-ring" id="wi-ring-proj-wi" width="140" height="140" style="max-width:140px;max-height:140px;width:100%;height:auto"></canvas>
        <div class="text-sm font-bold">${formatMoney(adjustedTotal)}</div>
        <div class="text-xs text-muted">${__('whatif.percentOfIncome', income > 0 ? ((adjustedTotal / income) * 100).toFixed(1) : 0)}</div>
      </div>
    </div>
  </div>`;

  // === 分类对比表 ===
  html += `<div class="card mb-16">
    <div class="card-title">📋 ${__('whatif.categoryDetails')}</div>
    <div class="whatif-compare-table">
      <div class="whatif-compare-header">
        <span>${__('whatif.category')}</span>
        <span>${__('whatif.spentThisMonth')}</span>
        <span>${__('whatif.projectedRemaining')}</span>
        <span>${__('whatif.projectedEnd')}</span>
        <span>${__('whatif.vsTrend')}</span>
      </div>`;

  // Build full category projection tree (all nesting levels)
  const allCats = DataStore.getCategories();
  const projMap = categoryProjections || {};
  // Create tree nodes
  const treeNodes = {};
  allCats.forEach(c => {
    treeNodes[c.id] = {
      category: c,
      currentTotal: 0,
      projectedRemaining: 0,
      projectedTotal: 0,
      trendTotal: 0,
      mode: 'trend',
      children: []
    };
  });
  // Fill leaf data from simulation
  Object.values(projMap).forEach(p => {
    const node = treeNodes[p.category.id];
    if (node) {
      node.currentTotal = p.currentTotal || 0;
      node.projectedRemaining = p.projectedRemaining || 0;
      node.projectedTotal = p.projectedTotal || 0;
      node.mode = p.mode || 'trend';
      node.trendTotal = daysPassed > 0 ? (p.currentDailyAvg || 0) * daysInMonth : 0;
    }
  });
  // Build parent-child links
  const rootNodes = [];
  allCats.forEach(c => {
    if (!c.parentId) {
      rootNodes.push(treeNodes[c.id]);
    } else if (treeNodes[c.parentId]) {
      treeNodes[c.parentId].children.push(treeNodes[c.id]);
    }
  });
  // Aggregate non-leaf nodes upward
  function aggregateUp(node) {
    if (node.children.length > 0) {
      node.children.forEach(aggregateUp);
      node.currentTotal = node.children.reduce((s, ch) => s + ch.currentTotal, 0);
      node.projectedRemaining = node.children.reduce((s, ch) => s + ch.projectedRemaining, 0);
      node.projectedTotal = node.currentTotal + node.projectedRemaining;
      node.trendTotal = node.children.reduce((s, ch) => s + ch.trendTotal, 0);
    }
  }
  rootNodes.forEach(aggregateUp);

  // Recursive render of the tree (collapsible, default collapsed)
  function renderTreeNodes(nodes, depth) {
    let out = '';
    nodes.forEach(node => {
      const diff = node.projectedTotal - node.trendTotal;
      const isAdjusted = node.mode !== 'trend' && node.mode !== undefined;
      const hasChildren = node.children.length > 0;
      const cmpKey = 'wi-cmp-' + node.category.id;
      const isExpanded = whatIfCompareExpandStates[cmpKey] === true;

      const label = isAdjusted
        ? `${node.category.icon} ${node.category.name} <span class="text-xs text-muted">(${__('whatif.adjusted')})</span>`
        : `${node.category.icon} ${node.category.name}`;
      out += `<div class="whatif-compare-row ${depth > 0 ? 'whatif-child-row' : ''}">
        <span style="${depth > 0 ? `padding-left:${depth * 20 + 4}px` : ''};font-weight:${depth === 0 ? '700' : '400'}">
          ${hasChildren ? `<span class="whatif-expand-icon" onclick="toggleWhatIfCompareExpand('${node.category.id}')" style="cursor:pointer;margin-right:4px">${isExpanded ? '▼' : '▶'}</span>` : '<span class="whatif-expand-icon" style="visibility:hidden;margin-right:4px">▶</span>'}
          ${label}
        </span>
        <span>${formatMoney(node.currentTotal)}</span>
        <span>${formatMoney(node.projectedRemaining)}</span>
        <span>${formatMoney(node.projectedTotal)}</span>
        <span style="color:${Math.abs(diff) < 0.01 ? 'var(--text-muted)' : (diff > 0 ? 'var(--danger)' : 'var(--success)')}">
          ${Math.abs(diff) < 0.01 ? '—' : (diff > 0 ? '+' : '') + formatMoney(diff)}
        </span>
      </div>`;
      if (hasChildren && isExpanded) {
        out += renderTreeNodes(node.children, depth + 1);
      }
    });
    return out;
  }
  html += renderTreeNodes(rootNodes, 0);

  // Hypothetical categories row
  hypotheticalProjections.forEach(hp => {
    html += `<div class="whatif-compare-row" style="color:var(--primary);font-style:italic">
      <span>${hp.icon} ${hp.name} <span class="text-xs text-muted">(${__('whatif.hypothetical')})</span></span>
      <span>—</span>
      <span>${formatMoney(hp.projectedRemaining)}</span>
      <span>${formatMoney(hp.projectedRemaining)}</span>
      <span style="color:var(--danger)">+${formatMoney(hp.projectedRemaining)}</span>
    </div>`;
  });

  // Total row
  const trendForGrand = daysPassed > 0 ? (actualSpent / daysPassed) * daysInMonth : 0;
  const grandDiff = totalProjected - trendForGrand;
  html += `<div class="whatif-compare-row whatif-compare-total">
    <span class="font-bold">${__('whatif.total')}</span>
    <span>${formatMoney(actualSpent)}</span>
    <span>${formatMoney(projectedRemaining)}</span>
    <span class="font-bold">${formatMoney(totalProjected)}</span>
    <span style="color:${Math.abs(grandDiff) < 0.01 ? 'var(--text-muted)' : (grandDiff > 0 ? 'var(--danger)' : 'var(--success)')}">
      ${Math.abs(grandDiff) < 0.01 ? '—' : (grandDiff > 0 ? '+' : '') + formatMoney(grandDiff)}
    </span>
  </div>`;

  html += `</div></div>`;

  // === 明细按钮 ===
  html += `<div style="display:flex;gap:12px;margin-top:8px">
    <button class="btn btn-ghost btn-lg" onclick="runWhatIfSimulation()" style="flex:1">🔄 ${__('whatif.regenerate')}</button>
    <button class="btn btn-ghost btn-lg" onclick="clearWhatIfSimulation()" style="color:var(--danger)">🗑️ ${__('whatif.clearScenario')}</button>
  </div>`;

  // Draw rings after render
  setTimeout(() => drawWhatIfRings(result), 50);

  return html;
}

// Draw the comparison rings
function drawWhatIfRings(result) {
  const { income, trendTotal, totalProjected, daysPassed, daysInMonth } = result;
  const month = getMonthKey(new Date().toISOString());
  const varSpentTotal = StatsEngine.getVariableSpending(month);
  const varTrendTotal = daysPassed > 0 ? varSpentTotal / daysPassed * daysInMonth : 0;
  const varAdjustment = (totalProjected || 0) - varTrendTotal;
  const adjustedTotal = trendTotal + varAdjustment;

  // Trend budget ring
  const trendCanvas = document.getElementById('wi-ring-trend-wi');
  if (trendCanvas && income > 0) {
    const pct = Math.min(trendTotal / income, 1);
    drawSimpleRing(trendCanvas, pct, '#6366F1', '#e5e7eb');
  }

  // Projected budget ring
  const projCanvas = document.getElementById('wi-ring-proj-wi');
  if (projCanvas && income > 0) {
    const pct = Math.min(adjustedTotal / income, 1);
    drawSimpleRing(projCanvas, pct, '#10B981', '#e5e7eb');
  }

  // Trend savings — no longer drawn as ring, handled by horizontal bar in renderWhatIfResults
}

// Helper to draw a simple ring (named differently to avoid collision with existing drawRing)
function drawSimpleRing(canvas, percent, fillColor, bgColor) {
  const ctx = canvas.getContext('2d');
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const cssW = rect.width || canvas.width;
  const cssH = rect.height || canvas.height;
  const bw = Math.round(cssW * dpr);
  const bh = Math.round(cssH * dpr);
  if (canvas.width !== bw || canvas.height !== bh) {
    canvas.width = bw;
    canvas.height = bh;
  }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const cx = cssW / 2, cy = cssH / 2;
  const r = Math.min(cx, cy) - 8;
  const lineWidth = 12;

  // Read theme-aware colors from CSS
  const styles = getComputedStyle(document.documentElement);
  const themeBorder = styles.getPropertyValue('--border').trim() || '#e5e7eb';
  const themePrimary = styles.getPropertyValue('--primary').trim() || '#6366F1';
  const themeSuccess = styles.getPropertyValue('--success').trim() || '#10B981';
  const themeText = styles.getPropertyValue('--text-primary').trim() || '#1E293B';

  ctx.clearRect(0, 0, cssW, cssH);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = bgColor || themeBorder;
  ctx.lineWidth = lineWidth;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * Math.min(percent, 1));
  ctx.strokeStyle = fillColor || (percent > 0.5 ? themePrimary : themeSuccess);
  ctx.lineWidth = lineWidth;
  ctx.lineCap = 'round';
  ctx.stroke();

  ctx.fillStyle = themeText;
  ctx.font = 'bold 14px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText((percent * 100).toFixed(0) + '%', cx, cy);
}

function toggleWhatIfExpand(rootId) {
  const key = 'wi-expand-' + rootId;
  whatIfExpandStates[key] = !whatIfExpandStates[key];
  renderWhatIf();
}

function toggleWhatIfCompareExpand(catId) {
  const key = 'wi-cmp-' + catId;
  whatIfCompareExpandStates[key] = !whatIfCompareExpandStates[key];
  // Re-render only the results section (params stay intact)
  const month = getMonthKey(new Date().toISOString());
  const isRolling = getStatsRange() === 'rolling30';
  const periodOpts = isRolling ? getPeriodDateRange() : null;
  const savedParams = DataStore.getWhatIfParams();
  const result = savedParams ? SimulationEngine.run(month, savedParams, { period: periodOpts }) : null;
  const rightEl = document.querySelector('#page-whatif .whatif-right');
  if (result && rightEl) {
    rightEl.innerHTML = renderWhatIfResults(result);
  }
}

function whatifModeChange(selectEl) {
  const valInput = selectEl.parentElement.querySelector('.whatif-value-input');
  if (valInput) {
    valInput.style.display = (selectEl.value === 'trend' || selectEl.value === 'zero') ? 'none' : '';
  }

  // Cascade "zero" — disable all subsequent descendant selects in the same root
  if (selectEl.value === 'zero') {
    const root = selectEl.closest('.whatif-cat-root');
    if (root) {
      let foundSelf = false;
      root.querySelectorAll('.whatif-mode-select').forEach(s => {
        if (s === selectEl) { foundSelf = true; return; }
        if (foundSelf) {
          s.value = 'zero';
          s.disabled = true;
          const vi = s.parentElement.querySelector('.whatif-value-input');
          if (vi) vi.style.display = 'none';
        }
      });
    }
  }

  // Auto-save (re-render will set correct disabled states based on adj)
  runWhatIfSimulation();
}

  const list = document.getElementById('wi-hypo-list');
  const idx = list ? list.children.length : 0;
