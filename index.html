function useCustomRange() {
  return statsStartDate && statsEndDate && !statsMonth;
}

function getStatsCatTotals() {
  if (useCustomRange()) {
    const range = StatsEngine.getCustomRangeTotals(statsStartDate, statsEndDate);
    return range.categoryTotals || {};
  }
  return StatsEngine.getCategoryTotals(statsMonth);
}

function getStatsDailyTotals() {
  if (useCustomRange()) {
    const range = StatsEngine.getCustomRangeTotals(statsStartDate, statsEndDate);
    return range.daily.map(d => ({ day: d.day.slice(8,10), total: d.total }));
  }
  return StatsEngine.getDailyTotals(statsMonth);
}

function getChartData(month, startDate, endDate, options = {}) {
  const excludeBills = options.excludeBills || false;
  let catTotals;
  if (startDate && endDate) {
    const range = StatsEngine.getCustomRangeTotals(startDate, endDate);
    catTotals = range.categoryTotals || {};
  } else {
    catTotals = month ? StatsEngine.getCategoryTotals(month) : getStatsCatTotals();
  }

  // Filter out bill categories if excludeBills
  if (excludeBills) {
    const billCatIds = new Set((DataStore.getBillCategories() || []).map(c => c.id));
    Object.keys(catTotals).forEach(id => {
      if (billCatIds.has(id)) delete catTotals[id];
    });
  }

  // Aggregate to root categories
  const rootTotals = {};
  Object.entries(catTotals).forEach(([id, total]) => {
    const rootId = getRootAncestorId(id);
    if (rootId) {
      rootTotals[rootId] = (rootTotals[rootId] || 0) + total;
    }
  });
  return Object.entries(rootTotals)
    .map(([id, total]) => ({ id, total, cat: DataStore.getCategory(id) }))
    .filter(x => x.cat && x.total > 0)
    .sort((a,b) => b.total - a.total);
}

function getChartDataForRange(startDate, endDate) {
  return getChartData(null, startDate, endDate);
}

function getRawChartData(month, startDate, endDate, options = {}) {
  const excludeBills = options.excludeBills || false;
  let catTotals;
  if (startDate && endDate) {
    const range = StatsEngine.getCustomRangeTotals(startDate, endDate);
    catTotals = range.categoryTotals || {};
  } else {
    catTotals = month ? StatsEngine.getCategoryTotals(month) : getStatsCatTotals();
  }
  if (excludeBills) {
    const billCatIds = new Set((DataStore.getBillCategories() || []).map(c => c.id));
    Object.keys(catTotals).forEach(id => {
      if (billCatIds.has(id)) delete catTotals[id];
    });
  }
  return Object.entries(catTotals)
    .map(([id, total]) => ({ id, total, cat: DataStore.getCategory(id) }))
    .filter(x => x.cat)
    .sort((a,b) => b.total - a.total);
}
function drawPieChart(canvasId, month, startDate, endDate, onDrill, height, noAnim) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  console.log('[drawPieChart] canvasId:', canvasId, 'month:', month, 'noAnim:', noAnim);
  const tc = getThemeColors();

  // Remove old event listeners before redrawing (clean slate)
  const oldHandlers = canvas._pieHandlers;
  if (oldHandlers) {
    canvas.removeEventListener('mousemove', oldHandlers.mousemove);
    canvas.removeEventListener('mouseleave', oldHandlers.mouseleave);
    canvas.removeEventListener('click', oldHandlers.click);
    delete canvas._pieHandlers;
  }

  // --- Sizing: use CSS for display, only set internal resolution ---
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = rect.width || 400;
  const h = height || 250;
  // Only update internal resolution if size actually changed
  if (canvas.width !== Math.round(w * dpr) || canvas.height !== Math.round(h * dpr)) {
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
  }
  // Do NOT set canvas.style.width/height — CSS width:100% handles display sizing

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  let data;
  const drillCategory = getDrillCategory();
  if (drillCategory) {
    const breakdown = StatsEngine.getCategoryBreakdownDeep(month, drillCategory);
    if (breakdown) {
      const childrenData = (breakdown.children || []).map(c => ({ id: c.category.id, total: c.total, cat: c.category }));
      const childrenTotal = childrenData.reduce((s, d) => s + d.total, 0);
      const directTotal = breakdown.total - childrenTotal;
      data = [...childrenData];
      if (directTotal > 0.001) {
        data.push({
          id: breakdown.category.id + '-direct',
          total: directTotal,
          cat: { name: breakdown.category.name + ' (直接)', icon: '📌', color: breakdown.category.color }
        });
      }
      if (data.length === 0) {
        data = [{ id: breakdown.category.id, total: breakdown.total, cat: breakdown.category }];
      }
      data = data.filter(d => d.total > 0);
      data.forEach((d, i) => { d.displayColor = COLORS[i % COLORS.length]; });
    } else {
      data = [];
    }
  } else {
    // For expanded charts, use the same toggle as the original chart
    const toggleId = canvasId === 'expandPieChart' ? 'pieChart' : canvasId;
    const excludeBills = !isBillToggleChecked(toggleId);
    data = getChartData(month, startDate, endDate, { excludeBills });
    data.forEach((d, i) => { d.displayColor = COLORS[i % COLORS.length]; });
  }

  if (!data.length) {
    ctx.fillStyle = tc.textMuted;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂无数据', w/2, h/2);
    return;
  }

  // --- Geometry ---
  const cx = w * 0.35, cy = h / 2, r = Math.min(w * 0.25, h * 0.38);
  const total = data.reduce((s, d) => s + d.total, 0);

  // Pre-calculate slices
  const slices = [];
  let angleStart = -Math.PI / 2;
  data.forEach(d => {
    const sliceAngle = (d.total / total) * Math.PI * 2;
    slices.push({ ...d, angleStart, sliceAngle });
    angleStart += sliceAngle;
  });

  // --- Hover state (persistent across redraws) ---
  if (canvas._hoverIndex === undefined) canvas._hoverIndex = -1;

  // --- Draw function (no animation, for hover/click redraws) ---
  function drawPieStatic(hoverIdx) {
    if (!ctx || !canvas) return;
    ctx.clearRect(0, 0, w, h);

    // Draw slices with optional hover offset
    slices.forEach((slice, i) => {
      const midAngle = slice.angleStart + slice.sliceAngle / 2;
      const isHover = (i === hoverIdx);
      const offset = isHover ? 8 : 0;
      const offsetX = Math.cos(midAngle) * offset;
      const offsetY = Math.sin(midAngle) * offset;

      ctx.beginPath();
      ctx.moveTo(cx + offsetX, cy + offsetY);
      ctx.arc(cx + offsetX, cy + offsetY, r, slice.angleStart, slice.angleStart + slice.sliceAngle);
      ctx.closePath();
      const color = slice.displayColor || slice.cat.color;
      ctx.fillStyle = isHover ? darkenColor(color, 18) : color;
      ctx.fill();

      if (isHover) {
        // Pop-out shadow
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.2)';
        ctx.shadowBlur = 12;
        ctx.shadowOffsetX = 3;
        ctx.shadowOffsetY = 3;
        ctx.fillStyle = darkenColor(color, 18);
        ctx.beginPath();
        ctx.moveTo(cx + offsetX, cy + offsetY);
        ctx.arc(cx + offsetX, cy + offsetY, r, slice.angleStart, slice.angleStart + slice.sliceAngle);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        // White highlight border
        ctx.strokeStyle = (document.documentElement.getAttribute('data-theme') === 'dark') ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(cx + offsetX, cy + offsetY);
        ctx.arc(cx + offsetX, cy + offsetY, r, slice.angleStart, slice.angleStart + slice.sliceAngle);
        ctx.closePath();
        ctx.stroke();
      }
    });

    // --- Labels (pie slice labels in chart area, with background for readability) ---
    const labelMargin = 4;
    // First pass: compute all label positions for overlap detection
    const labelPositions = slices.map(slice => {
      const midAngle = slice.angleStart + slice.sliceAngle / 2;
      const labelR = r * 1.55;
      let lx = cx + Math.cos(midAngle) * labelR;
      let ly = cy + Math.sin(midAngle) * labelR;
      ctx.font = '11px sans-serif';
      const labelText = slice.cat.name + ' ' + (slice.total / total * 100).toFixed(1) + '%';
      const textWidth = ctx.measureText(labelText).width;
      const textHeight = 14;
      const align = midAngle > Math.PI / 2 && midAngle < Math.PI * 1.5 ? 'right' : 'left';
      if (align === 'right') {
        lx = Math.max(textWidth + labelMargin, Math.min(w - labelMargin, lx));
      } else {
        lx = Math.max(labelMargin, Math.min(w - textWidth - labelMargin, lx));
      }
      ly = Math.max(textHeight, Math.min(h - labelMargin, ly));
      return { slice, lx, ly, labelText, textWidth, textHeight, align, midAngle };
    });
    // Second pass: resolve vertical overlap between adjacent labels (same side only)
    for (let pass = 0; pass < 3; pass++) {
      for (let i = 0; i < labelPositions.length; i++) {
        for (let j = i + 1; j < labelPositions.length; j++) {
          const a = labelPositions[i], b = labelPositions[j];
          if (a.align !== b.align) continue; // different sides won't collide
          const minGap = 2;
          const overlap = Math.max(0, minGap - (b.ly - a.ly));
          if (overlap > 0) {
            const shift = overlap / 2;
            a.ly -= shift;
            b.ly += shift;
            // Clamp again
            a.ly = Math.max(a.textHeight, Math.min(h - labelMargin, a.ly));
            b.ly = Math.max(b.textHeight, Math.min(h - labelMargin, b.ly));
          }
        }
      }
    }
    // Third pass: draw labels
    labelPositions.forEach(({ slice, lx, ly, labelText, textWidth, textHeight, align }) => {
      ctx.textAlign = align;
      const textX = align === 'right' ? lx - textWidth : lx;
      // Semi-transparent background for readability (dark mode → dark bg)
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      ctx.fillStyle = isDark ? 'rgba(15,23,42,0.82)' : 'rgba(255,255,255,0.75)';
      ctx.fillRect(textX - 2, ly - textHeight + 2, textWidth + 4, textHeight + 2);
      // Draw text
      const hasChildren = DataStore.getChildren(slice.id).length > 0;
      if (hasChildren) {
        ctx.fillStyle = tc.text;
        ctx.fillText(labelText, lx, ly);
        ctx.strokeStyle = tc.textSecondary;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(textX, ly + 2);
        ctx.lineTo(textX + textWidth, ly + 2);
        ctx.stroke();
      } else {
        ctx.fillStyle = tc.text;
        ctx.fillText(labelText, lx, ly);
      }
    });

    // --- Legend (right side, also clickable) ---
    const legendRects = [];
    let legendY = h * 0.08;
    const budgetMonth = (typeof month === 'string' && month) || null;
    slices.forEach((slice, i) => {
      const color = slice.displayColor || slice.cat.color;
      const colorBoxX = w * 0.7;
      const textX = w * 0.7 + 16;
      ctx.fillStyle = color;
      ctx.fillRect(colorBoxX, legendY, 10, 10);
      ctx.fillStyle = tc.text;
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'left';
      const label = slice.cat.name + ' ' + formatMoney(slice.total);
      const textWidth = ctx.measureText(label).width;
      ctx.fillText(label, textX, legendY + 10);
      // Store legend item bounding box (for click/hover)
      const itemH = 18;
      legendRects.push({
        sliceIndex: i,
        x: colorBoxX,
        y: legendY,
        w: textX + textWidth - colorBoxX,
        h: itemH
      });
      legendY += 20;
    });
    // Store legend rects on canvas for interaction handlers
    canvas._legendRects = legendRects;
  }

  // --- Helper: find which slice (or legend item) is under the mouse ---
  function hitTestSlice(mx, my) {
    // Check pie slices first (angle-based)
    const dx = mx - cx, dy = my - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist <= r) {
      let angle = Math.atan2(dy, dx);
      if (angle < -Math.PI / 2) angle += Math.PI * 2;
      let a = -Math.PI / 2;
      for (let i = 0; i < slices.length; i++) {
        if (angle >= a && angle < a + slices[i].sliceAngle) {
          return { type: 'slice', index: i };
        }
        a += slices[i].sliceAngle;
      }
    }
    // Check legend items
    const rects = canvas._legendRects || [];
    for (const rItem of rects) {
      if (mx >= rItem.x && mx <= rItem.x + rItem.w &&
          my >= rItem.y && my <= rItem.y + rItem.h) {
        return { type: 'legend', index: rItem.sliceIndex };
      }
    }
    return null;
  }

  // --- Hover & click interactions ---
  function setupInteractions() {
    console.log('[setupInteractions] binding events to canvas:', canvasId || canvas?.id);
    // Remove old listeners to prevent duplicates if setupInteractions is called again
    const handlers = canvas._pieHandlers;
    if (handlers) {
      canvas.removeEventListener('mousemove', handlers.mousemove);
      canvas.removeEventListener('mouseleave', handlers.mouseleave);
      canvas.removeEventListener('click', handlers.click);
    }

    let _throttleTimer = null;
    const onMouseMove = (e) => {
      if (!canvas || !canvas.getBoundingClientRect) return;
      if (_throttleTimer) return;
      _throttleTimer = setTimeout(() => { _throttleTimer = null; }, 16); // ~60fps throttle
      const br = canvas.getBoundingClientRect();
      const mx = (e.clientX - br.left);
      const my = (e.clientY - br.top);
      const hit = hitTestSlice(mx, my);
      const targetIdx = hit ? hit.index : -1;
      // Only highlight slices that have children (subcategories)
      let effectiveIdx = -1;
      if (targetIdx >= 0) {
        const d = slices[targetIdx];
        if (d) {
          const children = DataStore.getChildren(d.id);
          if (children && children.length > 0) {
            effectiveIdx = targetIdx;
          }
        }
      }
      if (canvas._hoverIndex !== effectiveIdx) {
        canvas._hoverIndex = effectiveIdx;
        canvas.style.cursor = effectiveIdx >= 0 ? 'pointer' : 'default';
        drawPieStatic(effectiveIdx);
      }
    };

    const onMouseLeave = () => {
      if (!canvas) return;
      if (canvas._hoverIndex !== -1) {
        canvas._hoverIndex = -1;
        canvas.style.cursor = 'default';
        drawPieStatic(-1);
      }
    };

    const onClick = (e) => {
      if (!canvas || !canvas.getBoundingClientRect) return;
      const br = canvas.getBoundingClientRect();
      const mx = (e.clientX - br.left);
      const my = (e.clientY - br.top);
      const hit = hitTestSlice(mx, my);
      console.log('[pieClick] hit:', hit ? 'slice-' + hit.index : 'none');
      if (!hit) return;
      const d = slices[hit.index];
      if (!d) return;
      const children = DataStore.getChildren(d.id);
      if (children && children.length > 0) {
        const curDrill = getDrillCategory();
        if (curDrill !== d.id) {
          statsDrillStack.push(d.id);
        }
        if (canvasId === 'expandPieChart') {
          // In expanded mode: update expanded pie + table, don't close
          drawPieChart('expandPieChart', statsMonth, null, null, null, 360, false);
          if (typeof renderExpandPieTable === 'function') renderExpandPieTable();
        } else {
          updateDrillCharts();
          if (onDrill) onDrill();
        }
      } else if (onDrill) {
        // Leaf or single category in expand mode — just close overlay
        if (canvasId !== 'expandPieChart') {
          onDrill();
        }
      }
    };

    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('mouseleave', onMouseLeave);
    canvas.addEventListener('click', onClick);

    // Store references so we can remove them later
    canvas._pieHandlers = { mousemove: onMouseMove, mouseleave: onMouseLeave, click: onClick };
  }

  // --- Animated initial draw ---
  const duration = 600;
  const startTime = performance.now();

  function animatePie(currentTime) {
    if (!ctx || !canvas) return;
    const elapsed = currentTime - startTime;
    const progress = Math.min(elapsed / duration, 1);
    // Dramatic elastic ease-out with noticeable bounce
    const eased = progress === 1 ? 1 : 1 - Math.pow(2, -7 * progress) * Math.cos(progress * Math.PI * 2 * 1.2);
    // Radius grows from 30% to 100% for a "pop-in" effect
    const scaleR = r * (0.3 + 0.7 * Math.min(eased, 1));

    ctx.clearRect(0, 0, w, h);

    slices.forEach(slice => {
      const endAngle = slice.angleStart + slice.sliceAngle * eased;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, scaleR, slice.angleStart, endAngle);
      ctx.closePath();
      ctx.fillStyle = slice.displayColor || slice.cat.color;
      ctx.fill();
    });

    if (progress >= 1) {
      drawPieStatic(canvas._hoverIndex);
      // Only set up interactions after animation completes
      setupInteractions();
    }

    if (progress < 1) {
      requestAnimationFrame(animatePie);
    }
  }

  if (noAnim) {
    // Skip animation for expanded view — draw static immediately and set up interactions
    drawPieStatic(canvas._hoverIndex);
    setupInteractions();
  } else {
    requestAnimationFrame(animatePie);
  }
}
// Helper: lighten a hex color by a percentage
function lightenColor(hex, pct) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, (num >> 16) + Math.round(2.55 * pct));
  const g = Math.min(255, ((num >> 8) & 0x00FF) + Math.round(2.55 * pct));
  const b = Math.min(255, (num & 0x0000FF) + Math.round(2.55 * pct));
  return '#' + (r << 16 | g << 8 | b).toString(16).padStart(6, '0');
}

function darkenColor(hex, pct) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.max(0, (num >> 16) - Math.round(2.55 * pct));
  const g = Math.max(0, ((num >> 8) & 0x00FF) - Math.round(2.55 * pct));
  const b = Math.max(0, (num & 0x0000FF) - Math.round(2.55 * pct));
  return '#' + (r << 16 | g << 8 | b).toString(16).padStart(6, '0');
}
function drawLineChart(canvasId, month, startDate, endDate) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const tc = getThemeColors();
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = rect.width || 400;
  const h = 250;
  if (canvas.width !== Math.round(w * dpr) || canvas.height !== Math.round(h * dpr)) {
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
  }

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const excludeBills = true;
  const dailyData = month
    ? StatsEngine.getDailyTotals(month, { excludeBills })
    : (startDate && endDate ? getStatsDailyTotals() : getStatsDailyTotals());
  if (!dailyData.length || dailyData.every(d => d.total === 0)) {
    ctx.fillStyle = tc.textMuted;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂无数据', w/2, h/2);
    return;
  }

  const padding = { top: 20, bottom: 30, left: 50, right: 20 };
  const plotW = w - padding.left - padding.right;
  const plotH = h - padding.top - padding.bottom;
  const maxVal = Math.max(...dailyData.map(d => d.total), 0.01);
  // Compute daily spendable target (budget minus savings target, divided by days)
  let dailyTarget = 0;
  if (month) {
    dailyTarget = getDailySavingsTarget(month);
  }

  // Pre-calculate points
  const points = dailyData.map((d, i) => ({
    x: padding.left + (i / (dailyData.length - 1)) * plotW,
    y: padding.top + plotH - (d.total / maxVal) * plotH,
    total: d.total
  }));

  function drawBackground() {
    // Grid lines
    ctx.strokeStyle = tc.border;
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = padding.top + (plotH / 4) * i;
      ctx.beginPath();
      ctx.moveTo(padding.left, y);
      ctx.lineTo(w - padding.right, y);
      ctx.stroke();
      ctx.fillStyle = tc.textMuted;
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(formatMoney(maxVal * (1 - i/4)), padding.left - 5, y + 3);
    }

    // Savings target dashed line
    if (dailyTarget > 0 && maxVal > 0) {
      const targetY = padding.top + plotH - (Math.min(dailyTarget, maxVal) / maxVal) * plotH;
      ctx.save();
      ctx.setLineDash([6, 4]);
      ctx.strokeStyle = '#10B981';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(padding.left, targetY);
      ctx.lineTo(w - padding.right, targetY);
      ctx.stroke();
      ctx.setLineDash([]);
      // Label
      ctx.fillStyle = '#10B981';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('日均可支配 ' + formatMoney(dailyTarget), w - padding.right - 5, targetY - 6);
      ctx.restore();
    }

    // X labels
    const step = Math.max(1, Math.floor(dailyData.length / 10));
    dailyData.forEach((d, i) => {
      if (i % step === 0 || i === dailyData.length - 1) {
        const x = padding.left + (i / (dailyData.length - 1)) * plotW;
        ctx.fillStyle = tc.textMuted;
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(d.day, x, h - 5);
      }
    });
  }

  function drawLineAndFill(progress) {
    // Clip to horizontal progress
    const clipX = padding.left + plotW * progress;
    ctx.save();
    ctx.beginPath();
    ctx.rect(padding.left, 0, Math.max(0, clipX - padding.left), h);
    ctx.clip();

    // Draw line
    ctx.beginPath();
    points.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else {
        const prev = points[i-1];
        const cpx = (prev.x + p.x) / 2;
        ctx.bezierCurveTo(cpx, prev.y, cpx, p.y, p.x, p.y);
      }
    });
    ctx.strokeStyle = '#6366F1';
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // Fill area
    const last = points[points.length-1];
    ctx.lineTo(last.x, padding.top + plotH);
    ctx.lineTo(points[0].x, padding.top + plotH);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, padding.top, 0, padding.top + plotH);
    grad.addColorStop(0, 'rgba(99,102,241,0.15)');
    grad.addColorStop(1, 'rgba(99,102,241,0)');
    ctx.fillStyle = grad;
    ctx.fill();

    // Dots (only visible points)
    points.forEach((p, i) => {
      const pProgress = i / (points.length - 1);
      if (pProgress > progress) return;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = '#6366F1';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });

    ctx.restore();
  }

  // Animate
  const duration = 800;
  const startTime = performance.now();

  function animateLine(currentTime) {
    const elapsed = currentTime - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic

    ctx.clearRect(0, 0, w, h);
    drawBackground();
    drawLineAndFill(eased);

    if (progress < 1) {
      requestAnimationFrame(animateLine);
    }
  }

  requestAnimationFrame(animateLine);
}
function drawBarChart(canvasId, month, startDate, endDate) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const tc = getThemeColors();
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = rect.width || 600;
  const h = 250;
  if (canvas.width !== Math.round(w * dpr) || canvas.height !== Math.round(h * dpr)) {
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
  }
  // CSS width:100% handles display sizing

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const data = getChartData(month, startDate, endDate);
  if (!data.length) {
    ctx.fillStyle = tc.textMuted;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂无数据', w/2, h/2);
    return;
  }

  const padding = { top: 20, bottom: 65, left: 60, right: 20 };
  const plotW = w - padding.left - padding.right;
  const plotH = h - padding.top - padding.bottom;
  const maxVal = Math.max(...data.map(d => d.total), 0.01);
  const barW = Math.min(40, plotW / data.length * 0.6);
  const gap = plotW / data.length;
  const budgetMonth = (typeof month === 'string' && month) || getBudgetMonth();

  // Grid
  ctx.strokeStyle = tc.border;
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = padding.top + (plotH / 4) * i;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(w - padding.right, y);
    ctx.stroke();
    ctx.fillStyle = tc.textMuted;
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(formatMoney(maxVal * (1 - i/4)), padding.left - 5, y + 3);
  }

  // Bars
  data.forEach((d, i) => {
    const barH = (d.total / maxVal) * plotH;
    const x = padding.left + i * gap + (gap - barW) / 2;
    const y = padding.top + plotH - barH;

    ctx.fillStyle = d.cat.color;
    ctx.beginPath();
    ctx.roundRect(x, y, barW, barH, [4, 4, 0, 0]);
    ctx.fill();

    // Label
    ctx.fillStyle = tc.text;
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(d.cat.name.length > 4 ? d.cat.name.slice(0,4)+'..' : d.cat.name, x + barW/2, h - 22);
    ctx.fillStyle = tc.textSecondary;
    ctx.fillText(formatMoney(d.total), x + barW/2, y - 5);

    // Budget progress bar under label
    if (d.id) {
      const catBudgetObj = DataStore.getCategoryBudget(d.id, budgetMonth);
      const catBudget = catBudgetObj.value;
      if (catBudget > 0) {
        const ratio = d.total / catBudget;
        const progW = Math.min(barW, 60);
        const progX = x + (barW - progW) / 2;
        const progY = h - 14;
        // Background
        ctx.fillStyle = tc.border;
        ctx.fillRect(progX, progY, progW, 4);
        // Fill
        const fillW = Math.min(progW, progW * ratio);
        let barColor;
        if (ratio < 0.8) barColor = '#10B981';
        else if (ratio <= 1.0) barColor = '#F59E0B';
        else barColor = '#EF4444';
        ctx.fillStyle = barColor;
        ctx.fillRect(progX, progY, fillW, 4);
      }
    }
  });

  // Click to drill down
  canvas.onclick = (e) => {
    const rect2 = canvas.getBoundingClientRect();
    const currW = rect2.width;
    const currPlotW = currW - padding.left - padding.right;
    const mx = (e.clientX - rect2.left);
    const idx = Math.floor((mx - padding.left) / (currPlotW / data.length));
    if (idx >= 0 && idx < data.length) {
      const clicked = data[idx];
      const children = DataStore.getChildren(clicked.id);
      if (children && children.length > 0) {
        statsDrillStack.push(clicked.id);
        updateDrillCharts();
      }
      // Leaf: do nothing
    }
  };
}
function drawMonthlyChart(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const tc = getThemeColors();
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = rect.width || 600;
  const h = 200;
  if (canvas.width !== Math.round(w * dpr) || canvas.height !== Math.round(h * dpr)) {
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
  }

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const data = StatsEngine.getMonthlyTotals(6);
  if (!data.length || data.every(d => d.total === 0)) {
    ctx.fillStyle = tc.textMuted;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂无月度数据', w/2, h/2);
    return;
  }

  const padding = { top: 20, bottom: 35, left: 55, right: 15 };
  const plotW = w - padding.left - padding.right;
  const plotH = h - padding.top - padding.bottom;
  const maxVal = Math.max(...data.map(d => d.total), 0.01);

  // Grid
  ctx.strokeStyle = tc.border;
  ctx.lineWidth = 1;
  for (let i = 0; i <= 3; i++) {
    const y = padding.top + (plotH / 3) * i;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(w - padding.right, y);
    ctx.stroke();
    ctx.fillStyle = tc.textMuted;
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(formatMoney(maxVal * (1 - i/3)), padding.left - 5, y + 3);
  }

  // Points
  const points = data.map((d, i) => ({
    x: padding.left + (i / (data.length - 1)) * plotW,
    y: padding.top + plotH - (d.total / maxVal) * plotH,
    total: d.total,
    label: d.month.slice(5, 7) + '月'
  }));

  // Fill area
  ctx.beginPath();
  points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  const lastP = points[points.length - 1];
  ctx.lineTo(lastP.x, padding.top + plotH);
  ctx.lineTo(points[0].x, padding.top + plotH);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, padding.top, 0, padding.top + plotH);
  grad.addColorStop(0, 'rgba(99,102,241,0.15)');
  grad.addColorStop(1, 'rgba(99,102,241,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.strokeStyle = '#6366F1';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Dots + labels
  points.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#6366F1';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // X label
    ctx.fillStyle = tc.text;
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.label, p.x, h - 8);

    // Value above dot
    ctx.fillStyle = tc.textSecondary;
    ctx.font = 'bold 10px sans-serif';
    ctx.fillText(formatMoney(p.total), p.x, p.y - 10);
  });
}
function drawSavingsChart(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const tc = getThemeColors();
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = rect.width || 600;
  const h = 200;
  if (canvas.width !== Math.round(w * dpr) || canvas.height !== Math.round(h * dpr)) {
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
  }

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const months = StatsEngine.getMonthlyTotals(6);
  if (!months.length) {
    ctx.fillStyle = tc.textMuted;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂无数据', w/2, h/2);
    return;
  }

  // Compute savings for each month (budget - spending)
  const savings = months.map(m => {
    const b = DataStore.getBudget(m.month);
    return { ...m, savings: b ? b - m.total : 0 };
  });

  const maxVal = Math.max(...savings.map(s => Math.max(s.savings, 0)), 0.01);
  const minVal = Math.min(...savings.map(s => s.savings), 0);

  const padding = { top: 25, bottom: 35, left: 55, right: 20 };
  const plotW = w - padding.left - padding.right;
  const plotH = h - padding.top - padding.bottom;

  // Zero line
  const zeroY = padding.top + plotH - (0 - minVal) / (maxVal - minVal) * plotH;

  // Grid
  ctx.strokeStyle = tc.border;
  ctx.lineWidth = 1;
  for (let i = 0; i <= 3; i++) {
    const y = padding.top + (plotH / 3) * i;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(w - padding.right, y);
    ctx.stroke();
    ctx.fillStyle = tc.textMuted;
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'right';
    const val = maxVal - (maxVal - minVal) * i / 3;
    ctx.fillText(formatMoney(val), padding.left - 5, y + 3);
  }

  // Draw bars
  const barW = Math.min(36, plotW / savings.length * 0.55);
  const gap = plotW / savings.length;

  savings.forEach((s, i) => {
    const x = padding.left + i * gap + (gap - barW) / 2;
    const barH = Math.abs(s.savings) / (maxVal - minVal) * plotH;
    const isPositive = s.savings >= 0;
    const color = isPositive ? '#10B981' : '#EF4444';
    const y = isPositive ? zeroY - barH : zeroY;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x, y, barW, Math.max(barH, 2), [4, 4, 0, 0]);
    ctx.fill();

    // Month label
    ctx.fillStyle = tc.text;
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(s.month.slice(5, 7) + '月', x + barW/2, h - 8);

    // Value label
    ctx.fillStyle = isPositive ? '#10B981' : '#EF4444';
    ctx.font = 'bold 9px sans-serif';
    const labelY = isPositive ? y - 5 : y + barH + 14;
    ctx.fillText(formatMoney(s.savings), x + barW/2, labelY);
  });

  // Zero line
  ctx.strokeStyle = tc.textMuted;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(padding.left, zeroY);
  ctx.lineTo(w - padding.right, zeroY);
  ctx.stroke();
  ctx.setLineDash([]);
}

function exportJSON() {
  const data = DataStore.exportJSON();
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'budget-data-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);

let importJSONContent = null;

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    importJSONContent = e.target.result;
    showModal(`
      <div class="modal-title">导入数据</div>
      <p class="text-sm text-secondary mb-16">选择导入方式：</p>
      <div class="flex flex-col gap-8">
        <button class="btn btn-primary btn-block" onclick="confirmImportJSON('replace')">🔄 替换当前数据</button>
        <button class="btn btn-outline btn-block" onclick="confirmImportJSON('merge')">🔀 合并到当前数据</button>
      </div>
      <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button></div>
    `);
  };
  reader.readAsText(file);
  event.target.value = '';
}

function confirmImportJSON(mode) {
  if (!importJSONContent) { showToast('没有可导入的数据', 'error'); return; }
  const success = DataStore.importJSON(importJSONContent, mode);
  importJSONContent = null;
  closeModal();
  if (success) {
    showToast('✅ 数据导入成功');
    renderSettings();
  } else {
    showToast('❌ 导入失败，文件格式无效', 'error');
  }
}

function exportDiagnosticLog() {
  const log = DataStore.getDiagnosticLog();
  if (!log || log.length === 0) {

    return;
  }
  let text = '=== Budget App Diagnostic Log ===\n';
  text += 'Exported: ' + new Date().toISOString() + '\n';
  text += 'Version: v2.3.2\n';
  text += 'Records: ' + DataStore.getRecords().length + '\n';
  text += 'Pending Delete: ' + (DataStore.getPendingDelete() ? DataStore.getPendingDelete().id : 'none') + '\n';
  text += 'LocalStorage: ' + (localStorage.getItem('budgetAppData') || '').length + ' bytes\n';

  text += 'User Agent: ' + navigator.userAgent + '\n';

  log.forEach(e => {
    text += `[${e.t}] ${e.a} | ${e.d} | records=${e.recordsCount} pending=${e.pendingId || '—'}\n`;
  });
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });

function repairData() {
  // Check if DataStore._data and localStorage are in sync
  try {
    const raw = localStorage.getItem('budgetAppData');
    if (!raw) {
      showToast('✅ 没有需要修复的数据', 'success');
      return;
    }
    const lsData = JSON.parse(raw);
    const memRecords = DataStore.getRecords().length;
    const lsRecords = (lsData.records || []).length;
    
    // Check 1: if localStorage has records that memory doesn't (stale in-memory)
    // We reload from localStorage which is the source of truth
    const success = DataStore.reload();
    if (success) {
      // Also clear any pending delete state which might be stale
      const pending = DataStore.getPendingDelete();
      if (pending) {
        DataStore._finalizeDelete(pending.id);
      }
      showToast('✅ 数据已从 localStorage 重新加载 (' + lsRecords + ' 条记录)', 'success');
    }
    
    // Check 2: verify pending delete is not stuck
    const pendingCheck = DataStore.getPendingDelete();
    if (pendingCheck) {
      DataStore._finalizeDelete(pendingCheck.id);
    }
    
    // Re-render all pages
    if (typeof renderOverview === 'function') renderOverview();
    if (typeof renderAddPage === 'function') renderAddPage();
    if (typeof renderRecords === 'function') renderRecords();
    if (typeof renderCategories === 'function') renderCategories();
    if (typeof renderStats === 'function') renderStats();
    if (typeof renderReport === 'function') renderReport();
    if (typeof renderSettings === 'function') renderSettings();
    if (typeof renderWhatIf === 'function') renderWhatIf();
  } catch(e) {
    showToast('❌ 修复失败: ' + e.message, 'error');
  }
}

function renderWhatIfParams(month, savedParams) {
  const allCats = DataStore.getCategories();
  const today = new Date().getDate();
  const daysInMonth = new Date(parseInt(month.split('-')[0]), parseInt(month.split('-')[1]), 0).getDate();
  const daysPassed = today;

  // Get actual monthly spending per category
  const records = DataStore.getRecords()
    .filter(r => getMonthKey(r.date || r.createdAt) === month && !StatsEngine.isBillCategory(r.categoryId));
  const catActual = {};
  records.forEach(r => {
    catActual[r.categoryId] = (catActual[r.categoryId] || 0) + r.amount;
  });

  // Compute daily avg per category
  const catDailyAvg = {};
  Object.entries(catActual).forEach(([catId, total]) => {
    catDailyAvg[catId] = daysPassed > 0 ? total / daysPassed : 0;
  });

  const adj = savedParams ? savedParams.categoryAdjustments || {} : {};
  const globalAdj = savedParams ? savedParams.globalAdjustment || { mode: null, value: null } : { mode: null, value: null };
  const hypos = savedParams ? savedParams.hypotheticalCategories || [] : [];

  let html = '';

  // === 分类支出调整 ===
  html += `<div class="card mb-16">
    <div class="card-title">🏷️ 分类支出调整</div>
    <p class="text-xs text-muted" style="margin-bottom:8px">调整每个分类在剩余天数的支出方式。点击名称展开子分类。<br>「固定剩余总额」= 剩余天数总共花指定金额；「比趋势± %/天」= 在日均基础上增减。</p>`;

  // Build category tree
  const treeMap = {};
  allCats.forEach(c => treeMap[c.id] = { ...c, children: [] });
  const treeRoots = [];
  allCats.forEach(c => {
    if (!c.parentId) treeRoots.push(treeMap[c.id]);
    else if (treeMap[c.parentId]) treeMap[c.parentId].children.push(treeMap[c.id]);
  });

  // Recursive render: flat structure (no nested bodies to avoid cumulative padding)
  function renderCatNode(node, depth) {
    const expandKey = 'wi-expand-' + node.id;
    const isExpanded = whatIfExpandStates[expandKey] === true;
    const nodeAdj = adj[node.id] || { mode: 'trend', value: null };
    const hasChildren = node.children.length > 0;

    // Compute daily avg: use direct spending or sum of children
    let nodeDailyAvg = catDailyAvg[node.id] || 0;
    if (!nodeDailyAvg && hasChildren) {
      nodeDailyAvg = node.children.reduce((s, c) => s + (catDailyAvg[c.id] || 0), 0);
    }

    // Compute total spent: direct spending or sum of children
    let nodeSpent = catActual[node.id] || 0;
    if (!nodeSpent && hasChildren) {
      nodeSpent = node.children.reduce((s, c) => s + (catActual[c.id] || 0), 0);
    }

    // Check if any ancestor has mode 'zero' → disable this node
    let isDisabled = false;
    let ancestor = node.parentId ? treeMap[node.parentId] : null;
    while (ancestor) {
      const ancAdj = adj[ancestor.id];
      if (ancAdj && ancAdj.mode === 'zero') { isDisabled = true; break; }
      ancestor = ancestor.parentId ? treeMap[ancestor.parentId] : null;
    }

    // Flat indentation: header indents left, control row indents 16px more
    const headerIndent = depth * 24;
    const bodyIndent = headerIndent + 24;

    let out = '';

    // Header row — only for nodes that have children (expand/collapse purpose)
    if (hasChildren) {
      out += `<div class="whatif-cat-root-header" onclick="toggleWhatIfExpand('${node.id}')" style="cursor:pointer;padding-left:${headerIndent + 12}px">
        <span class="whatif-expand-icon">${isExpanded ? '▼' : '▶'}</span>
        <span>${node.icon} ${node.name}</span>
        <span class="text-xs text-muted" style="margin-left:8px">日均 ${formatMoney(nodeDailyAvg)}</span>
        <span class="text-xs text-muted" style="margin-left:auto">已花 ${formatMoney(nodeSpent)}</span>
      </div>`;
    }

    // Controls row — always shown for leaves; for parents only when expanded
    if (!hasChildren || isExpanded) {
      out += `<div class="whatif-cat-row" style="padding-left:${bodyIndent + 12}px">
        <span class="whatif-cat-label">${node.icon} ${node.name}${hasChildren ? '（整体）' : ''}</span>
        <select class="input-field whatif-mode-select" data-cat="${node.id}" data-level="${depth === 0 ? 'root' : 'child'}" ${isDisabled ? 'disabled' : ''}>
          <option value="trend" ${nodeAdj.mode === 'trend' ? 'selected' : ''}>保持趋势</option>
          <option value="daily" ${nodeAdj.mode === 'daily' ? 'selected' : ''}>设日均值</option>
          <option value="total" ${nodeAdj.mode === 'total' ? 'selected' : ''}>固定剩余总额</option>
          <option value="percent" ${nodeAdj.mode === 'percent' ? 'selected' : ''}>比趋势± %</option>
          <option value="adjust" ${nodeAdj.mode === 'adjust' ? 'selected' : ''}>比趋势± RM/天</option>
          <option value="zero" ${nodeAdj.mode === 'zero' ? 'selected' : ''}>取消消费</option>
        </select>
        <input type="number" class="input-field whatif-value-input" data-cat="${node.id}" value="${nodeAdj.value || ''}" min="0" step="0.01" placeholder="值" ${isDisabled || nodeAdj.mode === 'trend' || nodeAdj.mode === 'zero' ? 'style="display:none"' : ''}>
        <span class="text-xs text-muted" style="min-width:60px;text-align:right">日均 ${formatMoney(nodeDailyAvg)}</span>
      </div>`;
    }

    // Children — rendered flat (not nested inside body div)
    if (isExpanded && hasChildren) {
      out += node.children.map(ch => renderCatNode(ch, depth + 1)).join('');
    }

    return out;
  }

  treeRoots.forEach(root => {
    html += `<div class="whatif-cat-root">`;
    html += renderCatNode(root, 0);
    html += `</div>`;
  });

  html += `</div>`; // end card

  // === 全局调整 ===
  html += `<div class="card mb-16">
    <div class="card-title">🌐 全局调整</div>
    <p class="text-xs text-muted" style="margin-bottom:8px">对所有保持趋势的分类统一调整。不覆盖已单独设置的分类。</p>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <select class="input-field" id="wi-global-mode" style="width:auto;min-width:120px">
        <option value="" ${!globalAdj.mode ? 'selected' : ''}>无</option>
        <option value="percent" ${globalAdj.mode === 'percent' ? 'selected' : ''}>± %</option>
        <option value="amount" ${globalAdj.mode === 'amount' ? 'selected' : ''}>± RM/天</option>
      </select>
      <input type="number" class="input-field" id="wi-global-value" value="${globalAdj.value || ''}" min="0" step="0.01" placeholder="值" style="width:100px">
      <span class="text-xs text-muted">负值=减少，正值=增加（如 −10% 或 −5）</span>
    </div>
  </div>`;

  // === 添加假设分类 ===
  html += `<div class="card mb-16">
    <div class="card-title">➕ 添加假设分类</div>
    <p class="text-xs text-muted" style="margin-bottom:8px">添加一个当前不存在的新分类来评估其影响。</p>
    <div id="wi-hypo-list">
      ${hypos.map((h, i) => `
        <div class="whatif-hypo-row" data-index="${i}">
          <input type="text" class="input-field wi-hypo-icon" value="${h.icon || ''}" placeholder="图标" style="width:50px">
          <input type="text" class="input-field wi-hypo-name" value="${h.name || ''}" placeholder="分类名" style="flex:1">
          <input type="number" class="input-field wi-hypo-amount" value="${h.amount || ''}" min="0" step="0.01" placeholder="金额" style="width:100px">
          <select class="input-field wi-hypo-type" style="width:auto">
            <option value="daily" ${h.type === 'daily' ? 'selected' : ''}>/天</option>
            <option value="total" ${h.type === 'total' ? 'selected' : ''}>/月</option>
          </select>
          <button class="btn btn-ghost btn-sm" onclick="removeWhatIfHypo(${i})" style="color:var(--danger)">✕</button>
        </div>
      `).join('')}
    </div>
    <button class="btn btn-sm btn-outline mt-8" onclick="addWhatIfHypo()">＋ 添加假设分类</button>
  </div>`;

  // === Action buttons ===
  html += `<div style="display:flex;gap:12px;margin-bottom:24px">
    <button class="btn btn-primary btn-lg" onclick="runWhatIfSimulation()" style="flex:1">🔮 生成预测</button>
    ${savedParams ? '<button class="btn btn-ghost btn-lg" onclick="clearWhatIfSimulation()" style="color:var(--danger)">🗑️ 清除场景</button>' : ''}
  </div>`;

  return html;
}

      </div>`;

  // Build full category projection tree (all nesting levels)
  const allCats = DataStore.getCategories();
  const projMap = categoryProjections || {};
  // Create tree nodes
  const treeNodes = {};
  allCats.forEach(c => {
    treeNodes[c.id] = {
      category: c,
      currentTotal: 0,
      projectedRemaining: 0,
      projectedTotal: 0,
      trendTotal: 0,
      mode: 'trend',
      children: []
    };
  });
  // Fill leaf data from simulation
  Object.values(projMap).forEach(p => {
    const node = treeNodes[p.category.id];
    if (node) {
      node.currentTotal = p.currentTotal || 0;
      node.projectedRemaining = p.projectedRemaining || 0;
      node.projectedTotal = p.projectedTotal || 0;
      node.mode = p.mode || 'trend';
      node.trendTotal = daysPassed > 0 ? (p.currentDailyAvg || 0) * daysInMonth : 0;
    }
  });
  // Build parent-child links
  const rootNodes = [];
  allCats.forEach(c => {
    if (!c.parentId) {

    } else if (treeNodes[c.parentId]) {
      treeNodes[c.parentId].children.push(treeNodes[c.id]);
    }
  });
  // Aggregate non-leaf nodes upward
  function aggregateUp(node) {
    if (node.children.length > 0) {
      node.children.forEach(aggregateUp);
      node.currentTotal = node.children.reduce((s, ch) => s + ch.currentTotal, 0);
      node.projectedRemaining = node.children.reduce((s, ch) => s + ch.projectedRemaining, 0);
      node.projectedTotal = node.currentTotal + node.projectedRemaining;
      node.trendTotal = node.children.reduce((s, ch) => s + ch.trendTotal, 0);
    }
  }
  rootNodes.forEach(aggregateUp);

  // Recursive render of the tree (collapsible, default collapsed)
  function renderTreeNodes(nodes, depth) {
    let out = '';
    nodes.forEach(node => {
      const diff = node.projectedTotal - node.trendTotal;
      const isAdjusted = node.mode !== 'trend' && node.mode !== undefined;
      const hasChildren = node.children.length > 0;
      const cmpKey = 'wi-cmp-' + node.category.id;

          ${label}
        </span>
        <span>${formatMoney(node.currentTotal)}</span>
        <span>${formatMoney(node.projectedRemaining)}</span>
        <span>${formatMoney(node.projectedTotal)}</span>
        <span style="color:${Math.abs(diff) < 0.01 ? 'var(--text-muted)' : (diff > 0 ? 'var(--danger)' : 'var(--success)')}">
          ${Math.abs(diff) < 0.01 ? '—' : (diff > 0 ? '+' : '') + formatMoney(diff)}
        </span>
      </div>`;
      if (hasChildren && isExpanded) {
        out += renderTreeNodes(node.children, depth + 1);
      }
    });
    return out;
  }
  html += renderTreeNodes(rootNodes, 0);

  // Hypothetical categories row
  hypotheticalProjections.forEach(hp => {
    html += `<div class="whatif-compare-row" style="color:var(--primary);font-style:italic">

      ${Math.abs(grandDiff) < 0.01 ? '—' : (grandDiff > 0 ? '+' : '') + formatMoney(grandDiff)}

  </div>`;

  html += `</div></div>`;

  // === 明细按钮 ===
  html += `<div style="display:flex;gap:12px;margin-top:8px">
    <button class="btn btn-ghost btn-lg" onclick="runWhatIfSimulation()" style="flex:1">🔄 重新预测</button>
    <button class="btn btn-ghost btn-lg" onclick="clearWhatIfSimulation()" style="color:var(--danger)">🗑️ 清除场景</button>
  </div>`;

  // Draw rings after render
  setTimeout(() => drawWhatIfRings(result), 50);

  return html;
}

}

// Helper to draw a simple ring (named differently to avoid collision with existing drawRing)
function drawSimpleRing(canvas, percent, fillColor, bgColor) {
  const ctx = canvas.getContext('2d');
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const cssW = rect.width || canvas.width;
  const cssH = rect.height || canvas.height;
  const bw = Math.round(cssW * dpr);
  const bh = Math.round(cssH * dpr);
  if (canvas.width !== bw || canvas.height !== bh) {
    canvas.width = bw;
    canvas.height = bh;
  }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const cx = cssW / 2, cy = cssH / 2;
  const r = Math.min(cx, cy) - 8;
  const lineWidth = 12;

  // Read theme-aware colors from CSS
  const styles = getComputedStyle(document.documentElement);
  const themeBorder = styles.getPropertyValue('--border').trim() || '#e5e7eb';
  const themePrimary = styles.getPropertyValue('--primary').trim() || '#6366F1';
  const themeSuccess = styles.getPropertyValue('--success').trim() || '#10B981';
  const themeText = styles.getPropertyValue('--text-primary').trim() || '#1E293B';

  ctx.clearRect(0, 0, cssW, cssH);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = bgColor || themeBorder;
  ctx.lineWidth = lineWidth;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * Math.min(percent, 1));
  ctx.strokeStyle = fillColor || (percent > 0.5 ? themePrimary : themeSuccess);
  ctx.lineWidth = lineWidth;
  ctx.lineCap = 'round';
  ctx.stroke();

  ctx.fillStyle = themeText;
  ctx.font = 'bold 14px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText((percent * 100).toFixed(0) + '%', cx, cy);
}

  document.querySelectorAll('.whatif-mode-select').forEach(sel => {

    const mode = sel.value;
    const valInput = sel.parentElement.querySelector('.whatif-value-input');
    const value = valInput ? parseFloat(valInput.value) || null : null;
    if (mode !== 'trend' || value !== null) {
      categoryAdjustments[catId] = { mode, value };

  });

  // Global adjustment
  const globalMode = document.getElementById('wi-global-mode')?.value || '';
  const globalValue = parseFloat(document.getElementById('wi-global-value')?.value) || null;
  const globalAdjustment = globalMode ? { mode: globalMode, value: globalValue } : { mode: null, value: null };

  // Hypothetical categories

(function() {

function checkMonthRollover() {
  const now = new Date();
  const currentMonth = getMonthKey(now.toISOString());
  const lastMonth = DataStore.getLastActiveMonth();

  if (!lastMonth) {
    DataStore.setLastActiveMonth(currentMonth);
    return;
  }

  if (lastMonth !== currentMonth) {
    const lastAmounts = DataStore.getBillAmounts(lastMonth);
    const currentAmounts = DataStore.getBillAmounts(currentMonth);

    if (Object.keys(currentAmounts).length === 0 && Object.keys(lastAmounts).length > 0) {
      Object.entries(lastAmounts).forEach(([billId, amount]) => {
        DataStore.setBillAmount(currentMonth, billId, amount);
      });

      const lastIncome = DataStore.getMonthlyIncome(lastMonth);
      if (lastIncome > 0 && DataStore.getMonthlyIncome(currentMonth) === 0) {
        DataStore.setMonthlyIncome(currentMonth, lastIncome);
      }

      DataStore.save();
      setTimeout(() => showBillRolloverReminder(lastMonth, currentMonth), 500);
    }

    DataStore.setLastActiveMonth(currentMonth);
  }
}

    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);

    amount: function (v) { return typeof v === 'number' && isFinite(v) && v >= 0; },
    date: function (v) { return typeof v === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(v); },
    color: function (v) { return typeof v === 'string' && /^#[0-9a-fA-F]{6}$/.test(v); },
    id: function (v) { return typeof v === 'string' && v.length > 0 && v.length < 100; },
    name: function (v) { return typeof v === 'string' && v.length > 0 && v.length < 200; },
    icon: function (v) { return typeof v === 'string' && v.length <= 10; },
    note: function (v) { return typeof v === 'string' && v.length < 1000; },
    parentId: function (v) { return v === null || (typeof v === 'string' && v.length < 100); }
  };

  function validateRecord(r) {
    return validators.amount(r.amount) &&
      validators.date(r.date) &&
      validators.id(r.id) &&
      (typeof r.note === 'undefined' || validators.note(r.note)) &&
      validators.id(r.categoryId) &&
      (typeof r.createdAt === 'undefined' || validators.date(r.createdAt));
  }

  function validateCategory(c) {
    return validators.id(c.id) &&
      validators.name(c.name) &&
      validators.color(c.color) &&
      validators.icon(c.icon) &&
      validators.parentId(c.parentId) &&
      typeof c.sortOrder === 'number';
  }

  function validateSyncData(data) {
    if (!data || typeof data !== 'object') return '数据格式无效：不是对象';
    if (!Array.isArray(data.records)) return '数据格式无效：缺少 records 数组';
    if (!Array.isArray(data.categories)) return '数据格式无效：缺少 categories 数组';
    data.records = data.records.filter(validateRecord);
    data.categories = data.categories.filter(validateCategory);
    return null;
  }

  function backupBeforeMerge() {
    try {
      localStorage.setItem('budgetBackupBeforeSync', DataStore.exportJSON());
      localStorage.setItem('budgetBackupTime', new Date().toISOString());
    } catch (e) { /* best-effort */ }
  }

  var pc = null;
  var channel = null;
  var syncState = 'idle';
  var onStateChange = null;
  var onDataCallback = null;
  var onErrorCallback = null;

  function resetConnection() {
    if (pc) { try { pc.close(); } catch (e) { /* ignore */ } pc = null; }
    channel = null;
    syncState = 'idle';
  }

  function setState(s) { syncState = s; if (typeof onStateChange === 'function') onStateChange(s); }

  function createHost(callbacks) {
    resetConnection();
    onStateChange = callbacks.onStateChange || null;
    onDataCallback = callbacks.onDataReceived || null;
    onErrorCallback = callbacks.onError || null;
    setState('host-offer');
    pc = new RTCPeerConnection({ iceServers: [] });
    channel = pc.createDataChannel('budget-sync', { ordered: true });
    channel.onopen = function () {
      setState('connected');
      try { channel.send(DataStore.exportJSON()); } catch (e) {
        if (onErrorCallback) onErrorCallback('发送失败：' + e.message);
      }
    };
    channel.onmessage = function (msg) { if (typeof onDataCallback === 'function') onDataCallback(msg.data); };
    channel.onerror = function () { if (onErrorCallback) onErrorCallback('数据通道错误'); };
    pc.oniceconnectionstatechange = function () {
      if (pc.iceConnectionState === 'failed') {
        if (onErrorCallback) onErrorCallback('连接失败，请确认同一网络');
      } else if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
        if (typeof callbacks.onConnect === 'function') callbacks.onConnect();
      }
    };
    return pc.createOffer()
      .then(function (o) { return pc.setLocalDescription(o); })
      .then(function () {
        return new Promise(function (r) {
          if (pc.iceGatheringState === 'complete') r(pc.localDescription.sdp);
          else pc.onicecandidate = function (e) { if (!e.candidate) r(pc.localDescription.sdp); };
        });
      })
      .then(function (sdp) { return compressStr(sdp); });
  }

  function acceptAnswer(answerB64) {
    if (!pc || (syncState !== 'host-offer' && syncState !== 'connected'))
      return Promise.reject(new Error('状态异常，请重新开始'));
    return decompressStr(answerB64).then(function (sdp) {
      return pc.setRemoteDescription({ type: 'answer', sdp: sdp });
    }).then(function () { return true; });
  }

  function createClient(offerB64, callbacks) {
    resetConnection();
    onStateChange = callbacks.onStateChange || null;
    onDataCallback = callbacks.onDataReceived || null;
    onErrorCallback = callbacks.onError || null;
    setState('client-offer');
    pc = new RTCPeerConnection({ iceServers: [] });
    pc.oniceconnectionstatechange = function () {
      if (pc.iceConnectionState === 'failed') {
        if (onErrorCallback) onErrorCallback('连接失败，请确认同一网络');
      }
    };
    pc.ondatachannel = function (e) {
      channel = e.channel;
      channel.onopen = function () { setState('connected'); };
      channel.onmessage = function (msg) { if (typeof onDataCallback === 'function') onDataCallback(msg.data); };
      channel.onerror = function () { if (onErrorCallback) onErrorCallback('数据通道错误'); };
    };
    return decompressStr(offerB64).then(function (sdp) {
      return pc.setRemoteDescription({ type: 'offer', sdp: sdp })
        .then(function () { return pc.createAnswer(); })
        .then(function (a) { return pc.setLocalDescription(a); })
        .then(function () {
          return new Promise(function (r) {
            if (pc.iceGatheringState === 'complete') r(pc.localDescription.sdp);
            else pc.onicecandidate = function (e) { if (!e.candidate) r(pc.localDescription.sdp); };
          });
        })
        .then(function (sdp2) { return compressStr(sdp2); });
    });
  }

  function sortRecordsDesc(records) {
    records.sort(function (a, b) {
      var da = a.date || a.createdAt || '', db = b.date || b.createdAt || '';
      return da > db ? -1 : da < db ? 1 : 0;
    });
  }

  function receiveAndMerge(jsonStr, mode) {
    var data;
    try { data = JSON.parse(jsonStr); } catch (e) {
      if (onErrorCallback) onErrorCallback('JSON 解析失败');
      return false;
    }
    var err = validateSyncData(data);
    if (err) console.warn('[Sync]', err);
    if (data.records.length === 0 && data.categories.length === 0) {
      if (onErrorCallback) onErrorCallback('无有效数据');
      return false;
    }
    backupBeforeMerge();
    if (mode === 'replace') {
      data.records.forEach(function (r) { r.note = sanitizeHtml(r.note || ''); });
      data.categories.forEach(function (c) { c.name = sanitizeHtml(c.name); c.icon = sanitizeHtml(c.icon); });
      sortRecordsDesc(data.records);
      var def = DataStore._defaults();
      DataStore._data = def;
      DataStore._data.records = data.records;
      DataStore._data.categories = data.categories;
      if (data.budgets) DataStore._data.budgets = data.budgets;
      if (data.categoryBudgets) DataStore._data.categoryBudgets = data.categoryBudgets;
      if (data.monthlyIncome) DataStore._data.monthlyIncome = data.monthlyIncome;
      if (data.billAmounts) DataStore._data.billAmounts = data.billAmounts;
      if (data.savingsTarget) DataStore._data.savingsTarget = data.savingsTarget;
      if (data.percentBase) DataStore._data.percentBase = data.percentBase;
      if (data.whatIfParams) DataStore._data.whatIfParams = data.whatIfParams;
      if (data.billCategories && Array.isArray(data.billCategories))
        DataStore._data.billCategories = data.billCategories.map(function (b) { b.name = sanitizeHtml(b.name); return b; });
    } else {
      mergeIntoDataStore(data);
    }
    DataStore.save();
    var active = document.querySelector('.page-section.active');
    if (active && typeof navigateTo === 'function')
      navigateTo(active.getAttribute('data-page') || 'overview');
    return { records: data.records.length, categories: data.categories.length };
  }

  var pendingSyncData = null;
  function confirmSyncMode(mode) {
    if (typeof closeModal === 'function') closeModal();
    if (!pendingSyncData) return;
    var el = document.getElementById('syncClientProgress');
    if (el) el.innerHTML = '⏳ 正在' + (mode === 'replace' ? '替换' : '合并') + '数据...';
    var r = receiveAndMerge(pendingSyncData, mode);
    pendingSyncData = null;
    if (r) {
      if (el) el.innerHTML = '✅ 同步完成！收到 ' + r.records + ' 条记录、' + r.categories + ' 个分类';
      try { if (channel && channel.readyState === 'open') channel.send('SYNC_OK'); } catch (e) { /* ignore */ }
    }
  }

  function mergeIntoDataStore(incoming) {
    var cur = DataStore._data;
    if (!cur) return;
    var exist = {}; cur.records.forEach(function (r) { exist[r.id] = true; });
    incoming.records.forEach(function (r) {
      r.note = sanitizeHtml(r.note || '');
      if (exist[r.id]) {
        var i = cur.records.findIndex(function (x) { return x.id === r.id; });
        if (i !== -1) cur.records[i] = r;
      } else { cur.records.unshift(r); }
    });
    sortRecordsDesc(cur.records);
    var catIds = {}; cur.categories.forEach(function (c) { catIds[c.id] = true; });
    incoming.categories.forEach(function (c) {
      if (!catIds[c.id]) { c.name = sanitizeHtml(c.name); c.icon = sanitizeHtml(c.icon); cur.categories.push(c); catIds[c.id] = true; }
    });
    if (incoming.budgets) Object.assign(cur.budgets, incoming.budgets);
    if (incoming.categoryBudgets) Object.assign(cur.categoryBudgets, incoming.categoryBudgets);
    if (incoming.monthlyIncome) Object.assign(cur.monthlyIncome, incoming.monthlyIncome);
    if (incoming.billAmounts) Object.assign(cur.billAmounts, incoming.billAmounts);
    if (incoming.savingsTarget) cur.savingsTarget = incoming.savingsTarget;
    if (incoming.percentBase) cur.percentBase = incoming.percentBase;
    if (incoming.whatIfParams) cur.whatIfParams = incoming.whatIfParams;
    if (incoming.billCategories && Array.isArray(incoming.billCategories)) {
      var bIds = {}; cur.billCategories.forEach(function (b) { bIds[b.id] = true; });
      incoming.billCategories.forEach(function (b) {
        if (!bIds[b.id]) { b.name = sanitizeHtml(b.name); cur.billCategories.push(b); bIds[b.id] = true; }
      });
    }
  }

  var ui = {};

  ui.showOrError = function (html) {
    if (typeof showModal === 'function') { showModal(html); return; }
    var overlay = document.getElementById('modalOverlay');
    var content = document.getElementById('modalContent');
    if (overlay && content) {
      content.innerHTML = html;
      overlay.classList.add('open');
      overlay.onclick = function (e) { if (e.target === overlay) overlay.classList.remove('open'); };
    }
  };

  ui.close = function () {
    resetConnection();
    if (typeof closeModal === 'function') closeModal();
    else { var o = document.getElementById('modalOverlay'); if (o) o.classList.remove('open'); }
  };

  ui.showMenu = function () {
    ui.showOrError(
      '<div class="modal-title">📶 局域网同步</div>' +
      '<p class="text-sm text-secondary mb-16">两台设备在<span style="font-weight:600">同一 Wi-Fi</span>下直连同步，数据不经过任何服务器。连接需要手动交换两段连接码，相当于双方互相确认身份。</p>' +
      '<div class="flex flex-col gap-8">' +
      '<button class="btn btn-primary btn-block" onclick="SyncUI.startHost()">📤 发送数据<br><span class="text-xs text-muted">把本机数据发到另一台设备</span></button>' +
      '<button class="btn btn-outline btn-block" onclick="SyncUI.startClient()">📥 接收数据<br><span class="text-xs text-muted">从另一台设备接收数据</span></button>' +
      '</div>' +
      '<div class="modal-actions"><button class="btn btn-ghost" onclick="SyncUI.close()">取消</button></div>'
    );
  };

  ui.startHost = function () {
    var self = this;
    this._showHostWaiting();
    createHost({
      onConnect: function () {
        var el = document.getElementById('syncStatus');
        if (el) el.innerHTML = '✅ 连接已建立，正在发送数据...';
      },
      onError: function (msg) {
        var el = document.getElementById('syncStatus');
        if (el) { el.innerHTML = '❌ ' + msg; el.style.color = 'var(--danger)'; }
      },
      onDataReceived: function (data) {
        if (data === 'SYNC_OK') {
          var el = document.getElementById('syncStatus');
          if (el) el.innerHTML = '✅ 对方已确认接收，同步完成！';
        }
      }
    }).then(function (offerSdp) {
      self._showHostOffer(offerSdp);
    }).catch(function (err) {
      var el = document.getElementById('syncStatus');
      if (el) { el.innerHTML = '❌ 创建连接失败：' + err.message; el.style.color = 'var(--danger)'; }
    });
  };

  ui._showHostWaiting = function () {
    ui.showOrError(
      '<div class="modal-title">📤 等待连接...</div>' +
      '<p class="text-sm text-secondary mb-16">正在生成连接码...</p>' +
      '<div id="syncStatus" class="text-sm text-center text-muted">⏳ 生成中...</div>' +
      '<div class="modal-actions"><button class="btn btn-ghost" onclick="SyncUI.close()">取消</button></div>'
    );
  };

  ui._showHostOffer = function (offerSdp) {
    ui.showOrError(
      '<div class="modal-title">📤 发送数据</div>' +
      '<p class="text-sm text-secondary mb-16">在另一台设备上选择"接收数据"，然后<strong>完整复制</strong>下面的连接码粘贴到那里</p>' +
      '<div class="input-group"><label class="input-label">连接码第 1 步（发给对方）</label>' +
      '<textarea id="syncOfferText" class="input-field" readonly rows="5" style="font-size:0.65rem;font-family:monospace;white-space:pre;word-break:break-all;resize:vertical">' + sanitizeHtml(offerSdp) + '</textarea>' +
      '<button class="btn btn-outline btn-block mt-8" onclick="SyncUI.copyText(\'syncOfferText\')">📋 复制连接码</button></div>' +
      '<div class="input-group" style="margin-top:16px"><label class="input-label">连接码第 2 步（粘贴对方返回的）</label>' +
      '<textarea id="syncAnswerInput" class="input-field" rows="4" style="font-size:0.65rem;font-family:monospace;white-space:pre;word-break:break-all;resize:vertical" placeholder="..."></textarea>' +
      '<button class="btn btn-primary btn-block mt-8" onclick="SyncUI.submitAnswer()">✅ 确认连接</button></div>' +
      '<div id="syncStatus" class="text-sm text-center text-muted mt-8">⏳ 等待对方返回连接码...</div>' +
      '<div class="modal-actions"><button class="btn btn-ghost" onclick="SyncUI.close()">取消</button></div>'
    );
  };

  ui.submitAnswer = function () {
    var input = document.getElementById('syncAnswerInput');
    var status = document.getElementById('syncStatus');
    if (!input || !input.value.trim()) {
      if (status) { status.innerHTML = '❌ 请先粘贴连接码'; status.style.color = 'var(--danger)'; }
      return;
    }
    if (status) { status.innerHTML = '⏳ 建立连接中，请等待...'; status.style.color = ''; }
    acceptAnswer(input.value.trim()).then(function () {
      if (status) status.innerHTML = '⏳ 连接握手完成，等待数据通道打开...';
    }).catch(function (err) {
      if (status) { status.innerHTML = '❌ 连接失败：' + err.message; status.style.color = 'var(--danger)'; }
    });
  };

  ui.startClient = function () {
    ui.showOrError(
      '<div class="modal-title">📥 接收数据</div>' +
      '<p class="text-sm text-secondary mb-16">在另一台设备上选择"发送数据"，然后把那边显示的连接码<strong>完整复制</strong>到下面</p>' +
      '<div class="input-group"><label class="input-label">粘贴发送方的连接码</label>' +
      '<textarea id="syncOfferInput" class="input-field" rows="5" style="font-size:0.65rem;font-family:monospace;white-space:pre;word-break:break-all;resize:vertical" placeholder="完整粘贴发送方的连接码..."></textarea></div>' +
      '<button class="btn btn-primary btn-block" onclick="SyncUI.connectAsClient()">🔗 连接并接收</button>' +
      '<div id="syncStatus" class="text-sm text-center text-muted mt-8"></div>' +
      '<div class="modal-actions"><button class="btn btn-ghost" onclick="SyncUI.close()">取消</button></div>'
    );
  };

  ui.connectAsClient = function () {
    var input = document.getElementById('syncOfferInput');
    var status = document.getElementById('syncStatus');
    if (!input || !input.value.trim()) {
      if (status) { status.innerHTML = '❌ 请粘贴连接码'; status.style.color = 'var(--danger)'; }
      return;
    }
    if (status) { status.innerHTML = '⏳ 连接中...'; status.style.color = ''; }
    ui._showClientAnswer();
    createClient(input.value.trim(), {
      onStateChange: function (s) {
        var el = document.getElementById('syncClientProgress');
        if (el) el.innerHTML = (s === 'connected') ? '✅ 已连接' : '⏳ ' + s;
      },
      onError: function (msg) {
        var el = document.getElementById('syncClientProgress');
        if (el) { el.innerHTML = '❌ ' + msg; el.style.color = 'var(--danger)'; }
      },
      onDataReceived: function (data) {
        var el = document.getElementById('syncClientProgress');
        if (el) el.innerHTML = '📥 收到数据，请选择同步方式';
        pendingSyncData = data;
        if (typeof showModal === 'function') {
          showModal(
            '<div class="modal-title">📥 收到同步数据</div>' +
            '<p class="text-sm text-secondary mb-16">选择数据导入方式：</p>' +
            '<button class="btn btn-primary btn-block mb-8" onclick="confirmSyncMode(\'replace\')">🔄 替换当前数据</button>' +
            '<button class="btn btn-outline btn-block" onclick="confirmSyncMode(\'merge\')">🔀 合并到当前数据</button>' +
            '<div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button></div>'
          );
        }
      }
    }).then(function (answerSdp) {
      var el = document.getElementById('syncAnswerText');
      if (el) el.value = answerSdp;
      var p = document.getElementById('syncClientProgress');
      if (p) p.innerHTML = '✅ 连接准备就绪，请在发送方输入上面返回的连接码，然后等待数据...';
    }).catch(function (err) {
      var p = document.getElementById('syncClientProgress');
      if (p) { p.innerHTML = '❌ ' + err.message; p.style.color = 'var(--danger)'; }
    });
  };

  ui._showClientAnswer = function () {
    ui.showOrError(
      '<div class="modal-title">📥 接收数据</div>' +
      '<p class="text-sm text-secondary mb-16">把下面的返回码<strong>完整复制</strong>到发送方设备的"连接码第 2 步"处</p>' +
      '<div class="input-group"><label class="input-label">返回码（粘贴到发送方）</label>' +
      '<textarea id="syncAnswerText" class="input-field" readonly rows="4" style="font-size:0.65rem;font-family:monospace;white-space:pre;word-break:break-all;resize:vertical"></textarea>' +
      '<button class="btn btn-outline btn-block mt-8" onclick="SyncUI.copyText(\'syncAnswerText\')">📋 复制返回码</button></div>' +
      '<div id="syncClientProgress" class="text-sm text-center text-muted mt-16">⏳ 正在建立连接...</div>' +
      '<div id="syncClientStatus" class="text-sm text-center text-muted"></div>' +
      '<div class="modal-actions"><button class="btn btn-ghost" onclick="SyncUI.close()">取消</button></div>'
    );
  };

  ui.copyText = function (textareaId) {
    var el = document.getElementById(textareaId);
    if (!el) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(el.value).then(function () {
        if (typeof showToast === 'function') showToast('✅ 已复制');
      }).catch(function () { el.select(); document.execCommand('copy'); if (typeof showToast === 'function') showToast('✅ 已复制'); });
    } else { el.focus(); el.select(); document.execCommand('copy'); if (typeof showToast === 'function') showToast('✅ 已复制'); }
  };

  window.SyncUI = ui;
  window.confirmSyncMode = confirmSyncMode;
  window.LANSync = { open: function () { ui.showMenu(); }, sanitizeHtml: sanitizeHtml };

})();

/* ============================================================
   DIAGNOSTICS — Operation Logging & Data Verification
   ============================================================ */
(function() {
'use strict';

// ============================================================
// DIAGNOSTICS — Operation Logging & Data Verification
// ============================================================
// This module wraps DataStore and StatsEngine to log every operation.

const DIAG = {
  MAX_LOG: 200,
  ops: [],
  
  _log(opType, details) {
    const entry = {
      t: new Date().toISOString(),
      op: opType,
      details: details,
      memRecords: DataStore.getRecords().length,
      lsRecords: 0
    };
    // Read localStorage directly for comparison
    try {
      const raw = localStorage.getItem('budgetAppData');
      if (raw) {
        const lsData = JSON.parse(raw);
        entry.lsRecords = (lsData.records || []).length;
        entry.lsSize = raw.length;
        // Detect discrepancy
        entry.discrepancy = (entry.memRecords !== entry.lsRecords);
      }
    } catch(e) {
      entry.lsError = e.message;
    }
    this.ops.push(entry);
    if (this.ops.length > this.MAX_LOG) this.ops.shift();
    
    // Always log to console for real-time debugging
    console.log('[DIAG] ' + opType, details, 
      'mem=' + entry.memRecords + ' ls=' + entry.lsRecords + (entry.discrepancy ? ' ⚠️ MISMATCH' : ''));
    
    return entry;
  },

  clearLog() {
    this.ops = [];
  },

  getLog() {
    return this.ops.slice();
  },

  // Wrap a DataStore method to add before/after logging
  wrapDataStoreMethod(methodName) {
    const original = DataStore[methodName];
    if (typeof original !== 'function') return;
    
    DataStore[methodName] = function(...args) {
      // Snapshot before
      const beforeRecords = this._data ? this._data.records.length : -1;
      const beforeIds = this._data ? this._data.records.map(r => r.id).slice(0, 5) : [];
      
      // Call original
      const result = original.apply(this, args);
      
      // Snapshot after
      const afterRecords = this._data ? this._data.records.length : -1;
      const afterIds = this._data ? this._data.records.map(r => r.id).slice(0, 5) : [];
      
      // Log
      DIAG._log('DataStore.' + methodName, {
        args: args.map(a => typeof a === 'string' ? a.substring(0, 40) : a),
        before: { recordCount: beforeRecords, sampleIds: beforeIds },
        after: { recordCount: afterRecords, sampleIds: afterIds },
        pendingDelete: this._pendingDelete ? this._pendingDelete.id : null
      });
      
      return result;
    };
  },

  // Compare in-memory _data with localStorage directly
  compareWithStorage() {
    const result = {
      memRecords: DataStore.getRecords().length,
      memRecordIds: DataStore.getRecords().map(r => r.id),
      lsRecords: 0,
      lsRecordIds: [],
      inMemNotLS: [],
      inLSNotMem: [],
      match: false,
      pendingDelete: null
    };
    
    try {
      const raw = localStorage.getItem('budgetAppData');
      if (raw) {
        const lsData = JSON.parse(raw);
        const lsRecords = lsData.records || [];
        result.lsRecords = lsRecords.length;
        result.lsRecordIds = lsRecords.map(r => r.id);
        
        // Find records in memory but not in localStorage
        const lsIdSet = new Set(result.lsRecordIds);
        result.inMemNotLS = result.memRecordIds.filter(id => !lsIdSet.has(id));
        
        // Find records in localStorage but not in memory
        const memIdSet = new Set(result.memRecordIds);
        result.inLSNotMem = result.lsRecordIds.filter(id => !memIdSet.has(id));
        
        result.match = (result.memRecords === result.lsRecords) && result.inLSNotMem.length === 0;
      }
    } catch(e) {
      result.error = e.message;
    }
    
    result.pendingDelete = DataStore.getPendingDelete() ? DataStore.getPendingDelete().id : null;
    
    DIAG._log('compareWithStorage', {
      match: result.match,
      inLSNotMem: result.inLSNotMem.length,
      inMemNotLS: result.inMemNotLS.length
    });
    
    return result;
  },

  // Get full storage info
  getStorageInfo() {
    const info = {
      memory: { records: DataStore.getRecords().length, categories: DataStore.getCategories().length },
      localStorage: { totalSize: 0, appDataSize: 0, logSize: 0 },
      pendingDelete: DataStore.getPendingDelete() ? DataStore.getPendingDelete().id : null
    };
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        const val = localStorage.getItem(key);
        const size = (val ? val.length : 0);
        if (key === 'budgetAppData') info.localStorage.appDataSize = size;
        else if (key === 'budgetAppLog') info.localStorage.logSize = size;
        info.localStorage.totalSize += size;
      }
    } catch(e) {
      info.error = e.message;
    }
    return info;
  },

  // Export full diagnostic report as text
  exportDiagnosticReport() {
    const compare = this.compareWithStorage();
    const storage = this.getStorageInfo();
    const log = this.getLog();
    const pending = DataStore.getPendingDelete();
    
    let text = '=== Budget App Diagnostic Report ===\n';
    text += 'Generated: ' + new Date().toISOString() + '\n';
    text += 'Version: v2.3.2\n';
    text += '\n--- Memory vs LocalStorage ---\n';
    text += 'Memory records: ' + compare.memRecords + '\n';
    text += 'LocalStorage records: ' + compare.lsRecords + '\n';
    text += 'Match: ' + (compare.match ? 'YES ✅' : 'NO ⚠️') + '\n';
    if (compare.inLSNotMem.length > 0) {
      text += 'Records in LS but NOT in memory: ' + compare.inLSNotMem.length + '\n';
      text += '  IDs: ' + compare.inLSNotMem.slice(0, 20).join(', ') + '\n';
    }
    if (compare.inMemNotLS.length > 0) {
      text += 'Records in memory but NOT in LS: ' + compare.inMemNotLS.length + '\n';
      text += '  IDs: ' + compare.inMemNotLS.slice(0, 20).join(', ') + '\n';
    }
    
    text += '\n--- Storage Info ---\n';
    text += 'localStorage total: ' + storage.localStorage.totalSize + ' bytes\n';
    text += 'budgetAppData: ' + storage.localStorage.appDataSize + ' bytes\n';
    text += 'budgetAppLog: ' + storage.localStorage.logSize + ' bytes\n';
    text += 'Pending delete: ' + (pending ? pending.id : 'none') + '\n';
    
    text += '\n--- Categories ---\n';
    const cats = DataStore.getCategories();
    text += 'Total categories: ' + cats.length + '\n';
    
    text += '\n--- Operation Log (last 50) ---\n';
    log.slice(-50).forEach(e => {
      text += '[' + (e.t.substring(11, 23)) + '] ' + e.op + ' | mem=' + e.memRecords + ' ls=' + e.lsRecords;
      if (e.discrepancy) text += ' ⚠️ MISMATCH';
      text += '\n';
      if (e.details) {
        text += '  args: ' + JSON.stringify(e.details.args || e.details) + '\n';
      }
    });
    
    text += '\n--- Full Record List (memory) ---\n';
    DataStore.getRecords().forEach(r => {
      const cat = DataStore.getCategory(r.categoryId);
      text += '  ' + r.id + ' | ' + (r.date || 'no-date') + ' | RM' + r.amount + ' | ' + (cat ? cat.name : 'unknown') + ' | ' + (r.note || '') + '\n';
    });
    
    text += '\n========== END REPORT ==========\n';
    return text;
  }
};

function showPageGuide(pageKey) {
  const guide = PAGE_GUIDES[pageKey];
  if (!guide) return;

  let html = `<div class="modal-title" style="font-size:1.1rem;margin-bottom:16px">${guide.title}</div>`;

  for (const section of guide.content) {
    html += '<div class="guide-section">';

    if (section.heading) {
      html += `<h3>${section.heading}</h3>`;
    }

    if (section.isGrid && section.items) {
      html += '<div class="guide-feature-grid">';
      for (const item of section.items) {
        html += `<div class="guide-feature-item"><strong>${item[0]}</strong>${item[1]}</div>`;
      }
      html += '</div>';
    } else if (section.isOrdered && section.items) {
      html += '<ol>';
      for (const item of section.items) {
        html += `<li>${item}</li>`;
      }
      html += '</ol>';
    } else if (section.isTable && section.rows) {
      html += '<table style="width:100%;border-collapse:collapse;font-size:0.82rem">';
      html += '<tbody>';
      for (const row of section.rows) {
        html += `<tr><td style="padding:6px 8px;border-bottom:1px solid var(--border);font-weight:600;color:var(--text-primary);white-space:nowrap;vertical-align:top">${row[0]}</td><td style="padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-secondary)">${row[1]}</td></tr>`;
      }
      html += '</tbody></table>';
    } else if (section.isTips && section.items) {
      for (const tip of section.items) {
        html += `<div class="guide-tip">💡 ${tip}</div>`;
      }
    } else if (section.text) {
      html += `<p>${section.text}</p>`;
    }

    html += '</div>';
  }

  html += '<div class="modal-actions"><button class="btn btn-primary" onclick="closeModal()">我知道了</button></div>';

  showModal(html);
}

// Export
window.showPageGuide = showPageGuide;
window.PAGE_GUIDES = PAGE_GUIDES;
